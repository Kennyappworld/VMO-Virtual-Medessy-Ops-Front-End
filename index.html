<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="robots" content="noindex, nofollow">
<title>VMO — Medessy Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<script src="https://js.pusher.com/8.4/pusher.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════════
   VMO v11 — DESIGN SYSTEM
   Aesthetic: Refined Industrial Luxury
   Inspiration: Bloomberg Terminal meets luxury Swiss watchmaking
   Palette: Deep ink blacks, warm bronze gold, arctic white
══════════════════════════════════════════════════════════ */
:root {
  /* Core palette */
  --ink:       #080c14;
  --ink2:      #0d1220;
  --ink3:      #141c2e;
  --ink4:      #1c2640;
  --ink5:      #243050;

  /* Gold accent system */
  --gold:      #c9a84c;
  --gold2:     #e8c86a;
  --gold3:     #f5dfa0;
  --gold-glow: rgba(201,168,76,.18);

  /* Semantic */
  --emerald:   #0fa572;
  --crimson:   #e03d5a;
  --amber:     #d97706;
  --sapphire:  #3b82f6;
  --violet:    #7c3aed;

  /* Text */
  --t1: #f0ebe0;
  --t2: #a09880;
  --t3: #5c6480;
  --t4: #343d55;

  /* Borders */
  --b1: rgba(201,168,76,.12);
  --b2: rgba(240,235,224,.06);
  --b3: rgba(240,235,224,.03);

  /* Radii */
  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;

  /* Shadows */
  --s1: 0 2px 8px rgba(0,0,0,.4);
  --s2: 0 8px 32px rgba(0,0,0,.5);
  --s3: 0 24px 64px rgba(0,0,0,.6);
  --s-gold: 0 0 24px rgba(201,168,76,.15);

  /* Layout */
  --topbar-h: 58px;
  --sidebar-w: 228px;

  /* Legacy compat */
  --bg: var(--ink);
  --bg2: var(--ink2);
  --bg3: var(--ink3);
  --bg4: var(--ink4);
  --accent: var(--gold);
  --accent2: var(--violet);
  --green: var(--emerald);
  --red: var(--crimson);
  --text: var(--t1);
  --text2: var(--t2);
  --text3: var(--t3);
  --border: var(--b2);
  --radius: var(--r-md);
  --shadow: var(--s2);
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--t1);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
img { display: block; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ── APP SHELL ── */
.app-wrap { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

/* ══ SIDEBAR ══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--ink2);
  border-right: 1px solid var(--b1);
  display: flex; flex-direction: column;
  position: relative; z-index: 300;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}

/* Subtle texture overlay */
.sidebar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 24px,
    rgba(201,168,76,.018) 24px, rgba(201,168,76,.018) 25px
  );
}

.sidebar-header {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--b1);
  position: relative;
}

.sidebar-wordmark {
  display: flex; align-items: baseline; gap: 6px;
}
.sidebar-wordmark-vmo {
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 900;
  color: var(--gold); letter-spacing: -1px;
  text-shadow: 0 0 30px rgba(201,168,76,.4);
  line-height: 1;
}
.sidebar-wordmark-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold); margin-bottom: 6px; flex-shrink: 0;
  box-shadow: 0 0 8px var(--gold);
}
.sidebar-sub {
  font-size: 9px; color: var(--t3); margin-top: 3px;
  text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500;
}

.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; border-bottom: 1px solid var(--b2);
  background: rgba(201,168,76,.04);
}
.sidebar-avatar {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold), #8B5E1A);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 11px; color: var(--ink);
  border: 1px solid rgba(201,168,76,.3);
}
.sidebar-name { font-size: 12px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-role { font-size: 10px; color: var(--gold); text-transform: capitalize; font-weight: 500; margin-top: 1px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 10px; scrollbar-width: none; }
.sidebar-nav::-webkit-scrollbar { display: none; }

.nav-section {
  font-size: 8.5px; font-weight: 700; color: var(--t4);
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 14px 8px 4px; font-family: 'DM Mono', monospace;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-sm);
  color: var(--t3); font-size: 12.5px; font-weight: 500;
  transition: all .15s; margin-bottom: 1px;
  border: none; background: none; width: 100%; text-align: left;
  position: relative; overflow: hidden;
}
.nav-item:hover { background: rgba(201,168,76,.07); color: var(--t2); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(201,168,76,.15), rgba(201,168,76,.05));
  color: var(--gold); font-weight: 600;
  border-left: 2px solid var(--gold);
  padding-left: 8px;
}
.nav-item i { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; opacity: .8; }
.nav-item.active i { opacity: 1; }

/* Unread badge on chat nav item */
.nav-badge {
  margin-left: auto; background: var(--crimson);
  color: #fff; font-size: 9px; font-weight: 800;
  padding: 1px 5px; border-radius: 20px; min-width: 16px;
  text-align: center;
}

.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--b2); }
.btn-signout {
  width: 100%; padding: 9px 12px; border-radius: var(--r-sm);
  background: rgba(224,61,90,.08); border: 1px solid rgba(224,61,90,.15);
  color: #f87171; font-size: 11.5px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 7px; transition: .15s;
}
.btn-signout:hover { background: rgba(224,61,90,.15); border-color: rgba(224,61,90,.3); }

/* ══ TOPBAR ═══════════════════════════════════════════════ */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar {
  height: var(--topbar-h); flex-shrink: 0;
  background: rgba(13,18,32,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  position: relative; z-index: 100;
}
.topbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .3;
}
.topbar-menu {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--b2);
  color: var(--t3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: .15s;
}
.topbar-menu:hover { background: var(--ink3); color: var(--t2); }
.topbar-title {
  flex: 1; font-size: 16px; font-weight: 700; color: var(--t1);
  font-family: 'Fraunces', serif; letter-spacing: -0.3px;
}
.topbar-action {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--gold), #a8782a);
  border: none; color: var(--ink); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: .15s;
  box-shadow: 0 2px 12px rgba(201,168,76,.35);
}
.topbar-action:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(201,168,76,.5); }

/* ══ PAGE CONTENT ═════════════════════════════════════════ */
.page-content {
  flex: 1; overflow-y: auto;
  padding: 20px; padding-bottom: 32px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--ink4) transparent;
}
.page-content::-webkit-scrollbar { width: 4px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--ink4); border-radius: 2px; }

/* ══ SIDEBAR OVERLAY ══════════════════════════════════════ */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 299;
  backdrop-filter: blur(4px); opacity: 0;
  pointer-events: none; transition: opacity .3s;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 40px rgba(0,0,0,.7);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; }
}

/* ══ LOGIN ════════════════════════════════════════════════ */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background: var(--ink);
  position: relative; overflow: hidden;
}
/* Animated background */
.login-wrap::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(201,168,76,.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 70%, rgba(124,58,237,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(201,168,76,.04) 0%, transparent 70%);
  animation: loginBg 8s ease-in-out infinite alternate;
}
@keyframes loginBg {
  0% { transform: scale(1); opacity: .8; }
  100% { transform: scale(1.05); opacity: 1; }
}
/* Grid lines */
.login-wrap::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.login-card {
  width: 100%; max-width: 420px;
  background: rgba(13,18,32,.9);
  backdrop-filter: blur(24px);
  border: 1px solid var(--b1);
  border-radius: var(--r-xl);
  padding: 40px 36px;
  box-shadow: var(--s3), var(--s-gold);
  position: relative; z-index: 1;
  animation: loginSlide .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes loginSlide {
  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.login-logo {
  font-family: 'Fraunces', serif;
  font-size: 52px; font-weight: 900; line-height: 1;
  color: var(--gold); letter-spacing: -2px;
  text-align: center; margin-bottom: 4px;
  text-shadow: 0 0 40px rgba(201,168,76,.5);
}
.login-sub {
  text-align: center; font-size: 12px; color: var(--t3);
  margin-bottom: 32px; line-height: 1.6;
  text-transform: uppercase; letter-spacing: .8px;
}
.login-divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 28px;
}

/* ══ FORMS ════════════════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label {
  display: block; font-size: 10.5px; font-weight: 700;
  color: var(--t3); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}
.form-input {
  width: 100%; padding: 10px 13px;
  background: var(--ink3); border: 1px solid var(--b2);
  border-radius: var(--r-sm); color: var(--t1);
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: all .2s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,.06);
  box-shadow: 0 0 0 3px rgba(201,168,76,.1);
}
.form-input::placeholder { color: var(--t4); }
select.form-input option { background: var(--ink3); }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }

/* ══ BUTTONS ══════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 9px 16px; border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 600; transition: all .15s;
  cursor: pointer; border: 1px solid transparent; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.btn i { font-size: 14px; }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), #a8782a);
  color: var(--ink); border-color: transparent;
  box-shadow: 0 2px 12px rgba(201,168,76,.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,.45); filter: brightness(1.05); }
.btn-ghost {
  background: transparent; color: var(--t2);
  border-color: var(--b2);
}
.btn-ghost:hover { background: var(--ink3); color: var(--t1); border-color: var(--b1); }
.btn-danger { background: rgba(224,61,90,.12); color: #f87171; border-color: rgba(224,61,90,.2); }
.btn-danger:hover { background: rgba(224,61,90,.2); }
.btn-sm { padding: 6px 11px; font-size: 11.5px; }
.btn-block { width: 100%; }

/* ══ STAT CARDS ═══════════════════════════════════════════ */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--ink2);
  border: 1px solid var(--b2);
  border-radius: var(--r-md);
  padding: 16px 14px;
  position: relative; overflow: hidden;
  transition: all .2s;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card:hover { transform: translateY(-2px); border-color: var(--b1); box-shadow: var(--s1); }
.stat-card.stat-amber::before { background: linear-gradient(90deg, var(--gold), var(--amber)); }
.stat-card.stat-green::before { background: linear-gradient(90deg, var(--emerald), #06b6d4); }
.stat-card.stat-blue::before { background: linear-gradient(90deg, var(--sapphire), var(--violet)); }
.stat-card.stat-purple::before { background: linear-gradient(90deg, var(--violet), #ec4899); }
.stat-card.stat-red::before { background: linear-gradient(90deg, var(--crimson), var(--amber)); }
.stat-card.stat-gold::before { background: linear-gradient(90deg, var(--gold), var(--gold3)); }
.stat-label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.stat-value { font-size: 24px; font-weight: 800; color: var(--t1); line-height: 1; font-family: 'Fraunces', serif; }
.stat-sub { font-size: 11px; color: var(--t3); margin-top: 4px; }

/* ══ LIST ITEMS ═══════════════════════════════════════════ */
.list-item {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--ink2); border: 1px solid var(--b3);
  border-radius: var(--r-md); padding: 14px;
  margin-bottom: 6px; transition: all .15s;
}
.list-item:hover { border-color: var(--b1); background: var(--ink3); }
.list-dot {
  width: 38px; height: 38px; border-radius: var(--r-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.list-dot.amber { background: rgba(217,119,6,.15); color: var(--amber); }
.list-dot.green { background: rgba(15,165,114,.15); color: var(--emerald); }
.list-dot.red { background: rgba(224,61,90,.15); color: var(--crimson); }
.list-dot.blue { background: rgba(59,130,246,.15); color: var(--sapphire); }
.list-dot.gold { background: rgba(201,168,76,.15); color: var(--gold); }
.list-body { flex: 1; min-width: 0; }
.list-title { font-size: 13.5px; font-weight: 600; color: var(--t1); }
.list-sub { font-size: 11.5px; color: var(--t3); margin-top: 2px; }
.list-meta { font-size: 11.5px; color: var(--t3); text-align: right; flex-shrink: 0; }

/* ══ BADGES ═══════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  font-family: 'DM Mono', monospace;
}
.badge-approved { background: rgba(15,165,114,.15); color: var(--emerald); border: 1px solid rgba(15,165,114,.2); }
.badge-pending { background: rgba(217,119,6,.12); color: var(--amber); border: 1px solid rgba(217,119,6,.2); }
.badge-declined { background: rgba(224,61,90,.12); color: #f87171; border: 1px solid rgba(224,61,90,.2); }
.badge-paid { background: rgba(15,165,114,.15); color: var(--emerald); border: 1px solid rgba(15,165,114,.2); }
.badge-gold { background: rgba(201,168,76,.12); color: var(--gold); border: 1px solid rgba(201,168,76,.2); }

/* ══ TABLES ═══════════════════════════════════════════════ */
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table th {
  background: var(--ink3); color: var(--t3);
  font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px;
  padding: 10px 14px; text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--b1); font-family: 'DM Mono', monospace;
  font-weight: 600;
}
.data-table td {
  padding: 11px 14px; border-bottom: 1px solid var(--b3);
  white-space: nowrap; vertical-align: middle; color: var(--t2);
}
.data-table tr:hover td { background: rgba(201,168,76,.03); }
.table-wrap {
  overflow-x: auto; border-radius: var(--r-md);
  border: 1px solid var(--b2);
  background: var(--ink2);
}

/* ══ MODAL ════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@media (min-width: 600px) { .modal-overlay { align-items: center; padding: 20px; } }
.modal {
  background: var(--ink2); border: 1px solid var(--b1);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  width: 100%; max-width: 540px;
  max-height: 92vh; overflow-y: auto;
  padding: 20px 20px 32px;
  box-shadow: var(--s3);
  animation: modalUp .3s cubic-bezier(.16,1,.3,1) both;
  scrollbar-width: thin; scrollbar-color: var(--ink4) transparent;
  position: relative;
}
@media (min-width: 600px) {
  .modal { border-radius: var(--r-xl); max-height: 88vh; }
}
@keyframes modalUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-handle {
  width: 36px; height: 3px; border-radius: 2px;
  background: var(--ink4); margin: 0 auto 16px;
}
.modal-title {
  font-size: 16px; font-weight: 800; color: var(--t1);
  font-family: 'Fraunces', serif;
  margin-bottom: 20px; display: flex;
  align-items: center; justify-content: space-between; gap: 12px;
}
.modal-close {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  background: var(--ink3); border: 1px solid var(--b2);
  color: var(--t3); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: .15s;
}
.modal-close:hover { color: var(--t1); background: var(--ink4); }

/* ══ LOADING & EMPTY STATES ═══════════════════════════════ */
.loading-state {
  display: flex; flex-direction: column; align-items: center;

<body>
<div id="root"></div>

<script>
'use strict';

// ── SECURITY HARDENING ────────────────────────────────────────────────────────
// ① No secrets in source — API key, tokens are server-side only
// ② Token stored in memory + localStorage (no sessionStorage leak)
// ③ All user-supplied strings escaped before DOM insertion
// ④ Login rate-limiting: max 5 attempts per 10 min
// ⑤ Token validation on every page load
// ⑥ XSS protection: sanitise() used on all untrusted strings
// ─────────────────────────────────────────────────────────────────────────────

const API = 'https://vmo-virtual-medessy-opps-backend-production.up.railway.app';
const PUSHER_KEY     = 'YOUR_PUSHER_APP_KEY';
const PUSHER_CLUSTER = 'eu';

// ── SECURITY: Input sanitisation to prevent XSS ──────────────────────────────
function sanitise(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}

// ── SECURITY: Login rate limiting ─────────────────────────────────────────────
const _loginAttempts = { count: 0, resetAt: 0 };
function checkLoginRateLimit() {
  const now = Date.now();
  if (now > _loginAttempts.resetAt) { _loginAttempts.count = 0; _loginAttempts.resetAt = now + 600000; }
  if (_loginAttempts.count >= 5) {
    const wait = Math.ceil((_loginAttempts.resetAt - now) / 60000);
    throw new Error(`Too many attempts. Try again in ${wait} minute(s).`);
  }
  _loginAttempts.count++;
}
function resetLoginRateLimit() { _loginAttempts.count = 0; }

// ── SECURITY: Token validation ────────────────────────────────────────────────
function isTokenExpired(tok) {
  if (!tok) return true;
  try {
    const payload = JSON.parse(atob(tok.split('.')[1]));
    return payload.exp ? Date.now() / 1000 > payload.exp : false;
  } catch { return false; }
}

let _pusher = null;
let _pusherChannel = null;
let _pusherAvailChannel = null;

function initPusher() {
  if (!PUSHER_KEY || PUSHER_KEY === 'YOUR_PUSHER_APP_KEY') return;
  try {
    _pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      authEndpoint: API + '/pusher/auth',
      auth: { headers: { Authorization: 'Bearer ' + token } }
    });

    // System channel — settings changes, announcements
    _pusherChannel = _pusher.subscribe('vmo-system');
    _pusherChannel.bind('cron-settings-updated', (data) => {
      showToast(`⚙️ Report schedule updated by ${data.updated_by}`, 'info');
    });

    // Availability channel — live entry updates
    _pusherAvailChannel = _pusher.subscribe('vmo-availability');
    _pusherAvailChannel.bind('entry-submitted', (data) => {
      if (page === 'availability') {
        showToast(`✅ ${data.submitted_by} submitted availability for ${data.unit_name}`, 'success');
        if (availTab === 'daily') renderDailyEntry();
      }
    });
    _pusherAvailChannel.bind('report-ready', (data) => {
      showToast(`📊 ${data.report_type} report is ready`, 'info');
    });

    // Chat channel — subscribe when opening a group
    
  } catch(e) {
    // warn: 'Pusher init failed (will use polling fallback):', e.message);
  }
}

function subscribeChatChannel(groupId) {
  if (!_pusher) return;
  if (_pusher._chatChan) _pusher._chatChan.unbind_all();
  _pusher._chatChan = _pusher.subscribe(`vmo-chat-${groupId}`);
  _pusher._chatChan.bind('new-message', (data) => {
    if (activeGroupId === groupId) {
      appendChatMessage(data);
    } else {
      showToast(`💬 New message in ${data.group_name}`, 'info');
    }
  });
}

function appendChatMessage(m) {
  const container = el('chat-msgs');
  if (!container) return;
  const div = document.createElement('div');
  div.innerHTML = renderMsg(m);
  container.appendChild(div.firstElementChild);
  container.scrollTop = container.scrollHeight;
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  const colors = { info:'var(--accent)', success:'var(--green)', error:'var(--red)', warn:'var(--amber)' };
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:var(--bg2);border:1px solid ${colors[type]||colors.info};
    border-left:3px solid ${colors[type]||colors.info};
    color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;
    z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);white-space:nowrap;
    animation:slideUp .25s ease`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3500);
}


// ── STATE ────────────────────────────────────────────────────────────────────
// ── STATE ─────────────────────────────────────────────────────────────────────
// Security: validate stored token on load — clear if expired/corrupt
let _rawToken = localStorage.getItem('vmo_token');
let _rawUser  = null;
try { _rawUser = JSON.parse(localStorage.getItem('vmo_user') || 'null'); } catch { _rawUser = null; }

// Invalidate if token is expired or user is missing
if (isTokenExpired(_rawToken) && _rawToken) {
  localStorage.removeItem('vmo_token');
  localStorage.removeItem('vmo_user');
  _rawToken = null; _rawUser = null;
}

let token = _rawToken;
let user  = _rawUser;
let page  = 'dashboard';
let drawerOpen  = false;
let chatGroupId = null;
let cache = {}; // in-memory cache; never persisted

// ── API ──────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const key = method + path;
  if (method === 'GET' && cache[key]) {
    // Return cached immediately — refresh in background if stale
    const stale = (Date.now() - cache[key].ts) > 120000;
    if (stale) {
      // Background refresh without blocking
      fetch(API + path, {
        headers: { 'Content-Type': 'application/json', ...(token ? {'Authorization':'Bearer '+token} : {}) },
        signal: AbortSignal.timeout(15000)
      }).then(r => r.json()).then(d => { cache[key] = { data: d, ts: Date.now() }; }).catch(() => {});
    }
    return cache[key].data;
  }
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(15000)
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || d.message || 'Request failed ' + r.status);
  if (method === 'GET') cache[key] = { data: d, ts: Date.now() };
  return d;
}

function clearCache() { cache = {}; }

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n) {
  const num = parseFloat(n) || 0;
  if (num >= 1000000) return '₦' + (num/1000000).toFixed(1) + 'M';
  if (num >= 1000) return '₦' + (num/1000).toFixed(0) + 'K';
  return '₦' + num.toLocaleString();
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function avatar(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function daysLeft(date) {
  if (!date) return null;
  return Math.ceil((new Date(date) - new Date()) / 86400000);
}
function el(id) { return document.getElementById(id); }
function html(id, content) { const e = el(id); if (e) e.innerHTML = content; }

// ── ROLE NAVIGATION ──────────────────────────────────────────────────────────
const ALL_PAGES = [
  { id:'dashboard',    icon:'ti-dashboard',       label:'Home',           section:'Main' },
  { id:'requests',     icon:'ti-file-dollar',     label:'Payments',       section:'Operations' },
  { id:'fuel',         icon:'ti-gas-station',     label:'Fuel',           section:'Operations' },
  { id:'vehicles',     icon:'ti-truck',           label:'Vehicles',       section:'Fleet' },
  { id:'drivers',      icon:'ti-id-badge',        label:'Drivers',        section:'Fleet' },
  { id:'compliance',   icon:'ti-shield-check',    label:'Compliance',     section:'Fleet' },
  { id:'maintenance',  icon:'ti-tool',            label:'Maintenance',    section:'Fleet' },
  { id:'availability', icon:'ti-calendar-stats',  label:'Availability',   section:'Fleet' },
  { id:'reservations', icon:'ti-car',             label:'Pool Cars',      section:'Fleet' },
  { id:'clients',      icon:'ti-building',        label:'Clients',        section:'Finance' },
  { id:'receivables',  icon:'ti-receipt',         label:'Receivables',    section:'Finance' },
  { id:'imprest',      icon:'ti-wallet',          label:'Imprest',        section:'Finance' },
  { id:'balance',      icon:'ti-report-analytics',label:'Balance Sheet',  section:'Finance' },
  { id:'inventory',    icon:'ti-package',         label:'Store',          section:'Operations' },
  { id:'companies',    icon:'ti-building-factory',label:'Companies/Units',section:'Operations' },
  { id:'trips',        icon:'ti-map-route',       label:'Trip Log',       section:'Operations' },
  { id:'chat',         icon:'ti-message-circle',  label:'Chat',           section:'Team' },
  { id:'meetings',     icon:'ti-video',           label:'Meetings',       section:'Team' },
  { id:'users',        icon:'ti-users',           label:'Users',          section:'Admin' },
  { id:'audit',        icon:'ti-history',         label:'Audit Log',      section:'Admin' },
  { id:'history',      icon:'ti-table-export',    label:'History & Export',section:'Admin' },
];

const ROLE_PAGES = {
  real_admin:         ALL_PAGES.map(p => p.id),
  super_admin:        ALL_PAGES.map(p => p.id),
  admin:              ALL_PAGES.map(p => p.id),
  hr:                 ['dashboard','drivers','vehicles','compliance','reservations','chat','meetings'],
  accounts:           ['dashboard','requests','receivables','imprest','clients','fuel','chat','audit','balance','meetings'],
  compliance:         ['dashboard','vehicles','drivers','compliance','chat','maintenance'],
  operations_manager: ['dashboard','requests','fuel','vehicles','drivers','reservations','inventory','compliance','maintenance','chat','companies','trips','availability','meetings'],
  haulage_manager:    ['dashboard','requests','fuel','vehicles','drivers','compliance','companies','trips','inventory','chat','availability','maintenance','meetings'],
  pool_manager:       ['dashboard','requests','fuel','vehicles','drivers','reservations','compliance','companies','chat','availability','meetings'],
  logistics_supervisor:['dashboard','availability','chat'],
  driver:             ['dashboard','fuel','reservations','chat'],
  staff:              ['dashboard','requests','fuel','chat'],
};

function allowedPages() {
  const allowed = ROLE_PAGES[user?.role] || ROLE_PAGES.staff;
  return ALL_PAGES.filter(p => allowed.includes(p.id));
}

// Bottom nav shows max 5 most important pages for this role
// bottomNavPages removed - using sidebar nav only

// ── RENDER ROOT ──────────────────────────────────────────────────────────────
function render() {
  if (!user) { renderLogin(); return; }
  renderShell();
  loadPage(page);
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin(err) {
  document.getElementById('root').innerHTML = `
  <div class="login-wrap">
    <!-- Floating particles -->
    <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0">
      ${Array.from({length:6},(_,i)=>`<div style="position:absolute;width:${100+i*80}px;height:${100+i*80}px;border-radius:50%;border:1px solid rgba(201,168,76,.06);top:${10+i*14}%;left:${5+i*16}%;animation:loginBg ${6+i}s ease-in-out infinite alternate;animation-delay:${i*.5}s"></div>`).join('')}
    </div>
    <div class="login-card">

async function doLogin() {
  const email = el('le')?.value.trim();
  const pass  = el('lp')?.value;
  if (!email || !pass) { showToast('Enter email and password', 'error'); return; }

  // Validate email format
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Invalid email format', 'error'); return; }

  // Rate limiting
  try { checkLoginRateLimit(); } catch(e) { renderLogin(e.message); return; }

  const btn = el('lb');
  btn.innerHTML = '<span class="spinner"></span> Authenticating…';
  btn.disabled = true;
  try {
    const d = await api('POST', '/api/auth/login', { email, password: pass });
    if (!d.token || !d.user) throw new Error('Invalid server response');
    token = d.token;
    user  = d.user;
    resetLoginRateLimit();
    // Validate token before trusting it
    if (isTokenExpired(token)) throw new Error('Received expired token');
    localStorage.setItem('vmo_token', token);
    localStorage.setItem('vmo_user', JSON.stringify(user));
    page = 'dashboard';
    render();
    preloadAll();
  } catch(e) {
    btn.disabled = false;
    renderLogin(e.message);
  }
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  if (sb && sb.classList.contains('open')) { closeSidebar(); } else { openSidebar(); }
}
function openSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  if (sb) sb.classList.add('open');
  if (ov) { ov.style.opacity='1'; ov.style.pointerEvents='all'; }
}
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sb-overlay');
  if (sb) sb.classList.remove('open');
  if (ov) { ov.style.opacity='0'; ov.style.pointerEvents='none'; }
}

function navigate(p) {
  closeSidebar();
  const allowed = allowedPages().map(x => x.id);
  if (!allowed.includes(p)) { navigate(allowed[0]); return; }
  page = p;
  // Update active states
  document.querySelectorAll('.drawer-item').forEach(b => b.classList.toggle('active', b.dataset.page === p));
  document.querySelectorAll('[data-btab]').forEach(b => b.classList.toggle('active', b.dataset.btab === p));
  // Update title
  const pg = ALL_PAGES.find(x => x.id === p);
  const titles = {dashboard:'Dashboard',requests:'Payment Requests',fuel:'Fuel Requests',vehicles:'Vehicles',drivers:'Drivers',clients:'Clients',receivables:'Receivables',imprest:'Imprest Accounts',reservations:'Pool Cars',inventory:'Store',compliance:'Compliance',chat:'Team Chat',users:'Users',audit:'Audit Log',availability:'Fleet Availability',trips:'Trip Log',companies:'Companies & Units',history:'History & Export',maintenance:'Maintenance Tracker',meetings:'Meetings & Calls',balance:'Balance Sheet'};
  html('page-title', titles[p] || p);
  html('topbar-btn', '');
  // Only show spinner if page isn't cached
  const cacheKey = 'GET' + {
    dashboard:'/api/analytics/dashboard', requests:'/api/requests',
    fuel:'/api/fuel', vehicles:'/api/vehicles', drivers:'/api/drivers',
    clients:'/api/clients', receivables:'/api/receivables', imprest:'/api/imprest',
    reservations:'/api/reservations', inventory:'/api/inventory',
    compliance:'/api/compliance/alerts', users:'/api/users', audit:'/api/audit'
  }[p];
  if (!cache[cacheKey] || (Date.now() - (cache[cacheKey]?.ts||0)) > 120000) {
    html('page-content', '<div class="loading-state"><div class="spinner"></div><p>Loading…</p></div>');
  }
  loadPage(p);
}

async function doLogout() {
  try { await api('POST', '/api/auth/logout'); } catch {}
  token = null; user = null; cache = {};
  localStorage.clear();
  renderLogin();
}

// ── LOAD PAGE ────────────────────────────────────────────────────────────────
async function loadPage(p) {
  try {
    if (p==='dashboard') await pgDashboard();
    else if (p==='requests') await pgRequests();
    else if (p==='fuel') await pgFuel();
    else if (p==='vehicles') await pgVehicles();
    else if (p==='drivers') await pgDrivers();
    else if (p==='clients') await pgClients();
    else if (p==='receivables') await pgReceivables();
    else if (p==='imprest') await pgImprest();
    else if (p==='reservations') await pgReservations();
    else if (p==='inventory') await pgInventory();
    else if (p==='compliance') await pgCompliance();
    else if (p==='chat') { delete cache['GET/api/chat/groups']; await pgChat(); }
    else if (p==='users') await pgUsers();
    else if (p==='audit') { delete cache['GET/api/audit']; await pgAudit(); }
    else if (p==='history') await pgHistory();
    else if (p==='invoices') await pgInvoices();
    else if (p==='budget') await pgBudget();
    else if (p==='companies') await pgCompanies();
    else if (p==='trips') await pgTrips();
    else if (p==='availability') await pgAvailability();
    else if (p==='maintenance') await pgMaintenance();
    else if (p==='meetings') await pgMeetings();
    else if (p==='balance') await pgBalanceSheet();
  } catch(e) {
    const offline = e.message.includes('fetch') || e.message.includes('network') || e.message.includes('Failed') || e.message.includes('NetworkError');
    html('page-content', `
      <div class="error-state">
        <div style="font-size:56px">${offline?'🔌':'⚠️'}</div>
        <div style="font-size:17px;font-weight:700;color:var(--text)">${offline?'No connection':'Something went wrong'}</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:8px">${e.message}</div>
        ${offline?'<div style="font-size:12px;color:var(--text3);margin-bottom:16px">The server may be waking up. Wait 30 seconds and retry.</div>':''}
        <button class="btn btn-primary" onclick="loadPage('${p}')"><i class="ti ti-refresh"></i> Retry</button>
      </div>`);
  }
}

              <td style="padding:8px 10px;color:var(--text2);font-size:11px">${r.customer_name||'—'}</td>
              <td style="padding:8px 10px;text-align:right;font-weight:700;white-space:nowrap">${fmt(r.amount_to_pay||r.amount)}</td>

              <td style="padding:8px 10px;color:var(--text2);font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.payee_name||''}">${r.payee_name||'—'}</td>
              <td style="padding:8px 10px;color:var(--text2);font-size:11px">${r.requester_name||'—'}</td>
              <td style="padding:8px 10px;text-align:center">
                ${isMaint?`<span class="badge badge-pending blink" style="font-size:10px">⚠️ Maint</span>`:`<span class="badge badge-${r.status}" style="font-size:10px">${r.status}</span>`}
                ${r.priority==='critical'?`<span style="display:block;font-size:10px;font-weight:800;color:#ef4444;margin-top:2px" class="blink">🔴 CRITICAL</span>`:r.priority==='urgent'?`<span style="display:block;font-size:10px;font-weight:700;color:#f59e0b;margin-top:2px">🟡 URGENT</span>`:''}
              </td>
              <td style="padding:8px 10px;white-space:nowrap">
                ${r.status==='pending'?`
                  <button class="btn btn-success btn-sm" onclick="approveReq(${r.id})" style="padding:3px 8px;font-size:11px;margin-right:2px">✓</button>
                  <button class="btn btn-danger btn-sm" onclick="declineReq(${r.id})" style="padding:3px 8px;font-size:11px">✗</button>
                `:r.status==='approved'?`
                  <button class="btn btn-primary btn-sm" onclick="payReq(${r.id})" style="padding:3px 10px;font-size:11px">Pay</button>
                `:'<span style="color:var(--text3);font-size:10px">—</span>'}
              </td>
            </tr>`;
          }).join('') || `<tr><td colspan="13" style="padding:40px;text-align:center;color:var(--text3)">No payment requests yet</td></tr>`}
        </tbody>
        ${data.length?`
        <tfoot><tr style="background:var(--bg3);border-top:2px solid var(--border)">
          <td colspan="7" style="padding:9px 10px;font-weight:700;color:var(--text2);font-size:12px">TOTAL — ${data.length} records</td>
          <td style="padding:9px 10px;text-align:right;font-weight:800;color:var(--accent);font-size:13px">${fmt(total)}</td>
          <td colspan="5"></td>
        </tr></tfoot>`:''}
      </table>
    </div>
  `);
}

function filterReqTable(status) {
  if (status) {
    document.querySelectorAll('[data-rf]').forEach(b => b.classList.toggle('active', b.dataset.rf===status));
    window._reqFilter = status;
  }
  const s = window._reqFilter || 'All';
  const q = (el('req-search')?.value || '').toLowerCase();
  document.querySelectorAll('.req-row').forEach(row => {
    row.style.display = (s==='All'||row.dataset.status===s) && (!q||(row.dataset.search||'').includes(q)) ? '' : 'none';
  });
}


async function approveReq(id) {
  if (!confirm('Approve this request?')) return;
  try { clearCache(); await api('PATCH', `/api/requests/${id}/approve`); navigate('requests'); } catch(e) { alert(e.message); }
}
async function declineReq(id) {
  const reason = prompt('Decline reason (required):'); if (!reason) return;
  try { clearCache(); await api('PATCH', `/api/requests/${id}/decline`, { reason }); navigate('requests'); } catch(e) { alert(e.message); }
}
async function payReq(id) {
  const imprests = await api('GET', '/api/imprest').catch(() => []);
  showModal('Mark as Paid', `
    <div class="form-group">
      <label class="form-label">Pay from Imprest Account</label>
      <select class="form-input" id="pay-imp">
        <option value="">No imprest (manual)</option>
        ${imprests.map(i => `<option value="${i.id}">${i.name} — ${fmt(i.balance)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-success btn-block" onclick="confirmPay(${id})">Confirm Payment</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function maintenanceApprove(id) {
  const roles = ['super_admin','admin','operations_manager','haulage_manager','compliance'];
  if (!roles.includes(user.role)) { alert('Only Operations Manager, Compliance, or Admin can approve maintenance requests'); return; }
  if (!confirm('Approve this maintenance request? This is an audited action.')) return;
  try {
    clearCache();
    await api('PATCH',`/api/requests/${id}/maintenance-approve`);
    navigate('requests');
    alert('✅ Maintenance approved. Admin can now proceed to payment.');
  } catch(e) { alert(e.message); }
}

async function confirmPay(id) {
  const imp = el('pay-imp')?.value || null;
  try { clearCache(); await api('PATCH', `/api/requests/${id}/pay`, { imprest_id: imp }); closeModal(); navigate('requests'); } catch(e) { alert(e.message); }
}

async function pgFuelAnalytics() {
  html('page-content', `<div class="loading-state"><div class="spinner"></div><p style="font-size:13px;color:var(--text3)">Calculating fleet efficiency...</p></div>`);
  const d = await api('GET', '/api/fuel/analytics').catch(() => ({ efficiency: [], trend: [], vehicleTrend: [] }));

  const { efficiency = [], trend = [] } = d;
  const tracked = efficiency.filter(v => v.total_km > 0);
  const avgFleet = tracked.length
    ? (tracked.reduce((s, v) => s + parseFloat(v.avg_litres_per_100km || 0), 0) / tracked.length).toFixed(2)
    : '—';

  html('page-content', `
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm ${window._fuelTab!=='analytics'?'active':''}" onclick="window._fuelTab='requests';pgFuel()">← Back to Requests</button>
    </div>

    <!-- Fleet summary -->
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="stat-card stat-blue"><div class="stat-label">Vehicles Tracked</div><div class="stat-value">${tracked.length}</div></div>
      <div class="stat-card stat-green"><div class="stat-label">Fleet Avg Efficiency</div><div class="stat-value" style="font-size:18px">${avgFleet}</div><div class="stat-sub">L/100km</div></div>
      <div class="stat-card stat-amber"><div class="stat-label">Official (excluded)</div><div class="stat-value">${efficiency.filter(v=>v.vehicle_type==='official').length}</div></div>
    </div>

    <!-- Monthly trend -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title"><i class="ti ti-chart-line"></i> Monthly Fuel Consumption Trend</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:500px">
          <thead><tr style="background:var(--bg3)">
            ${['Month','Fuel Type','Requests','Litres','Cost (₦)','Avg Efficiency'].map(h=>
              `<th style="padding:8px 12px;text-align:left;color:var(--text3);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)">${h}</th>`
            ).join('')}
          </tr></thead>
          <tbody>
            ${trend.map((r,i) => `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
              <td style="padding:8px 12px;font-weight:600">${r.month}</td>
              <td style="padding:8px 12px"><span style="padding:2px 8px;border-radius:4px;font-size:11px;background:${r.fuel_type==='Diesel'?'rgba(245,158,11,.15)':'rgba(59,130,246,.15)'};color:${r.fuel_type==='Diesel'?'var(--amber)':'var(--accent)'}">${r.fuel_type}</span></td>
              <td style="padding:8px 12px;color:var(--text2)">${r.requests}</td>
              <td style="padding:8px 12px;color:var(--text)">${parseFloat(r.total_litres).toFixed(0)}L</td>
              <td style="padding:8px 12px;font-weight:700">${fmt(r.total_cost)}</td>
              <td style="padding:8px 12px;color:${parseFloat(r.avg_efficiency)>20?'var(--red)':parseFloat(r.avg_efficiency)>15?'var(--amber)':'var(--green)'}">${parseFloat(r.avg_efficiency||0).toFixed(1)} L/100km</td>
            </tr>`).join('') || '<tr><td colspan="6" style="padding:30px;text-align:center;color:var(--text3)">No trend data yet</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Per-vehicle efficiency table -->
    <div class="card">
      <div class="card-title"><i class="ti ti-truck"></i> Per-Vehicle Efficiency (fleet & pool only)</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px">
          <thead><tr style="background:var(--bg3)">
            ${['Vehicle','Type','Fill-ups','Total Litres','Total KM','Efficiency','Total Cost','Last Fill'].map(h=>
              `<th style="padding:8px 12px;text-align:${h==='Total Cost'?'right':'left'};color:var(--text3);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border)">${h}</th>`
            ).join('')}
          </tr></thead>
          <tbody>
            ${efficiency.filter(v => v.vehicle_type !== 'official').map((v,i) => {
              const eff = parseFloat(v.avg_litres_per_100km||0);
              const effColor = !v.avg_litres_per_100km ? 'var(--text3)' : eff > 20 ? 'var(--red)' : eff > 15 ? 'var(--amber)' : 'var(--green)';
              const effLabel = !v.avg_litres_per_100km ? '— (no odo data)' : eff.toFixed(2) + ' L/100km';
              const typeIcon = v.vehicle_type==='pool'?'🚗':v.vehicle_type==='staff_bus'?'🚌':'🚛';
              return `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
                <td style="padding:8px 12px;font-weight:700;color:var(--accent)">${v.plate_number}</td>

        </table>
      </div>
      <div style="padding:10px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)">
        🟢 Good efficiency &nbsp;|&nbsp; 🟡 Monitor closely (&gt;15 L/100km) &nbsp;|&nbsp; 🔴 Poor efficiency (&gt;20 L/100km) &nbsp;|&nbsp; Official vehicles excluded from tracking
      </div>
    </div>
  `);
}

function filterFuelTable(status) {

  }
  const s = window._fuelFilter || 'All';
  const q = (el('fuel-search')?.value || '').toLowerCase();
  document.querySelectorAll('.fuel-row').forEach(row => {

    const matchSearch = !q || (row.dataset.search || '').includes(q);

  });

function calcKmFuel() {
  const prev = parseFloat(el('nf-odo-prev')?.value || 0);
  const curr = parseFloat(el('nf-odo-curr')?.value || 0);
  const qty = parseFloat(el('nf-qty')?.value || 0);
  const calc = el('fuel-km-calc');
  if (!calc) return;
  if (curr > prev && prev > 0) {
    const km = curr - prev;
    calc.style.display = 'flex';
    const dist = el('fkm-dist');
    const eff = el('fkm-eff');
    if (dist) dist.textContent = km.toFixed(0);
    if (eff && qty > 0) {
      const e = (qty / km * 100).toFixed(2);
      if (eff) eff.textContent = e + ' L/100km';
    }
  } else {
    calc.style.display = 'none';
  }
}

async function loadLastOdometer() {
  const vehId = el('nf-veh')?.value;
  if (!vehId) return;
  try {
    const recent = await api('GET', `/api/fuel/last-odometer/${vehId}`).catch(() => null);
    if (recent?.odometer_current) {
      const prev = el('nf-odo-prev');
      if (prev && !prev.value) {
        prev.value = recent.odometer_current;
        prev.style.background = 'rgba(79,142,247,.1)';
        prev.title = 'Auto-filled from last fill-up';
      }
    }
  } catch {}
}

}

function downloadVehicleTemplate() {
  const headers = ['plate_number','make','model','year','fuel_type','vehicle_category','depot','driver_name','insurance_expiry','road_worthiness_expiry','vehicle_license_expiry','tracker_expiry','last_odometer'];
  const sample = ['LAG-123-AB','Toyota','Hilux','2022','Diesel','fleet','Lagos','John Doe','2026-12-31','2026-12-31','2026-12-31','2026-09-30','45000'];
  const rows = [
    '// VMO Vehicle Upload Template — Delete this line and the one below before uploading',
    '// Categories: fleet | pool | staff_bus  |  Fuel: Diesel | Petrol  |  Depot: Lagos | Benin | Onitsha',
    headers.join(','),
    sample.join(','),
  ];
  const csv = rows.join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'VMO_Vehicle_Upload_Template.csv'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function showUploadVehicles() {
  showModal('Import Vehicles from CSV', `
    <div style="background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--accent)">
      <i class="ti ti-info-circle"></i> Download the template, fill in Excel, save as CSV, then upload below.
    </div>
    <div class="form-group"><label class="form-label">Select CSV file</label>
      <input type="file" id="veh-csv" accept=".csv" class="form-input" onchange="previewVehicleCSV()">
    </div>
    <div id="veh-preview" style="max-height:240px;overflow-y:auto;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <button id="veh-upload-btn" class="btn btn-primary btn-block" onclick="uploadVehicleCSV()" disabled>Upload Vehicles</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function previewVehicleCSV() {
  const file = el('veh-csv')?.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const lines = e.target.result.split('\n').filter(l => l.trim() && !l.startsWith('//'));
    if (lines.length < 2) { el('veh-preview').innerHTML = '<p style="color:var(--red)">No data rows found</p>'; return; }
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
    window._vehicleUploadData = { headers, rows };
    el('veh-preview').innerHTML = '<div style="font-size:12px;color:var(--green);margin-bottom:8px">\u2705 ' + rows.length + ' vehicles found</div>';
    const btn = el('veh-upload-btn');
    if (btn) btn.disabled = false;
  };
  reader.readAsText(file);
}

async function uploadVehicleCSV() {
  const data = window._vehicleUploadData;
  if (!data) return;
  const { headers, rows } = data;
  const btn = el('veh-upload-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading...'; }
  let success = 0, failed = 0;
  for (const row of rows) {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] || null; });
    try {
      await api('POST', '/api/vehicles', {
        plate_number: obj.plate_number,
        make: obj.make, model: obj.model, year: obj.year,
        fuel_type: obj.fuel_type || 'Diesel',
        vehicle_category: obj.vehicle_category || 'fleet',
        depot: obj.depot,
        insurance_expiry: obj.insurance_expiry,
        road_worthiness_expiry: obj.road_worthiness_expiry,
        vehicle_license_expiry: obj.vehicle_license_expiry,
        tracker_expiry: obj.tracker_expiry,
        last_odometer: obj.last_odometer,
      });
      success++;
    } catch { failed++; }
  }
  delete cache['GET/api/vehicles'];
  closeModal();
  alert('Upload complete! ' + success + ' added' + (failed ? ', ' + failed + ' failed' : ''));
  await pgVehicles();
}

async function showAssetAnalytics() {
  showModal('Fleet Asset Analytics', '<div class="loading-state" style="padding:40px"><div class="spinner"></div></div>');
  try {
    const [vehicles, fuel, requests] = await Promise.all([
      api('GET', '/api/vehicles').catch(() => []),
      api('GET', '/api/fuel').catch(() => []),
      api('GET', '/api/requests').catch(() => []),
    ]);
    const analytics = vehicles.filter(v => v.vehicle_category !== 'staff_bus').map(v => {
      const vFuel = fuel.filter(f => f.plate_number === v.plate_number || f.vehicle_id == v.id);
      const vReqs = requests.filter(r => r.plate_number === v.plate_number);
      const totalFuelCost = vFuel.reduce((s, f) => s + (+f.amount || 0), 0);
      const totalFuelLtrs = vFuel.reduce((s, f) => s + (+f.quantity || 0), 0);
      const totalMaintCost = vReqs.filter(r => ['MAINTENANCE','ENGINE/CONTAINER/TYRE'].includes(r.category)).reduce((s, r) => s + (+r.amount_to_pay || 0), 0);
      const totalKm = vFuel.filter(f => f.distance_km).reduce((s, f) => s + (+f.distance_km || 0), 0);
      const avgKmL = totalFuelLtrs > 0 && totalKm > 0 ? totalKm / totalFuelLtrs : null;
      const totalCost = totalFuelCost + totalMaintCost;
      const costPerKm = totalKm > 0 ? totalCost / totalKm : null;
      return { ...v, totalFuelCost, totalFuelLtrs, totalMaintCost, totalKm, avgKmL, totalCost, costPerKm, fillCount: vFuel.length, reqCount: vReqs.length };
    }).sort((a, b) => b.totalCost - a.totalCost);

      + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--red)">' + fmt(grandTotal) + '</div><div style="font-size:10px;color:var(--text3)">Total Fleet Cost</div></div>'
      + '<div style="background:var(--bg3);border-radius:8px;padding:10px;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--amber)">' + analytics.reduce((s,v)=>s+v.totalKm,0).toFixed(0) + ' km</div><div style="font-size:10px;color:var(--text3)">Total KM Tracked</div></div>'
      + '</div>'
      + '<div style="overflow-x:auto;max-height:55vh"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:700px">'
      + '<thead><tr style="background:var(--bg3);position:sticky;top:0">'

      + '</tr></thead><tbody>'
      + analytics.map((v,i) => {
          const bg = i%2 ? 'var(--bg3)' : 'transparent';
          const eff = v.avgKmL ? (v.avgKmL < 3 ? 'var(--red)' : v.avgKmL < 5 ? 'var(--amber)' : 'var(--green)') : 'var(--text3)';
          return '<tr style="border-bottom:1px solid var(--border);background:' + bg + ';cursor:pointer" onclick="showVehicleDetail(\'' + v.plate_number + '\')" onmouseover="this.style.background=\'rgba(79,142,247,.08)\'" onmouseout="this.style.background=\'' + bg + '\'">'
            + '<td style="padding:8px 10px;font-weight:700;color:var(--accent)">' + v.plate_number + '</td>'
            + '<td style="padding:8px 10px;color:var(--text3);font-size:10px">' + (v.vehicle_category||'fleet') + '</td>'
            + '<td style="padding:8px 10px;color:var(--amber)">' + fmt(v.totalFuelCost) + '</td>'
            + '<td style="padding:8px 10px;color:var(--red)">' + fmt(v.totalMaintCost) + '</td>'
            + '<td style="padding:8px 10px;font-weight:700">' + fmt(v.totalCost) + '</td>'
            + '<td style="padding:8px 10px">' + v.totalFuelLtrs.toFixed(0) + '</td>'
            + '<td style="padding:8px 10px">' + (v.totalKm > 0 ? v.totalKm.toFixed(0) : '—') + '</td>'
            + '<td style="padding:8px 10px;font-weight:700;color:' + eff + '">' + (v.avgKmL ? v.avgKmL.toFixed(2) : '—') + '</td>'
            + '<td style="padding:8px 10px;color:var(--text3)">' + (v.costPerKm ? '\u20a6' + v.costPerKm.toFixed(0) : '—') + '</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table></div>'
      + '<p style="font-size:11px;color:var(--text3);margin-top:8px">Click vehicle for full detail. Export to Excel only.</p>';
  } catch(e) { const m = document.querySelector('.modal'); if (m) m.innerHTML += '<p style="color:var(--red);padding:16px">' + e.message + '</p>'; }

  );

}

      + '<div style="display:flex;gap:8px"><button class="btn btn-success btn-sm" style="flex:1;padding:6px" onclick="confirmReceipt(' + r.id + ',this)">\u2705 Receipt Received</button>'

    + '<div style="display:flex;gap:8px;align-items:center"><input type="number" id="threshold-input" value="' + receiptThreshold + '" class="form-input" style="flex:1"><button class="btn btn-ghost btn-sm" onclick="updateReceiptThreshold()">Update</button></div>'
    + '</div>'
    + '<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="closeModal()">Close</button>');
}

async function confirmReceipt(requestId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('PATCH', '/api/requests/' + requestId + '/confirm-receipt');
    if (btn) { btn.textContent = '\u2705 Confirmed'; btn.style.background = 'var(--green)'; }
  } catch(e) { alert(e.message); if (btn) btn.disabled = false; }
}

async function requestReceipt(requestId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('POST', '/api/requests/' + requestId + '/request-receipt');
    if (btn) { btn.textContent = '\ud83d\udce9 Sent'; btn.style.background = 'var(--amber)'; }
  } catch(e) { alert(e.message); if (btn) btn.disabled = false; }
}

function updateReceiptThreshold() {
  const val = parseFloat(el('threshold-input')?.value);
  if (!val || val < 1000) { alert('Enter a valid threshold (min \u20a61,000)'); return; }
  receiptThreshold = val;
  api('POST', '/api/settings/receipt-threshold', { threshold: val }).catch(() => {});
  alert('\u2705 Threshold updated to ' + fmt(val));
}

// ── IMPREST (Enhanced — person/unit, retirement workflow, accounts approval) ──
async function pgImprest() {
  const isAccounts = ['real_admin','super_admin','admin','accounts'].includes(user.role);
  html('topbar-btn', `
    <div style="display:flex;gap:6px">

    api('GET', '/api/imprest/retirements').catch(() => []),

  const total = accounts.reduce((s,i) => s+(+i.balance||0), 0);

        <div style="font-size:12px;color:var(--t3);margin-top:2px">Across ${accounts.length} account${accounts.length!==1?'s':''}</div>
      </div>
      ${pendingRetire > 0 ? `
      <div style="background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.25);border-radius:var(--r-sm);padding:10px 14px;text-align:center">
        <div style="font-size:10px;color:var(--amber);font-weight:700;text-transform:uppercase">Pending Retirement</div>
        <div style="font-size:24px;font-weight:900;color:var(--amber);font-family:'Fraunces',serif">${pendingRetire}</div>
        <div style="font-size:11px;color:var(--amber)">awaiting approval</div>
      </div>` : ''}
    </div>

    <!-- Tab bar -->
    <div style="display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--b2);padding-bottom:10px">
      <button class="history-tab active" id="imp-tab-accounts" onclick="impTab('accounts')">Accounts</button>
      ${isAccounts ? `<button class="history-tab" id="imp-tab-retire" onclick="impTab('retire')">Retirement Requests ${pendingRetire>0?`<span style="background:var(--amber);color:var(--ink);font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;margin-left:4px">${pendingRetire}</span>`:''}
      </button>` : ''}
    </div>

    <!-- Accounts List -->
    <div id="imp-panel-accounts">
      ${accounts.length ? accounts.map(a => {
        const utilPct = a.original_balance > 0 ? Math.round((1 - a.balance/a.original_balance)*100) : 0;
        const utilColor = utilPct > 85 ? 'var(--crimson)' : utilPct > 60 ? 'var(--amber)' : 'var(--emerald)';
        return `
        <div class="list-item" style="flex-direction:column;align-items:stretch;gap:12px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700;color:var(--t1)">${sanitise(a.name)}</div>
              <div style="font-size:11.5px;color:var(--t3);margin-top:2px">
                ${sanitise(a.holder_type==='person'?'👤 '+a.holder_name:'🏢 '+a.holder_name)||''}

          ${a.original_balance > 0 ? `

    ${isAccounts ? `
    <div id="imp-panel-retire" style="display:none">
      ${retirements.length ? retirements.map(r => `
        <div class="list-item" style="flex-direction:column;align-items:stretch;gap:10px;border-left:3px solid ${r.status==='pending'?'var(--amber)':r.status==='approved'?'var(--emerald)':'var(--crimson)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
            <div>
              <div style="font-size:13.5px;font-weight:700">${sanitise(r.account_name||'—')}</div>
              <div style="font-size:11.5px;color:var(--t3)">${sanitise(r.holder_name||'—')} · ${fmtDate(r.created_at)}</div>
              <div style="font-size:12px;color:var(--t2);margin-top:4px">${sanitise(r.purpose||'')}</div>
            </div>
            <div style="text-align:right">

            </div>
          </div>

          <div style="background:var(--ink3);border-radius:var(--r-sm);padding:10px;font-size:12px">
            ${JSON.parse(r.expenses_breakdown||'[]').map(e=>`
              <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--b3);color:var(--t2)">
                <span>${sanitise(e.desc)}</span><strong style="color:var(--t1)">${fmt(e.amount)}</strong>
              </div>`).join('')}
          </div>` : ''}
          ${r.status === 'pending' && isAccounts ? `
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary btn-sm" onclick="approveRetirement(${r.id})"><i class="ti ti-check"></i> Approve Reimbursement</button>
            <button class="btn btn-danger btn-sm" onclick="declineRetirement(${r.id})"><i class="ti ti-x"></i> Decline</button>
            <button class="btn btn-ghost btn-sm" onclick="viewRetirementDocs(${r.id},'${sanitise(r.account_name||'')}')"><i class="ti ti-paperclip"></i> Docs</button>
          </div>` : r.status !== 'pending' ? `
          <div style="font-size:11px;color:var(--t3)">${r.status==='approved'?`✅ Approved by ${sanitise(r.approved_by_name||'Accounts')} on ${fmtDate(r.approved_at)}`:`❌ Declined: ${sanitise(r.decline_reason||'')}`}</div>` : ''}
        </div>`).join('') : '<div class="empty-state" style="padding:40px"><div class="empty-icon"><i class="ti ti-file-invoice"></i></div><div class="empty-title">No retirement requests</div></div>'}

  `);
}

function impTab(tab) {
  ['accounts','retire'].forEach(t => {
    const btn = el(`imp-tab-${t}`);
    const panel = el(`imp-panel-${t}`);
    if (btn) btn.classList.toggle('active', t === tab);
    if (panel) panel.style.display = t === tab ? '' : 'none';
  });
}

function toggleImprestHolder() {
  const t = el('ni-htype')?.value;
  const lbl = el('ni-holder-label');
  const inp = el('ni-holder');
  if (lbl) lbl.textContent = t === 'unit' ? 'Unit / Department Name' : 'Staff Member Name';
  if (inp) inp.placeholder = t === 'unit' ? 'e.g. Operations Lagos' : 'e.g. Emeka Okafor';
}

async function submitImprest() {
  const name = el('ni-name')?.value?.trim();
  if (!name) { alert('Account name required'); return; }
  try {
    clearCache();
    await api('POST', '/api/imprest', {
      name, sub_name: el('ni-purpose')?.value,
      holder_type: el('ni-htype')?.value || 'person',
      holder_name: el('ni-holder')?.value,
      bank_name: el('ni-bank')?.value,
      account_number: el('ni-acct')?.value,
      balance: el('ni-bal')?.value || 0,
      original_balance: el('ni-bal')?.value || 0,
    });
    closeModal(); navigate('imprest');
  } catch(e) { alert(e.message); }
}

async function submitFund(id) {

function showRetireImprest(id, name, balance) {
  // Retirement = spending report submitted by holder, approved by accounts
  let expenseRows = `<div id="exp-rows">
    <div class="exp-row" style="display:grid;grid-template-columns:1fr 80px 28px;gap:6px;margin-bottom:6px">
      <input class="form-input" placeholder="Expense description" style="font-size:12px">
      <input class="form-input" type="number" placeholder="₦" style="font-size:12px">
      <button onclick="this.closest('.exp-row').remove()" style="background:none;border:none;color:var(--crimson);cursor:pointer;font-size:18px">×</button>
    </div>
  </div>`;
  showModal(`Retire Imprest — ${name}`, `
    <div style="background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.15);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--t2);margin-bottom:14px">
      Available balance: <strong style="color:var(--gold)">${fmt(balance)}</strong> · Retirement requires Accounts approval for reimbursement.
    </div>
    <div class="form-group"><label class="form-label">Period Covered</label>
      <div style="display:flex;gap:8px">
        <input class="form-input" type="date" id="ret-from" style="flex:1">
        <input class="form-input" type="date" id="ret-to" style="flex:1">
      </div></div>
    <div class="form-group"><label class="form-label">Purpose / Summary</label>
      <input class="form-input" id="ret-purpose" placeholder="e.g. Lagos operational expenses – May 2026"></div>
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label class="form-label" style="margin:0">Expense Breakdown</label>
        <button class="btn btn-ghost btn-sm" onclick="addExpenseRow()" style="font-size:11px"><i class="ti ti-plus"></i> Add Line</button>
      </div>
      ${expenseRows}
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t3);margin-top:6px;padding-top:6px;border-top:1px solid var(--b2)">
        <span>Total claimed:</span><strong id="retire-total" style="color:var(--t1)">₦0</strong>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Upload Supporting Documents</label>
      <div style="border:1px dashed var(--b1);border-radius:var(--r-sm);padding:12px;text-align:center;cursor:pointer" onclick="triggerRetireDocs()">
        <i class="ti ti-paperclip" style="font-size:20px;color:var(--t3)"></i>
        <div style="font-size:12px;color:var(--t3);margin-top:4px">Attach receipts, invoices (PDF/Image)</div>
        <div id="retire-docs-list" style="margin-top:6px"></div>
      </div>
      <input type="file" id="retire-docs-input" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="onRetireDocsChange(event)">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-block" onclick="submitRetirement(${id})"><i class="ti ti-send"></i> Submit for Approval</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
  // Live total calc
  document.getElementById('exp-rows')?.addEventListener('input', calcRetireTotal);
}

function addExpenseRow() {
  const rows = el('exp-rows');
  if (!rows) return;
  const div = document.createElement('div');
  div.className = 'exp-row';
  div.style.cssText = 'display:grid;grid-template-columns:1fr 80px 28px;gap:6px;margin-bottom:6px';
  div.innerHTML = `<input class="form-input" placeholder="Expense description" style="font-size:12px" oninput="calcRetireTotal()"><input class="form-input" type="number" placeholder="₦" style="font-size:12px" oninput="calcRetireTotal()"><button onclick="this.closest('.exp-row').remove();calcRetireTotal()" style="background:none;border:none;color:var(--crimson);cursor:pointer;font-size:18px">×</button>`;
  rows.appendChild(div);
}
function calcRetireTotal() {
  const amts = [...document.querySelectorAll('#exp-rows input[type=number]')].map(i => parseFloat(i.value)||0);
  const tot = amts.reduce((a,b)=>a+b,0);
  const el2 = el('retire-total');
  if (el2) el2.textContent = '₦' + tot.toLocaleString();
}
function triggerRetireDocs() { el('retire-docs-input')?.click(); }
function onRetireDocsChange(e) {
  const files = [...e.target.files];
  const list = el('retire-docs-list');
  if (list) list.innerHTML = files.map(f=>`<div style="font-size:11px;color:var(--t3);padding:2px 0"><i class="ti ti-file"></i> ${sanitise(f.name)}</div>`).join('');
}

async function submitRetirement(accountId) {
  const rows = [...document.querySelectorAll('#exp-rows .exp-row')];
  const expenses = rows.map(r => {
    const inputs = r.querySelectorAll('input');
    return { desc: inputs[0]?.value||'', amount: parseFloat(inputs[1]?.value)||0 };
  }).filter(e => e.desc && e.amount > 0);
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  const purpose = el('ret-purpose')?.value?.trim();
  if (!purpose) { alert('Purpose is required'); return; }
  if (!expenses.length) { alert('Add at least one expense line'); return; }
  try {
    clearCache();
    await api('POST', `/api/imprest/${accountId}/retire`, {
      amount_retired: total,
      purpose,
      period_from: el('ret-from')?.value,
      period_to: el('ret-to')?.value,
      expenses_breakdown: JSON.stringify(expenses),
    });
    closeModal();
    showToast('Retirement submitted — awaiting Accounts approval', 'success');
    navigate('imprest');
  } catch(e) { alert(e.message); }
}

async function approveRetirement(id) {
  if (!confirm('Approve this retirement and authorise reimbursement?')) return;
  try {
    await api('PATCH', `/api/imprest/retirements/${id}/approve`);
    showToast('✅ Retirement approved', 'success');
    navigate('imprest');
  } catch(e) { alert(e.message); }
}

async function declineRetirement(id) {
  const reason = prompt('Reason for declining:');
  if (!reason) return;
  try {
    await api('PATCH', `/api/imprest/retirements/${id}/decline`, { reason });
    showToast('Retirement declined', 'error');
    navigate('imprest');
  } catch(e) { alert(e.message); }
}

async function showImprestHistory(id, name) {
  showModal(`History — ${name}`, `<div class="loading-state" style="padding:30px"><div class="spinner"></div></div>`);
  try {
    const data = await api('GET', `/api/imprest/${id}/transactions`).catch(() => []);
    const modal = document.querySelector('.modal');
    if (!modal) return;
    modal.innerHTML = `
      <div class="modal-handle"></div>
      <div class="modal-title">${sanitise(name)} — Transaction History <button class="modal-close" onclick="closeModal()">✕</button></div>
      ${data.length ? data.map(t => `
        <div class="list-item" style="margin-bottom:6px">
          <div class="list-dot ${t.type==='fund'?'green':'amber'}"><i class="ti ti-${t.type==='fund'?'arrow-down-left':'arrow-up-right'}"></i></div>
          <div class="list-body">
            <div class="list-title">${t.type==='fund'?'Funded':'Retirement'}: ${sanitise(t.description||'—')}</div>
            <div class="list-sub">${fmtDate(t.created_at)} · by ${sanitise(t.created_by_name||'—')}</div>
          </div>
          <div class="list-meta" style="color:${t.type==='fund'?'var(--emerald)':'var(--amber)'}">
            ${t.type==='fund'?'+':'-'}${fmt(t.amount)}
          </div>
        </div>`).join('') : '<div class="empty-state" style="padding:30px"><div class="empty-title">No transactions yet</div></div>'}
    `;
  } catch(e) {}
}

function viewRetirementDocs(id, name) {
  showModal(`Documents — ${name}`, `
    <div style="text-align:center;padding:30px;color:var(--t3)">
      <i class="ti ti-paperclip" style="font-size:40px;display:block;margin-bottom:12px"></i>
      Document viewer connects to your backend storage.<br>

function renderStoreRows(data, isSuperAdmin) {
  if (!data.length) return `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--t3)">No items in store</td></tr>`;
  return data.map(i => {
    const isLow = parseFloat(i.quantity) <= parseFloat(i.reorder_level);
    const totalVal = (+i.quantity||0) * (+i.unit_cost||0);
    return `<tr data-idepot="${sanitise(i.depot)}" data-iname="${sanitise(i.name).toLowerCase()}">
      <td style="font-weight:600;color:var(--t1)">${sanitise(i.name)}</td>
      <td><span class="badge badge-gold" style="font-size:9px">${sanitise(i.category||'General')}</span></td>
      <td style="color:var(--t3)">${sanitise(i.depot||'—')}</td>
      <td style="text-align:right;font-weight:700;color:${isLow?'var(--crimson)':'var(--t1)'}${isLow?' font-style:italic':''}">${i.quantity}</td>
      <td style="color:var(--t3)">${sanitise(i.unit||'—')}</td>
      <td style="text-align:right;color:var(--t2);font-family:'DM Mono',monospace">${i.unit_cost ? fmt(i.unit_cost) : '<span style="color:var(--t4)">—</span>'}</td>
      <td style="text-align:right;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace">${totalVal > 0 ? fmt(totalVal) : '<span style="color:var(--t4)">—</span>'}</td>
      <td style="color:var(--t4)">${i.reorder_level} ${sanitise(i.unit||'')}</td>
      <td>${isLow ? '<span class="badge badge-declined" style="animation:pulse 2s infinite">LOW STOCK</span>' : '<span class="badge badge-approved">OK</span>'}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" style="padding:4px 8px;font-size:10px" onclick="showIssueItem(${i.id},'${sanitise(i.name)}','${sanitise(i.unit||'')}')"><i class="ti ti-arrow-up-right"></i> Issue (SRN)</button>
          <button class="btn btn-ghost btn-sm" style="padding:4px 8px;font-size:10px" onclick="showItemHistory(${i.id},'${sanitise(i.name)}')"><i class="ti ti-history"></i> Log</button>
          ${isSuperAdmin ? `<button class="btn btn-danger btn-sm" style="padding:4px 8px;font-size:10px" onclick="softDeleteItem(${i.id},'${sanitise(i.name)}')"><i class="ti ti-trash"></i></button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterInv(depot) {
  document.querySelectorAll('[data-depot]').forEach(b => b.classList.toggle('active', b.dataset.depot===depot));
  window._storeDepotFilter = depot;
  applyStoreFilters();
}
function filterInvSearch() {
  applyStoreFilters();
}
function applyStoreFilters() {
  const depot = window._storeDepotFilter || 'All';
  const q = (el('store-search')?.value || '').toLowerCase();
  document.querySelectorAll('#store-tbody tr[data-idepot]').forEach(row => {
    const matchDepot = depot === 'All' || row.dataset.idepot === depot;
    const matchSearch = !q || (row.dataset.iname||'').includes(q);
    row.style.display = matchDepot && matchSearch ? '' : 'none';
  });
}

  showModal('Add Store Item', `

function calcInvValue() {

async function submitInventory() {

    clearCache();
    await api('POST', '/api/inventory', {
      name, category: el('inv-cat')?.value, depot: el('inv-depot')?.value,

async function submitIssueItem(id) {
  const qty = el('is-qty')?.value;
  const purpose = el('is-purpose')?.value?.trim();
  if (!qty || parseFloat(qty) <= 0) { alert('Enter a valid quantity'); return; }
  if (!purpose) { alert('Enter the purpose/usage reason'); return; }
  try {
    delete cache['GET/api/inventory'];
    await api('POST', `/api/inventory/${id}/issue`, {
      quantity: qty, vehicle_id: el('is-vehicle')?.value||null,
      driver_id: el('is-driver')?.value||null, purpose, notes: el('is-notes')?.value,
    });
    closeModal(); navigate('inventory');
  } catch(e) { alert(e.message); }
}

  showModal('Receive Stock — GRN', `

      </div>
      <div class="form-group"><label class="form-label">Supplier / Vendor</label><input class="form-input" id="rc-supplier" placeholder="e.g. Total Nigeria Ltd"></div>
    </div>
    <div class="form-row">

    </div>

    <div class="form-group"><label class="form-label">Attach GRN Document</label>
      <div style="border:1px dashed var(--b1);border-radius:var(--r-sm);padding:10px;text-align:center;cursor:pointer" onclick="el('grn-file').click()">
        <i class="ti ti-paperclip" style="color:var(--t3)"></i>
        <span id="grn-file-name" style="font-size:11px;color:var(--t3);margin-left:6px">Attach delivery note, invoice or photo</span>
      </div>
      <input type="file" id="grn-file" style="display:none" accept=".pdf,.jpg,.jpeg,.png" onchange="el('grn-file-name').textContent=this.files[0]?.name||'No file'">

function calcGRNValue() {

function updateReceiveUnit() {
  const sel = el('rc-item');
  const opt = sel?.options[sel.selectedIndex];
  const unit = opt?.dataset?.unit || '';

async function submitReceiveStock() {
  const itemId = el('rc-item')?.value;

  if (!supplier) { alert('Enter supplier name'); return; }

    clearCache();
    await api('PATCH', `/api/inventory/${itemId}/restock`, {

      supplier_name: supplier, supplier_phone: el('rc-phone')?.value,

}

        </div>
        <div style="background:var(--ink3);border-radius:var(--r-sm);padding:10px;text-align:center">
