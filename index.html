async function showAssetAnalytics() {
  showModal('Fleet Asset Analytics', '<div class="loading-state" style="padding:40px"><div class="spinner"></div></div>');
  try {
    const [vehicles, fuel, requests] = await Promise.all([
      api('GET', '/api/vehicles').catch(() => []),
      api('GET', '/api/fuel').catch(() => []),
      api('GET', '/api/requests').catch(() => []),
    ]);
    const analytics = vehicles.filter(v => v.vehicle_category !== 'staff_bus').map(v => {
      const vFuel = fuel.filter(f => f.plate_number === v.plate_number || f.vehicle_id == v.id);
      const vReqs = requests.filter(r => r.plate_number === v.plate_number);
      const totalFuelCost = vFuel.reduce((s, f) => s + (+f.amount || 0), 0);
      const totalFuelLtrs = vFuel.reduce((s, f) => s + (+f.quantity || 0), 0);
      const totalMaintCost = vReqs.filter(r => ['MAINTENANCE','ENGINE/CONTAINER/TYRE'].includes(r.category)).reduce((s, r) => s + (+r.amount_to_pay || 0), 0);
      const totalKm = vFuel.filter(f => f.distance_km).reduce((s, f) => s + (+f.distance_km || 0), 0);
      const avgKmL = totalFuelLtrs > 0 && totalKm > 0 ? totalKm / totalFuelLtrs : null;
      const totalCost = totalFuelCost + totalMaintCost;
      const costPerKm = totalKm > 0 ? totalCost / totalKm : null;
      return { ...v, totalFuelCost, totalFuelLtrs, totalMaintCost, totalKm, avgKmL, totalCost, costPerKm, fillCount: vFuel.length, reqCount: vReqs.length };
    }).sort((a, b) => b.totalCost - a.totalCost);
    window._analyticsData = analytics;
    const grandTotal = analytics.reduce((s, v) => s + v.totalCost, 0);
    const modal = document.querySelector('.modal');
    if (!modal) return;

function exportAssetAnalytics() {
  const data = window._analyticsData || [];
  if (!data.length) { showToast('No data to export', 'info'); return; }
  const headers = ['Plate','Category','Fuel Cost','Maintenance Cost','Total Cost','Fuel L','KM Tracked','Avg km/L','Cost per KM','Fill-ups','Requests'];
  const rows = [['VMO Fleet Asset Analytics'], ['Generated: ' + new Date().toLocaleString()], [], headers].concat(
    data.map(v => [v.plate_number, v.vehicle_category||'fleet', v.totalFuelCost.toFixed(2), v.totalMaintCost.toFixed(2), v.totalCost.toFixed(2), v.totalFuelLtrs.toFixed(0), v.totalKm.toFixed(0), v.avgKmL?v.avgKmL.toFixed(3):'', v.costPerKm?v.costPerKm.toFixed(0):'', v.fillCount, v.reqCount])
  );
  const csv = rows.map(r => r.map(c => '"' + String(c||'').replace(/"/g,'""') + '"').join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'VMO_Fleet_Analytics_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

let receiptThreshold = 100000;

async function checkReceiptStatus() {
  if (!['accounts','admin','super_admin','real_admin'].includes(user.role)) return;
  try {
    const pending = await api('GET', '/api/receipts/pending').catch(() => []);
    if (pending && pending.length) showReceiptConfirmationPrompt(pending);

    + '</div>'
    + '<button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="closeModal()">Close</button>');

async function confirmReceipt(requestId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('PATCH', '/api/requests/' + requestId + '/confirm-receipt');
    if (btn) { btn.textContent = '\u2705 Confirmed'; btn.style.background = 'var(--green)'; }
  } catch(e) { showToast(e.message, 'info'); if (btn) btn.disabled = false; }
}

async function requestReceipt(requestId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    await api('POST', '/api/requests/' + requestId + '/request-receipt');
    if (btn) { btn.textContent = '\ud83d\udce9 Sent'; btn.style.background = 'var(--amber)'; }
  } catch(e) { showToast(e.message, 'info'); if (btn) btn.disabled = false; }
}

function updateReceiptThreshold() {
  const val = parseFloat(el('threshold-input')?.value);
  if (!val || val < 1000) { showToast('Enter a valid threshold (min \u20a61,000)', 'info'); return; }
  receiptThreshold = val;
  api('POST', '/api/settings/receipt-threshold', { threshold: val }).catch(() => {});
  showToast('\u2705 Threshold updated to ' + fmt(val), 'success');
}

    await api('POST', '/api/fleet/monthly-report', {
      plate_number: plate, report_month: month,
      total_trips: el('mr-trips')?.value || 0,
      days_available: el('mr-avail')?.value || 0,

    });

function getVehicleServiceStatus(v, intervalDays) {
  intervalDays = intervalDays || 90;
  const today = new Date(); today.setHours(0,0,0,0);
  let nextDate = null;

  // Priority: use next_service_date if set, else calculate from last_service_date
  if (v.next_service_date) {
    nextDate = new Date(v.next_service_date);
  } else if (v.last_service_date) {
    nextDate = new Date(v.last_service_date);
    nextDate.setDate(nextDate.getDate() + intervalDays);
  }

  if (!nextDate) return { level: 'ok', nextDate: null, daysLeft: 999, pct: 100 };

  const daysLeft = Math.round((nextDate - today) / (1000*60*60*24));
  const totalWindow = intervalDays;
  const elapsed = totalWindow - daysLeft;
  const pct = Math.max(0, Math.min(100, Math.round((elapsed / totalWindow) * 100)));

  let level = 'ok';
  if (daysLeft < 0) level = 'overdue';
  else if (daysLeft <= 14) level = 'due';

  return { level, nextDate, daysLeft, pct };
}

function filterVehiclesTable(filter) {
  if (filter) {
    document.querySelectorAll('[data-vf]').forEach(b => b.classList.toggle('active', b.dataset.vf===filter));
    window._vehFilter = filter;
  }
  const f = (window._vehFilter||'All').toLowerCase();
  const q = (document.getElementById('veh-search')?.value||'').toLowerCase();
  document.querySelectorAll('.veh-row').forEach(row => {
    const svc = row.dataset.svc;
    const matchFilter = f==='all' || (f==='overdue'&&svc==='overdue') || (f==='due soon'&&svc==='due') || (f==='ok'&&svc==='ok');
    const matchSearch = !q || (row.dataset.search||'').includes(q);
    row.style.display = matchFilter && matchSearch ? '' : 'none';
  });
}

function setNextServiceDate() {
  const days = parseInt(document.getElementById('svc-interval')?.value);
  if (!days) return;
  const svcDate = document.getElementById('svc-date')?.value;
  const base = svcDate ? new Date(svcDate) : new Date();
  base.setDate(base.getDate() + days);
  const next = document.getElementById('svc-next');
  if (next) next.value = base.toISOString().slice(0,10);
}

async function submitConfirmService(id) {
  const svcDate = document.getElementById('svc-date')?.value;
  const nextDate = document.getElementById('svc-next')?.value;
  if (!svcDate) { showToast('Service date is required', 'error'); return; }
  if (!nextDate) { showToast('Next service date is required', 'error'); return; }

  const payload = {
    last_service_date: svcDate,
    next_service_date: nextDate,
    last_service_km: parseInt(document.getElementById('svc-odo')?.value) || undefined,
    service_type: document.getElementById('svc-type')?.value,
    service_cost: parseFloat(document.getElementById('svc-cost')?.value) || undefined,
    service_workshop: document.getElementById('svc-ws')?.value,
    service_parts: document.getElementById('svc-parts')?.value,
    service_notes: document.getElementById('svc-notes')?.value,
  };

  try {
    // Try dedicated service confirm endpoint first
    await api('POST', `/api/vehicles/${id}/service`, payload).catch(async () => {
      // Fallback: PATCH the vehicle record directly
      await api('PATCH', `/api/vehicles/${id}`, {
        last_service_date: payload.last_service_date,
        next_service_date: payload.next_service_date,
        last_service_km: payload.last_service_km,
      });
    });
    clearCache();
    closeModal();
    showToast(`Service logged for ${(window._vehiclesData||[]).find(v=>v.id===id)?.plate_number||'vehicle'}. Next due: ${fmtDate(nextDate)}`, 'success');
    navigate('vehicles');
  } catch(e) { showToast('Could not save: ' + e.message, 'error'); }
}

async function submitComplianceDoc() {
  const vendorSel = el('ncd-vendor')?.value;
  const vendors = await api('GET','/api/vendors').catch(()=>[]);
  const selectedVendor = vendors.find(v=>String(v.id)===vendorSel);
  const payload = {
    doc_type: el('ncd-type')?.value,
    doc_name: el('ncd-name')?.value,
    issue_date: el('ncd-issue')?.value || null,
    expiry_date: el('ncd-expiry')?.value,
    vendor_id: vendorSel && vendorSel!=='__manual' ? vendorSel : null,
    vendor_name: selectedVendor?.company_name || el('ncd-vendor-name')?.value || '',
    policy_number: el('ncd-policy')?.value,
    coverage_amount: el('ncd-coverage')?.value || null,
    notes: el('ncd-notes')?.value,
  };
  if (!payload.doc_name || !payload.expiry_date) { showToast('Document name and expiry date are required', 'error'); return; }
  try {
    await api('POST', '/api/compliance/documents', payload);
    closeModal();
    showToast('Compliance document saved','success');
    navigate('compliance');
  } catch(e) { 
    // Store locally if endpoint not ready
    const local = JSON.parse(localStorage.getItem('vmo_comp_docs')||'[]');
    payload.id = Date.now(); payload.created_at = new Date().toISOString();
    local.push(payload);
    localStorage.setItem('vmo_comp_docs', JSON.stringify(local));
    closeModal();
    showToast('Document saved locally','success');
  }
}

// ── RECEIVABLES ───────────────────────────────────────────────────────────────
async function pgReceivables() {
  html('topbar-btn', `<button class="topbar-action" onclick="showNewReceivable()"><i class="ti ti-plus"></i></button>`);

  const collected = data.filter(r => r.paid).reduce((s,r) => s+(+r.amount||0), 0);

  // Detect duplicate invoice numbers
  const invCount = {};
  data.forEach(r => { const k=(r.invoice_number||'').toLowerCase(); if(k) invCount[k]=(invCount[k]||0)+1; });

  // Apply client filter if set
  const clientFilter = window._filterClient;
  window._filterClient = null;

  html('page-content', `
    <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:14px">
      <div class="stat-card stat-blue"><div class="stat-label">Total</div><div class="stat-value" style="font-size:16px">${fmt(total)}</div></div>
      <div class="stat-card stat-green"><div class="stat-label">Received</div><div class="stat-value" style="font-size:16px">${fmt(collected)}</div></div>
      <div class="stat-card stat-red"><div class="stat-label">Outstanding</div><div class="stat-value" style="font-size:16px">${fmt(total-collected)}</div></div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:6px;overflow-x:auto">
        ${['All','Pending','Received','Overdue'].map(s => `

      </div>
      <div style="flex:1;min-width:140px;display:flex;align-items:center;gap:8px;background:var(--ink2);border:1px solid var(--b2);border-radius:8px;padding:7px 12px">
        <i class="ti ti-search" style="color:var(--t3);font-size:14px"></i>

      </div>
      <select id="rv-client-filter" onchange="filterRvTable()" style="background:var(--ink2);border:1px solid var(--b2);border-radius:8px;padding:7px 12px;color:var(--t1);font-size:12px">
        <option value="">All Clients</option>
        ${clients.map(c => `<option value="${c.id}">${sanitise(c.name)}</option>`).join('')}
      </select>
    </div>

    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--b2)">
      <table id="rv-table" style="width:100%;border-collapse:collapse;font-size:12px;min-width:800px">
        <thead>
          <tr style="background:var(--ink3)">
            ${['Client','Invoice No.','Description','Amount','Due Date','Status','Actions'].map(h =>
              `<th style="padding:10px 12px;text-align:${h==='Amount'?'right':'left'};color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:2px solid var(--b2);font-family:'DM Mono',monospace">${h}</th>`
            ).join('')}
          </tr>
        </thead>
        <tbody id="rv-tbody">
          ${data.map((r, i) => {
            const overdue = !r.paid && r.due_date && new Date(r.due_date) < new Date();
            const isDupInv = (invCount[(r.invoice_number||'').toLowerCase()]||0) > 1;
            const bg = i%2===0 ? 'transparent' : 'rgba(255,255,255,.015)';
            const status = r.paid ? 'received' : overdue ? 'overdue' : 'pending';
            return `<tr class="rv-row" data-status="${status}" data-client="${r.client_id||''}"
              data-search="${[r.client_name||'',r.invoice_number||'',r.description||''].join(' ').toLowerCase()}"
              style="border-bottom:1px solid var(--b2);background:${bg};cursor:pointer;transition:background .15s"
              onmouseover="this.style.background='rgba(79,142,247,.06)'" onmouseout="this.style.background='${bg}'"
              onclick="showReceivableDetail(${r.id})">
              <td style="padding:10px 12px;font-weight:600;color:var(--t1)">${sanitise(r.client_name||'—')}</td>
              <td style="padding:10px 12px;font-family:monospace;color:var(--accent);font-size:11px">
                ${sanitise(r.invoice_number||'—')}
                ${isDupInv?'<span style="color:#ef4444;font-weight:800;font-size:10px;margin-left:4px" title="Duplicate invoice number">⚠ DUP</span>':''}

              <td style="padding:10px 12px;color:var(--t2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${sanitise(r.description||'')}">${sanitise(r.description||'—')}</td>

              <td style="padding:10px 12px;color:${overdue&&!r.paid?'#ef4444':'var(--t3)'};font-size:11px">${fmtDate(r.due_date)}</td>

                <span class="badge badge-${r.paid?'approved':overdue?'declined':'pending'}" style="font-size:10px">

              <td style="padding:10px 12px;white-space:nowrap" onclick="event.stopPropagation()">
                ${!r.paid ? `<button class="btn btn-success btn-sm" style="padding:3px 8px;font-size:11px" onclick="confirmReceipt(${r.id})"><i class="ti ti-check"></i> Confirm</button>` : ''}

        ${data.length ? `
        <tfoot><tr style="background:var(--ink3);border-top:2px solid var(--b2)">
          <td colspan="3" style="padding:9px 12px;font-weight:700;color:var(--t2);font-size:12px">TOTAL — ${data.length} invoices</td>
          <td style="padding:9px 12px;text-align:right;font-weight:800;color:var(--accent);font-size:13px">${fmt(total)}</td>
          <td colspan="3"></td>
        </tr></tfoot>` : ''}
      </table>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-top:8px;text-align:right">${data.filter(r=>!r.paid).length} outstanding · ${data.filter(r=>r.paid).length} received</div>
  `);

  // Apply client filter if coming from clients page
  if (clientFilter) {
    const sel = document.getElementById('rv-client-filter');
    if (sel) { sel.value = clientFilter; filterRvTable(); }
  }
}

function filterRvTable(status) {
  if (status) {
    document.querySelectorAll('[data-rv-f]').forEach(b => b.classList.toggle('active', b.dataset.rvF===status));
    window._rvFilter = status;
  }
  const s = (window._rvFilter || 'All').toLowerCase();
  const q = (document.getElementById('rv-search')?.value||'').toLowerCase();
  const cf = document.getElementById('rv-client-filter')?.value || '';
  document.querySelectorAll('.rv-row').forEach(row => {
    const matchStatus = s==='all' || row.dataset.status === s;
    const matchSearch = !q || (row.dataset.search||'').includes(q);
    const matchClient = !cf || row.dataset.client === cf;
    row.style.display = matchStatus && matchSearch && matchClient ? '' : 'none';
  });
}

async function pgImprest() {

  const isAccounts = ['real_admin','super_admin','admin','accounts'].includes(user.role);

  html('topbar-btn', `

        <i class="ti ti-copy-off"></i> Fix Duplicates
      </button>` : ''}

  html('page-content', `

      <span class="spinner" style="margin-right:6px"></span> Loading Imprest Accounts…
    </div>`);



  const [accounts, retirements, vendors] = await Promise.all([
    api('GET', '/api/imprest').catch(() => null),
    api('GET', '/api/imprest/retirements').catch(() => []),
    api('GET', '/api/vendors').catch(() => []),
  ]);

  // Graceful error state if imprest accounts fail to load
  if (!accounts) {
    html('page-content', `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                  padding:60px 20px;text-align:center;gap:12px">
        <div style="font-size:48px">💼</div>
        <div style="font-weight:700;font-size:16px;color:var(--text)">Couldn't load imprest accounts</div>
        <div style="font-size:13px;color:var(--text3);max-width:320px;line-height:1.6">
          We had trouble connecting to the server. This is usually temporary —
          please try again in a moment.
        </div>
        <button class="btn btn-primary" onclick="pgImprest()" style="margin-top:8px">
          <i class="ti ti-refresh"></i> Retry
        </button>
      </div>`);
    return;
  }

  const petrolVendors = vendors.filter(v =>
    (v.vendor_type || v.type || '').toLowerCase().includes('petrol') ||
    (v.products_services || '').toLowerCase().includes('fuel') ||
    (v.products_services || '').toLowerCase().includes('diesel') ||
    (v.products_services || '').toLowerCase().includes('petrol')
  );

  const total        = accounts.reduce((s, i) => s + (+i.balance || 0), 0);
  const pendingRetire = retirements.filter(r => r.status === 'pending').length;

  html('page-content', `
    <!-- ── Summary banner ── -->
    <div style="background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(124,58,237,.08));border:1px solid rgba(201,168,76,.2);border-radius:var(--r-md);padding:18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3)">Total Imprest Float</div>
        <div style="font-size:32px;font-weight:900;color:var(--t1);line-height:1.1">${fmt(total)}</div>
        <div style="font-size:12px;color:var(--t3);margin-top:2px">Across ${accounts.length} account${accounts.length !== 1 ? 's' : ''}</div>
      </div>
      ${pendingRetire > 0 ? `
      <div style="background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.25);border-radius:var(--r-sm);padding:10px 14px;text-align:center">
        <div style="font-size:10px;color:var(--amber);font-weight:700;text-transform:uppercase">Awaiting Retirement</div>
        <div style="font-size:24px;font-weight:900;color:var(--amber)">${pendingRetire}</div>
        <div style="font-size:10px;color:var(--amber)">request${pendingRetire > 1 ? 's' : ''}</div>
      </div>` : ''}
    </div>

    <!-- ── Tabs ── -->
    <div style="display:flex;gap:6px;margin-bottom:14px">
      <button class="group-chip active" data-itab="accounts" onclick="switchImprestTab('accounts')">Accounts</button>
      <button class="group-chip" data-itab="retirements" onclick="switchImprestTab('retirements')">Retirement Requests</button>
    </div>

    <!-- ── Accounts tab ── -->
    <div id="itab-accounts">

function switchImprestTab(tab) {
  document.querySelectorAll('[data-itab]').forEach(b => b.classList.toggle('active', b.dataset.itab === tab));
  ['accounts','retirements'].forEach(t => {
    const el_ = document.getElementById('itab-' + t);
    if (el_) el_.style.display = t === tab ? '' : 'none';
  });
}

// Link an imprest account to a petrol station vendor
// ── Create new imprest account ────────────────────────────────────────────────
async function showNewImprest() {
  const vendors = await api('GET', '/api/vendors').catch(() => []);
  const petrolVendors = vendors.filter(v =>
    (v.vendor_type || '').toLowerCase().includes('petrol') ||

    (v.products_services || '').toLowerCase().includes('diesel')
  );

  showModal('New Imprest Account', `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Account Name *</label>
        <input class="form-input" id="ni-label" placeholder="e.g. Imprest 4 — Operations">
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select class="form-input" id="ni-type" onchange="toggleFuelFloatSection()">
          <option value="personal">Personal / Staff</option>
          <option value="operational">Operational</option>
          <option value="fuel_float">Fuel Float (linked to petrol station)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Account Holder Name</label>
        <input class="form-input" id="ni-holder" placeholder="e.g. Richard Adetuwo">
      </div>
      <div class="form-group">
        <label class="form-label">Bank</label>
        <input class="form-input" id="ni-bank" placeholder="e.g. Zenith Bank">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Opening Balance (₦)</label>
        <input class="form-input" type="number" id="ni-balance" placeholder="0" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select class="form-input" id="ni-currency">
          <option value="NGN">NGN — Nigerian Naira</option>
          <option value="USD">USD — US Dollar</option>
        </select>
      </div>
    </div>

    <!-- Fuel float section — shown only for fuel_float type -->
    <div id="ni-fuel-section" style="display:none;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:12px;margin-top:4px">
      <div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:10px">
        ⛽ Link to Petrol Station Vendor
      </div>
      <div class="form-group">
        <label class="form-label">Petrol Station</label>
        <select class="form-input" id="ni-vendor">
          <option value="">— Select vendor —</option>
          ${petrolVendors.map(v => `<option value="${v.id}">⛽ ${sanitise(v.company_name || v.name)}</option>`).join('')}
          ${vendors.filter(v => !petrolVendors.includes(v)).map(v => `<option value="${v.id}">${sanitise(v.company_name || v.name)}</option>`).join('')}
        </select>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-primary btn-block" id="ni-btn" onclick="submitNewImprest()">
        <i class="ti ti-wallet"></i> Create Account
      </button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

function toggleFuelFloatSection() {
  const type = el('ni-type')?.value;
  const sec  = el('ni-fuel-section');
  if (sec) sec.style.display = type === 'fuel_float' ? 'block' : 'none';
}

async function submitNewImprest() {
  const label = el('ni-label')?.value?.trim();
  if (!label) { showToast('Account name is required', 'error'); el('ni-label')?.focus(); return; }

  const btn = el('ni-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating…'; }

  const payload = {
    label,
    account_type:     el('ni-type')?.value     || 'personal',
    holder_name:      el('ni-holder')?.value?.trim() || '',
    bank_name:        el('ni-bank')?.value?.trim()   || '',
    balance:          parseFloat(el('ni-balance')?.value) || 0,
    currency:         el('ni-currency')?.value  || 'NGN',
    linked_vendor_id: el('ni-vendor')?.value    || null,
    status:           'active',
  };

  try {
    clearCache();
    await api('POST', '/api/imprest', payload);
    closeModal();
    showToast('Imprest account created ✓', 'success');
    pgImprest();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-wallet"></i> Create Account'; }
    showToast(e.message || 'Could not create account', 'error');
  }
}

// ── Imprest stats overview ─────────────────────────────────────────────────
async function showImprestStats() {
  const [accounts, retirements] = await Promise.all([
    api('GET', '/api/imprest').catch(() => []),
    api('GET', '/api/imprest/retirements').catch(() => []),
  ]);

  const total      = accounts.reduce((s, a) => s + (+a.balance || 0), 0);
  const fuelFloats = accounts.filter(a => a.account_type === 'fuel_float');
  const fuelTotal  = fuelFloats.reduce((s, a) => s + (+a.balance || 0), 0);
  const pending    = retirements.filter(r => r.status === 'pending');
  const pendingAmt = pending.reduce((s, r) => s + (+r.amount || 0), 0);
  const approved30 = retirements.filter(r => {
    if (r.status !== 'approved') return false;
    return new Date(r.updated_at) > new Date(Date.now() - 30 * 86400000);
  });
  const approved30Amt = approved30.reduce((s, r) => s + (+r.amount || 0), 0);

  showModal('Imprest Overview', `
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card stat-gold">
        <div class="stat-label">Total Float</div>
        <div class="stat-value" style="font-size:18px">${fmt(total)}</div>
        <div class="stat-sub">${accounts.length} accounts</div>
      </div>
      <div class="stat-card stat-green">
        <div class="stat-label">Fuel Floats</div>
        <div class="stat-value" style="font-size:18px">${fmt(fuelTotal)}</div>
        <div class="stat-sub">${fuelFloats.length} linked</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">Pending Retirements</div>
        <div class="stat-value">${pending.length}</div>
        <div class="stat-sub">${fmt(pendingAmt)}</div>
      </div>
      <div class="stat-card stat-blue">
        <div class="stat-label">Approved (30d)</div>
        <div class="stat-value">${approved30.length}</div>
        <div class="stat-sub">${fmt(approved30Amt)}</div>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Account</th><th>Holder</th><th>Bank</th><th>Type</th><th style="text-align:right">Balance</th><th>Status</th></tr></thead>
        <tbody>
          ${accounts.map(a => `<tr>
            <td><strong>${sanitise(a.label || a.name)}</strong></td>
            <td>${sanitise(a.holder_name || '—')}</td>
            <td>${sanitise(a.bank_name || '—')}</td>
            <td><span style="font-size:10px;padding:2px 6px;border-radius:8px;background:rgba(201,168,76,.12);color:var(--gold)">${a.account_type || 'personal'}</span></td>
            <td style="text-align:right;font-weight:700;color:${+a.balance>0?'var(--green)':'var(--red)'}">${fmt(a.balance)}</td>
            <td><span style="font-size:10px;padding:2px 6px;border-radius:8px;background:rgba(34,197,94,.12);color:#4ade80">${a.status || 'active'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn btn-ghost btn-block btn-sm" style="margin-top:12px" onclick="closeModal()">Close</button>
  `, 'lg');
}

    : '');

  const locs = await api('GET', '/api/store/locations').catch(() => []);
  window._storeLocations = locs.length ? locs.map(l => l.name) : ['Lagos','Benin','Onitsha'];

  html('page-content', `
    <div style="margin-bottom:14px;font-size:12px;color:var(--text3)">
      Store locations define the depots where inventory is held.
      Each inventory item is assigned to a location.
      ${isAdmin ? 'Create, edit or delete locations below.' : ''}
    </div>

    ${locs.length ? locs.map(loc => `
    <div class="card" style="margin-bottom:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-weight:700;font-size:14px">${sanitise(loc.name)}</div>
        ${loc.address ? `<div style="font-size:12px;color:var(--text3)">${sanitise(loc.address)}</div>` : ''}
        ${loc.manager_name ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">Manager: ${sanitise(loc.manager_name)}</div>` : ''}
      </div>
      ${isAdmin ? `
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="showEditLocation(${loc.id},'${sanitise(loc.name)}','${sanitise(loc.address||'')}','${sanitise(loc.manager_name||'')}')">
          <i class="ti ti-pencil"></i>
        </button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteLocation(${loc.id},'${sanitise(loc.name)}')">
          <i class="ti ti-trash"></i>
        </button>
      </div>` : ''}
    </div>`) .join('') : `
    <div class="empty-state">
      <div class="empty-icon"><i class="ti ti-map-pin"></i></div>

      <div class="empty-sub">${isAdmin ? 'Click + to add your first location' : 'No locations configured'}</div>

function showNewLocation(editData) {
  const isEdit = !!editData;
  showModal(isEdit ? 'Edit Location' : 'Add Store Location', `
    <div class="form-group">
      <label class="form-label">Location Name *</label>
      <input class="form-input" id="sl-name" placeholder="e.g. Lagos, Benin, Onitsha" value="${isEdit ? sanitise(editData.name) : ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Address</label>
      <input class="form-input" id="sl-addr" placeholder="Full address (optional)" value="${isEdit ? sanitise(editData.address||'') : ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Location Manager</label>
      <input class="form-input" id="sl-mgr" placeholder="Manager name (optional)" value="${isEdit ? sanitise(editData.manager||'') : ''}">
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary btn-block" onclick="saveLocation(${isEdit ? editData.id : 'null'})">

function showEditLocation(id, name, address, manager) {
  showNewLocation({ id, name, address, manager });
}

async function saveLocation(id) {
  const name = el('sl-name')?.value?.trim();
  if (!name) { showToast('Location name is required', 'error'); return; }
  try {
    clearCache();
    if (id) {
      await api('PATCH', `/api/store/locations/${id}`, {
        name, address: el('sl-addr')?.value?.trim(), manager_name: el('sl-mgr')?.value?.trim()
      });
      showToast('Location updated ✓', 'success');
    } else {
      await api('POST', '/api/store/locations', {
        name, address: el('sl-addr')?.value?.trim(), manager_name: el('sl-mgr')?.value?.trim()
      });
      showToast('Location added ✓', 'success');
    }
    closeModal();
    pgLocations();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteLocation(id, name) {
  showConfirmModal('Delete Location', `Delete location "${name}"? Inventory items here will not be deleted.`, async () => {
    try {
      clearCache();
      await api('DELETE', `/api/store/locations/${id}`);
      showToast('Location removed. Inventory items here are unaffected.', 'success');
      pgLocations();
    } catch(e) { showToast(e.message, 'error'); }
  }, { danger: true });
}

async function confirmDeleteImprest(id, permanent) {

    const result = await api('DELETE', url);
    closeModal();
    showToast(result.message || (permanent ? 'Account permanently deleted.' : 'Account archived successfully.'),
              permanent ? 'info' : 'success');
    pgImprest(); // Refresh the list
  } catch(e) {
    showToast(e.message || 'Could not delete this account. Please try again.', 'error');
  }
}

async function createPetrolStationImprest(vendorId, vendorName) {
  try {

    const existing2 = await api('GET','/api/imprest').catch(()=>[]);

      String(a.vendor_id) === String(vendorId) ||
      (a.name||'').toLowerCase().includes(vendorName.toLowerCase().slice(0,15))
    );
    if (alreadyExists) return; // already exists, do not create another

    const r = await api('POST','/api/imprest', {
      name: vendorName + ' — Fuel Float',
      holder_type: 'unit',
      holder_name: vendorName,
      vendor_id: vendorId,
      dedicated_category: 'FUEL',
      balance: 0,
      original_balance: 0,
      status: 'active',
    });
    showToast('Imprest account created for ' + vendorName, 'success');
    showPetrolImprestDetail(r, vendorName);
  } catch(e) { showToast(e.message||'Failed to create imprest', 'error'); }
}

function calcTopUpLitres() {
  const amt = parseFloat(el('tu-amount')?.value) || 0;
  const dr  = parseFloat(el('tu-diesel-rate')?.value) || 0;
  const pr  = parseFloat(el('tu-petrol-rate')?.value) || 0;
  const preview = el('tu-litres-preview');
  if (!preview) return;
  if (amt > 0 && (dr > 0 || pr > 0)) {
    preview.style.display = 'block';
    const dLitres = el('tu-litres-diesel');
    const pLitres = el('tu-litres-petrol');
    if (dLitres) dLitres.textContent = dr > 0 ? Math.floor(amt / dr).toLocaleString() + 'L' : '—';
    if (pLitres) pLitres.textContent = pr > 0 ? Math.floor(amt / pr).toLocaleString() + 'L' : '—';
  } else {
    preview.style.display = 'none';
  }
}

async function submitTopUp(accountId) {
  const amount = parseFloat(el('tu-amount')?.value);
  const dieselRate = parseFloat(el('tu-diesel-rate')?.value) || null;
  const petrolRate = parseFloat(el('tu-petrol-rate')?.value) || null;

  if (!amount || amount <= 0) {
    showToast('Enter a valid funding amount', 'error');
    el('tu-amount')?.focus();
    return;
  }
  if (!dieselRate && !petrolRate) {
    showToast('Enter at least one fuel rate (diesel or petrol)', 'error');
    return;
  }

  try {
    clearCache();
    await api('POST', `/api/imprest/${accountId}/fund`, {
      amount,
      diesel_rate:  dieselRate,
      petrol_rate:  petrolRate,
      funding_date: el('tu-date')?.value || new Date().toISOString().slice(0,10),
      notes:        el('tu-notes')?.value?.trim() || '',
      funded_by:    user.full_name || user.name,
    });
    // Also update the vendor's rates for future reference
    if (dieselRate || petrolRate) {
      // rates saved in funding record — vendor can update their own price separately
    }
    closeModal();
    showToast('Account funded ✓', 'success');
    pgImprest();
  } catch(e) {
    showToast(e.message || 'Could not process funding', 'error');
  }
}

function addExpenseRow() {
  const rows = el('exp-rows');
  if (!rows) return;
  const div = document.createElement('div');
  div.className = 'exp-row';
  div.style.cssText = 'display:grid;grid-template-columns:1fr 80px 28px;gap:6px;margin-bottom:6px';
  div.innerHTML = `<input class="form-input" placeholder="Expense description" style="font-size:12px" oninput="calcRetireTotal()"><input class="form-input" type="number" placeholder="₦" style="font-size:12px" oninput="calcRetireTotal()"><button onclick="this.closest('.exp-row').remove();calcRetireTotal()" style="background:none;border:none;color:var(--crimson);cursor:pointer;font-size:18px">×</button>`;
  rows.appendChild(div);
}
function calcRetireTotal() {
  const amts = [...document.querySelectorAll('#exp-rows input[type=number]')].map(i => parseFloat(i.value)||0);
  const tot = amts.reduce((a,b)=>a+b,0);
  const el2 = el('retire-total');
  if (el2) el2.textContent = '₦' + tot.toLocaleString();
}
function triggerRetireDocs() { el('retire-docs-input')?.click(); }
function onRetireDocsChange(e) {
  const files = [...e.target.files];
  const list = el('retire-docs-list');
  if (list) list.innerHTML = files.map(f=>`<div style="font-size:11px;color:var(--t3);padding:2px 0"><i class="ti ti-file"></i> ${sanitise(f.name)}</div>`).join('');

async function submitRetirement(accountId) {
  const rows = [...document.querySelectorAll('#exp-rows .exp-row')];
  const expenses = rows.map(r => {
    const inputs = r.querySelectorAll('input');
    return { desc: inputs[0]?.value||'', amount: parseFloat(inputs[1]?.value)||0 };
  }).filter(e => e.desc && e.amount > 0);
  const total = expenses.reduce((s,e) => s + e.amount, 0);
  const purpose = el('ret-purpose')?.value?.trim();
  if (!purpose) { showToast('Purpose is required', 'error'); return; }
  if (!expenses.length) { showToast('Add at least one expense line', 'info'); return; }
  try {
    clearCache();
    await api('POST', `/api/imprest/${accountId}/retire`, {
      amount_retired: total,
      purpose,
      period_from: el('ret-from')?.value,
      period_to: el('ret-to')?.value,
      expenses_breakdown: JSON.stringify(expenses),
    });
    closeModal();
    showToast('Retirement submitted — awaiting Accounts approval', 'success');
    navigate('imprest');
  } catch(e) { showToast(e.message, 'info'); }
}

// ──────────────────────────────────────────────────────────────────────────────
async function pgInventory() {
  // Load store locations first so dropdowns are populated
  const locs = await api('GET', '/api/store/locations').catch(() => []);
  window._storeLocations = locs.length ? locs.map(l => l.name) : ['Lagos','Benin','Onitsha'];

    <div style="display:flex;gap:6px">

    </div>`);

  const [data, drivers, vehicles] = await Promise.all([
    api('GET','/api/inventory'),
    api('GET','/api/drivers').catch(()=>[]),
    api('GET','/api/vehicles').catch(()=>[])
  ]);
  window._inv = {drivers, vehicles};

  const low = data.filter(i => parseFloat(i.quantity) <= parseFloat(i.reorder_level));
  const totalValue = data.reduce((s,i) => s + ((+i.quantity||0) * (+i.unit_cost||0)), 0);
  const totalItems = data.length;

  html('page-content', `
    <!-- Store Summary -->
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card stat-blue"><div class="stat-label">Total SKUs</div><div class="stat-value">${totalItems}</div></div>
      <div class="stat-card ${low.length?'stat-red':'stat-green'}"><div class="stat-label">Low Stock</div><div class="stat-value">${low.length}</div></div>
      <div class="stat-card stat-gold"><div class="stat-label">Store Value</div><div class="stat-value" style="font-size:18px">${fmt(totalValue)}</div></div>
      <div class="stat-card stat-purple"><div class="stat-label">Depots</div><div class="stat-value">3</div></div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap">
      ${['All',...(window._storeLocations||['Lagos','Benin','Onitsha'])].map(d=>`<button class="group-chip ${d==='All'?'active':''}" onclick="filterInv('${d}')" data-depot="${d}">${d}</button>`).join('')}
      <div style="flex:1;min-width:140px;display:flex;align-items:center;gap:8px;background:var(--ink3);border:1px solid var(--b2);border-radius:22px;padding:6px 12px;margin-left:4px">

      </div>
    </div>

    <!-- Items Table -->
    <div class="table-wrap">
      <table class="data-table" style="min-width:820px">
        <thead><tr>
          <th>Item</th><th>Category</th><th>Depot</th>
          <th style="text-align:right">Qty</th><th>Unit</th>
          <th style="text-align:right">Unit Cost (₦)</th>
          <th style="text-align:right">Total Value (₦)</th>
          <th>Reorder At</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="store-tbody">
          ${renderStoreRows(data, isSuperAdmin)}
        </tbody>
        <tfoot>
          <tr style="background:var(--ink3);border-top:1px solid var(--b1)">
            <td colspan="6" style="padding:10px 14px;font-weight:700;color:var(--t2);font-size:12px">TOTAL STORE VALUE</td>
            <td style="padding:10px 14px;text-align:right;font-weight:900;color:var(--gold);font-size:14px;font-family:'Fraunces',serif">${fmt(totalValue)}</td>
            <td colspan="3"></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <!-- Soft-deleted items (super admin) -->
    ${isSuperAdmin ? `
    <div style="margin-top:20px">
      <button class="btn btn-ghost btn-sm" onclick="toggleDeletedItems()" id="show-deleted-btn" style="font-size:11px;color:var(--t4)">
        <i class="ti ti-trash"></i> Show Deleted Items
      </button>
      <div id="deleted-items-panel" style="display:none;margin-top:10px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:8px;font-family:'DM Mono',monospace">Soft-Deleted — Audit Trail (Reversible)</div>

      </div>
    </div>` : ''}
  `);
}

function renderStoreRows(data, isSuperAdmin) {
  if (!data.length) return `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--t3)">No items in store</td></tr>`;
  return data.map(i => {
    const isLow = parseFloat(i.quantity) <= parseFloat(i.reorder_level);
    const totalVal = (+i.quantity||0) * (+i.unit_cost||0);
    return `<tr data-idepot="${sanitise(i.depot)}" data-iname="${sanitise(i.name).toLowerCase()}">
      <td style="font-weight:600;color:var(--t1)">${sanitise(i.name)}</td>
      <td><span class="badge badge-gold" style="font-size:9px">${sanitise(i.category||'General')}</span></td>
      <td style="color:var(--t3)">${sanitise(i.depot||'—')}</td>
      <td style="text-align:right;font-weight:700;color:${isLow?'var(--crimson)':'var(--t1)'}${isLow?' font-style:italic':''}">${i.quantity}</td>
      <td style="color:var(--t3)">${sanitise(i.unit||'—')}</td>
      <td style="text-align:right;color:var(--t2);font-family:'DM Mono',monospace">${i.unit_cost ? fmt(i.unit_cost) : '<span style="color:var(--t4)">—</span>'}</td>
      <td style="text-align:right;font-weight:700;color:var(--gold);font-family:'DM Mono',monospace">${totalVal > 0 ? fmt(totalVal) : '<span style="color:var(--t4)">—</span>'}</td>
      <td style="color:var(--t4)">${i.reorder_level} ${sanitise(i.unit||'')}</td>
      <td>${isLow ? '<span class="badge badge-declined" style="animation:pulse 2s infinite">LOW STOCK</span>' : '<span class="badge badge-approved">OK</span>'}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" style="padding:4px 8px;font-size:10px" onclick="showIssueItem(${i.id},'${sanitise(i.name)}','${sanitise(i.unit||'')}')"><i class="ti ti-arrow-up-right"></i> Issue (SRN)</button>
          <button class="btn btn-ghost btn-sm" style="padding:4px 8px;font-size:10px" onclick="showItemHistory(${i.id},'${sanitise(i.name)}')"><i class="ti ti-history"></i> Log</button>
          ${isSuperAdmin ? `<button class="btn btn-danger btn-sm" style="padding:4px 8px;font-size:10px" onclick="softDeleteItem(${i.id},'${sanitise(i.name)}')"><i class="ti ti-trash"></i></button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterInv(depot) {
  document.querySelectorAll('[data-depot]').forEach(b => b.classList.toggle('active', b.dataset.depot===depot));
  window._storeDepotFilter = depot;
  applyStoreFilters();
}
function filterInvSearch() {
  applyStoreFilters();
}
function applyStoreFilters() {
  const depot = window._storeDepotFilter || 'All';
  const q = (el('store-search')?.value || '').toLowerCase();
  document.querySelectorAll('#store-tbody tr[data-idepot]').forEach(row => {
    const matchDepot = depot === 'All' || row.dataset.idepot === depot;
    const matchSearch = !q || (row.dataset.iname||'').includes(q);
    row.style.display = matchDepot && matchSearch ? '' : 'none';
  });
}

    <div class="form-group"><label class="form-label">Issued To (Driver)</label>

async function submitIssueItem(id) {
  const qty = el('is-qty')?.value;
  const purpose = el('is-purpose')?.value?.trim();
  if (!qty || parseFloat(qty) <= 0) { showToast('Enter a valid quantity', 'info'); return; }
  if (!purpose) { showToast('Enter the purpose/usage reason', 'info'); return; }
  try {
    delete cache['GET/api/inventory'];
    await api('POST', `/api/inventory/${id}/issue`, {
      quantity: qty, vehicle_id: el('is-vehicle')?.value||null,
      driver_id: el('is-driver')?.value||null, purpose, notes: el('is-notes')?.value,
    });
    closeModal(); navigate('inventory');
  } catch(e) { showToast(e.message, 'info'); }
}

      <div style="border:1px dashed var(--b1);border-radius:var(--r-sm);padding:10px;text-align:center;cursor:pointer" onclick="el('grn-file').click()">
        <i class="ti ti-paperclip" style="color:var(--t3)"></i>
        <span id="grn-file-name" style="font-size:11px;color:var(--t3);margin-left:6px">Attach delivery note, invoice or photo</span>

    sel.innerHTML = '<option value="">— Select item —</option>' +
      items.map(i=>`<option value="${i.id}" data-unit="${sanitise(i.unit||'')}" data-cost="${i.unit_cost||0}">${sanitise(i.name)} (${sanitise(i.depot)}) — ${i.quantity} ${sanitise(i.unit||'')} in stock</option>`).join('');

function calcGRNValue() {
  const qty = parseFloat(el('rc-qty')?.value||0);
  const cost = parseFloat(el('rc-ucost')?.value||0);
  const el2 = el('grn-value');
  if (el2) el2.textContent = '₦' + (qty*cost).toLocaleString();
}
function updateReceiveUnit() {
  const sel = el('rc-item');
  const opt = sel?.options[sel.selectedIndex];
  const unit = opt?.dataset?.unit || '';
  const cost = opt?.dataset?.cost || '';
  const hint = el('rc-unit-hint');
  if (hint) hint.textContent = unit ? `Unit: ${unit}` : '';
  const costEl = el('rc-ucost');
  if (costEl && cost) costEl.value = cost;
  calcGRNValue();
}
async function submitReceiveStock() {
  const itemId = el('rc-item')?.value;
  const qty = el('rc-qty')?.value;
  const supplier = el('rc-supplier')?.value?.trim();
  if (!itemId) { showToast('Select an item', 'info'); return; }
  if (!qty || parseFloat(qty) <= 0) { showToast('Enter quantity received', 'info'); return; }
  if (!supplier) { showToast('Enter supplier name', 'info'); return; }
  try {
    clearCache();
    await api('PATCH', `/api/inventory/${itemId}/restock`, {
      quantity: qty, unit_cost: el('rc-ucost')?.value,
      supplier_name: supplier, supplier_phone: el('rc-phone')?.value,
      waybill_number: el('rc-waybill')?.value, invoice_number: el('rc-invoice')?.value,
      received_by: el('rc-recvby')?.value, notes: el('rc-notes')?.value,
    });
    closeModal(); navigate('inventory');
    showToast(`✅ GRN created — ${qty} units added`, 'success');
  } catch(e) { showToast(e.message, 'info'); }
}

// Super admin soft-delete — reversible via audit trail
async function softDeleteItem(id, name) {
  if (!['real_admin','super_admin'].includes(user.role)) { showToast('Only Super Admin can delete store items', 'info'); return; }
  showInputModal(`Delete Store Item`, `Reason for deleting "${name}"? This is audited and reversible.`, async (reason) => {
    if (!reason) return;
  try {
    await api('DELETE', `/api/inventory/${id}`, { reason });
    showToast(`"${name}" removed from store. Audit record retained.`, 'success');
    navigate('inventory');
  } catch(e) { showToast(e.message, 'info'); }
  });
}

async function toggleDeletedItems() {
  const panel = el('deleted-items-panel');
  const btn = el('show-deleted-btn');
  if (!panel) return;
  if (panel.style.display === 'none') {
    panel.style.display = '';
    btn.innerHTML = '<i class="ti ti-eye-off"></i> Hide Deleted Items';
    const list = el('deleted-items-list');
    try {
      const data = await api('GET', '/api/inventory/deleted');
      if (!list) return;
      list.innerHTML = data.length ? data.map(item => `
        <div class="list-item" style="border-left:3px solid var(--crimson);opacity:.85">
          <div class="list-dot red"><i class="ti ti-trash"></i></div>
          <div class="list-body">
            <div class="list-title" style="color:var(--t2)">${sanitise(item.name)} <span style="font-size:10px;color:var(--t4)">(${sanitise(item.depot||'')})</span></div>
            <div class="list-sub">Deleted by ${sanitise(item.deleted_by_name||'—')} on ${fmtDate(item.deleted_at)}</div>
            <div class="list-sub">Reason: ${sanitise(item.delete_reason||'Not specified')}</div>
          </div>
          <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="restoreItem(${item.id},'${sanitise(item.name)}')">
            <i class="ti ti-arrow-back-up"></i> Restore
          </button>
        </div>`).join('') : '<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">No deleted items</div>';
    } catch(e) { if (list) list.innerHTML = `<div class="alert alert-danger">${sanitise(e.message)}</div>`; }
  } else {
    panel.style.display = 'none';
    btn.innerHTML = '<i class="ti ti-trash"></i> Show Deleted Items';
  }
}

async function restoreItem(id, name) {
  showConfirmModal('Restore Item', `Restore "<strong>${name}</strong>" to active store?`, async () => {
  try {
    await api('PATCH', `/api/inventory/${id}/restore`);
    showToast(`"${name}" restored to store`, 'success');
    navigate('inventory');
  } catch(e) { showToast(e.message, 'info'); }
  });
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
let activeGroupId = null;
let activeGroupName = '';
let replyingTo = null;

async function pgChat() {
  html('page-content', `<div class="loading-state"><div class="spinner"></div><p style="color:var(--text3);font-size:13px">Loading chat...</p></div>`);

  const [groups, users] = await Promise.all([
    api('GET', '/api/chat/groups').catch(() => []),
    api('GET', '/api/users').catch(() => [])
  ]);

  window._chatUsers = users;
  window._chatGroups = groups;

  if (!activeGroupId && groups.length) activeGroupId = groups[0].id;

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      ${['super_admin','admin','real_admin'].includes(user.role) ? `<button class="btn btn-ghost btn-sm" onclick="showCreateGroup()" style="font-size:11px"><i class="ti ti-users-plus"></i> Group</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="showDMUser()" style="font-size:11px"><i class="ti ti-message-plus"></i> DM</button>
    </div>`);

  if (!groups.length) {
    html('page-content', `<div class="empty-state">
      <div class="empty-icon"><i class="ti ti-message-off"></i></div>
      <div class="empty-title">No chat groups yet</div>
      <div class="empty-sub">Create a group using the Group button above</div>
    </div>`);
    return;
  }

  html('page-content', `<div style="margin:-16px;margin-bottom:-80px" id="chat-shell">
    <div id="chat-group-tabs" style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2)">
      ${groups.map(g => `<div class="group-chip ${activeGroupId===g.id?'active':''}" onclick="openChatGroup(${g.id},'${(g.name||'').replace(/'/g,"\'")}')">
        ${g.is_dm?'💬':g.closed?'🔒':''} ${g.name}
      </div>`).join('')}
    </div>
    <div id="chat-body" style="display:flex;flex-direction:column;height:calc(100dvh - 56px - 60px - 56px)">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>`);
}

function renderChatShell(groups, users) {

  // Filter groups based on role - drivers only see groups they're members of
  const visibleGroups = user.role === 'driver'
    ? groups.filter(g => g.is_member || g.name.toLowerCase().includes('fuel'))
    : groups;

  if (!activeGroupId && visibleGroups.length) activeGroupId = visibleGroups[0].id;

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      ${['real_admin','super_admin','admin'].includes(user.role) ? `<button class="btn btn-ghost btn-sm" onclick="showCreateGroup()" style="font-size:11px"><i class="ti ti-users-plus"></i> Group</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="showDMUser()" style="font-size:11px"><i class="ti ti-message-plus"></i> DM</button>
    </div>`);

  html('page-content', `
    <div style="margin:-16px;margin-bottom:-80px">
      <!-- Group chips -->
      <div style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2)">
        ${visibleGroups.map(g => `
          <div class="group-chip ${activeGroupId===g.id?'active':''}" onclick="openChatGroup(${g.id},'${g.name.replace(/'/g,"\'")}')">
            ${g.closed?'🔒 ':''}${g.name}
          </div>`).join('')}
      </div>

      <!-- Chat area -->
      <div id="chat-body" style="display:flex;flex-direction:column;height:calc(100dvh - 56px - 60px - 56px)">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>`);

  if (activeGroupId) loadChatGroup(activeGroupId);
}

async function openChatGroup(id, name) {
  subscribeChatChannel(id);
  activeGroupId = id;
  activeGroupName = name;
  replyingTo = null;
  document.querySelectorAll('.group-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim().replace('🔒 ','') === name || c.onclick?.toString().includes(`(${id},`));
  });
  await loadChatGroup(id);
}

async function loadChatGroup(id) {
  const msgs = await api('GET', `/api/chat/groups/${id}/messages`);
  // Mark as read
  delete cache[`GET/api/chat/groups/${id}/messages`];

  const chatBody = el('chat-body');
  if (!chatBody) return;

  chatBody.innerHTML = `
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px">
      ${msgs.length ? msgs.map(m => renderMsg(m)).join('') :
        '<div style="text-align:center;color:var(--text3);font-size:13px;padding:40px 20px">No messages yet. Start the conversation! 👋</div>'}
    </div>
    <!-- Reply preview -->
    <div id="reply-preview" style="display:none;background:var(--bg3);padding:8px 16px;border-top:1px solid var(--border);border-left:3px solid var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;color:var(--accent);font-weight:700">Replying to <span id="reply-name"></span></div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px" id="reply-text"></div>
        </div>
        <button onclick="cancelReply()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px">✕</button>
      </div>
    </div>
    <!-- Input bar -->
    <div style="padding:10px 12px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:center;padding-bottom:max(10px,env(safe-area-inset-bottom))">
      <div style="flex:1;position:relative">
        <input id="chat-input" class="chat-input" placeholder="Message ${activeGroupName}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}" style="padding-right:40px">
        <button onclick="showMentionPicker()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">@</button>
      </div>
      <button onclick="triggerFileUpload()" style="width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">
        <i class="ti ti-paperclip" style="font-size:16px"></i>
      </button>
      <button onclick="sendChatMsg()" style="width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <i class="ti ti-send" style="font-size:18px"></i>
      </button>
    </div>`;

  const msgs2 = el('chat-msgs');
  if (msgs2) msgs2.scrollTop = msgs2.scrollHeight;
}

function renderMsg(m) {
  const isMe = m.user_id === user.id;
  const time = fmtTime(m.created_at);
  const date = fmtDate(m.created_at);
  let tagged = [];
  try { tagged = Array.isArray(m.tagged_users) ? m.tagged_users : JSON.parse(m.tagged_users||'[]'); } catch {}
  const mentionedMe = tagged.some(t => t.id === user.id);
  if (!window._msgStore) window._msgStore = {};
  window._msgStore[m.id] = m;

  const parts = [];
  parts.push(`<div id="msg-${m.id}" style="display:flex;flex-direction:column;${isMe?'align-items:flex-end':'align-items:flex-start'}">`);
  if (!isMe) parts.push(`<div style="font-size:10px;color:var(--text3);margin-bottom:3px;padding:0 4px">${m.user_name||'Unknown'} · ${date}</div>`);
  if (m.reply_to_id) {
    parts.push(`<div style="background:var(--bg4);border-left:2px solid var(--accent);border-radius:6px;padding:4px 8px;margin-bottom:3px;font-size:11px;color:var(--text3);max-width:240px;cursor:pointer" onclick="scrollToMsg(${m.reply_to_id})"><span style="color:var(--accent);font-weight:700">${m.reply_to_name||'Message'}</span><br>${(m.reply_to_text||'').slice(0,60)}</div>`);
  }
  parts.push(`<div style="position:relative;max-width:75%;cursor:pointer" onclick="onMsgClick(${m.id})">`);
  if (mentionedMe && !isMe) parts.push('<div style="font-size:10px;color:var(--amber);margin-bottom:2px;font-weight:700">@ You were mentioned</div>');
  const bubbleStyle = `padding:10px 14px;border-radius:${isMe?'16px 16px 4px 16px':'16px 16px 16px 4px'};font-size:13px;line-height:1.5;word-break:break-word;background:${isMe?'var(--accent)':'var(--bg3)'};color:${isMe?'#fff':'var(--text)'}${mentionedMe&&!isMe?';border:1px solid var(--amber)':''}`;
  parts.push(`<div style="${bubbleStyle}">`);
  if (m.image_url) parts.push(`<img src="${m.image_url}" style="max-width:200px;border-radius:8px;display:block;margin-bottom:6px;cursor:zoom-in" onclick="event.stopPropagation();window.open(this.src,'_blank')">`);
  parts.push(m.message||'');
  if (tagged.length) parts.push(`<div style="font-size:11px;opacity:.7;margin-top:4px">${tagged.map(t=>'@'+t.name).join(' ')}</div>`);
  parts.push('</div></div>');
  parts.push(`<div style="display:flex;align-items:center;gap:4px;padding:2px 4px"><span style="font-size:10px;color:var(--text3)">${time}</span>`);
  if (isMe) parts.push(`<span style="font-size:14px;color:${(m.read_count||0)>0?'var(--accent)':'var(--text3)'}" title="${m.read_count||0} read">${(m.read_count||0)>0?'✓✓':'✓'}</span>`);
  parts.push('</div></div>');
  return parts.join('');
}

function onMsgClick(id) {
  const m = (window._msgStore||{})[id];
  if (!m) return;
  showMsgActions(id, m.message||'', m.user_name||'Unknown');
}


function showMsgActions(id, text, senderName) {
  showModal('Message Options', `
    <div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--text2)">
      <strong style="color:var(--text3);font-size:11px">${senderName}</strong><br>${text.slice(0,100)}${text.length>100?'…':''}
    </div>
    <button class="btn btn-ghost btn-block" style="margin-bottom:6px" onclick="setReply(${id},'${senderName}','${text.slice(0,60).replace(/'/g,"\'")}');closeModal()">
      <i class="ti ti-arrow-back-up"></i> Reply to this message
    </button>
    <button class="btn btn-ghost btn-block" onclick="navigator.clipboard?.writeText('${text.replace(/'/g,"\'")}');closeModal()">
      <i class="ti ti-copy"></i> Copy text
    </button>
    <button class="btn btn-ghost btn-block" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);
}

function setReply(id, name, text) {
  replyingTo = {id, name, text};
  const rp = el('reply-preview');
  if (rp) {
    rp.style.display = 'block';
    const rn = el('reply-name'); if (rn) rn.textContent = name;
    const rt = el('reply-text'); if (rt) rt.textContent = text;
  }
  el('chat-input')?.focus();
}

function cancelReply() {
  replyingTo = null;
  const rp = el('reply-preview');
  if (rp) rp.style.display = 'none';
}

function scrollToMsg(id) {
  const el2 = el('msg-'+id);
  if (el2) { el2.scrollIntoView({behavior:'smooth', block:'center'}); el2.style.background='rgba(79,142,247,.2)'; setTimeout(()=>el2.style.background='',1500); }
}

async function sendChatMsg() {
  const input = el('chat-input');
  const message = input?.value.trim();
  if (!message || !activeGroupId) return;
  input.value = '';
  const tagged = window._pendingMentions || [];
  window._pendingMentions = [];
  try {
    delete cache[`GET/api/chat/groups/${activeGroupId}/messages`];
    await api('POST', `/api/chat/groups/${activeGroupId}/messages`, {
      message,
      tagged_users: tagged,
      reply_to_id: replyingTo?.id || null
    });
    cancelReply();
    await loadChatGroup(activeGroupId);
  } catch(e) { showToast(e.message, 'info'); }
}

function triggerFileUpload() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { showToast('Image must be under 5MB', 'error'); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      try {
        delete cache[`GET/api/chat/groups/${activeGroupId}/messages`];
        await api('POST', `/api/chat/groups/${activeGroupId}/messages`, {
          message: el('chat-input').value.trim() || '📎 Image',
          image_url: dataUrl,
          tagged_users: [],
          reply_to_id: replyingTo?.id || null
        });
        el('chat-input').value = '';
        cancelReply();
        await loadChatGroup(activeGroupId);
      } catch(err) { showToast(err.message, 'info'); }
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function filterMentions() {
  const q = el('mention-search')?.value.toLowerCase() || '';
  document.querySelectorAll('.mention-item').forEach(item => {
    item.style.display = (!q || item.dataset.name.includes(q) || item.dataset.dept.includes(q)) ? '' : 'none';
  });
}

function addMention(id, name) {
  if (!window._pendingMentions) window._pendingMentions = [];
  if (!window._pendingMentions.find(m => m.id === id)) {
    window._pendingMentions.push({id, name});
  }
  const input = el('chat-input');
  if (input) { input.value += ` @${name} `; input.focus(); }
}

async function submitCreateGroup() {
  const name = el('cg-name')?.value.trim();
  if (!name) { showToast('Enter a group name', 'info'); return; }
  const checked = document.querySelectorAll('#cg-members input[type=checkbox]:checked');
  const members = Array.from(checked).map(cb => ({id: parseInt(cb.value), name: cb.dataset.name}));
  if (!members.length) { showToast('Select at least one member', 'info'); return; }
  try {
    clearCache();
    await api('POST', '/api/chat/groups', { name, members });
    closeModal();
    navigate('chat');
  } catch(e) { showToast(e.message, 'info'); }
}

function showDMUser() {
  const users = (window._chatUsers || []).filter(u => u.id !== user.id);
  showModal('Direct Message', `

    <div style="max-height:350px;overflow-y:auto">

        </div>`).join('')}
    </div>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

async function startDM(toUserId, toUserName) {
  closeModal();
  // Create or find existing DM group
  const dmName = `DM: ${user.full_name||user.name} ↔ ${toUserName}`;
  const existing = (window._chatGroups||[]).find(g => g.name === dmName || g.name === `DM: ${toUserName} ↔ ${user.full_name||user.name}`);
  if (existing) {
    activeGroupId = existing.id;
    activeGroupName = existing.name;
    navigate('chat');
    return;
  }
  try {
    clearCache();
    const g = await api('POST', '/api/chat/groups', { name: dmName, members: [{id: toUserId, name: toUserName}], is_dm: true });
    activeGroupId = g.id;
    activeGroupName = g.name;
    navigate('chat');
  } catch(e) { showToast(e.message, 'info'); }
}

async function pgHistory() {
  html('topbar-btn', '');
  html('page-content', `<div class="loading-state"><div class="spinner"></div><p>Loading history...</p></div>`);

  // Load all data in parallel
  const [requests, fuel, drivers, vehicles, receivables, inventory, issuances, audit] = await Promise.all([
    api('GET', '/api/requests').catch(()=>[]),
    api('GET', '/api/fuel').catch(()=>[]),
    api('GET', '/api/drivers').catch(()=>[]),
    api('GET', '/api/vehicles').catch(()=>[]),
    api('GET', '/api/receivables').catch(()=>[]),
    api('GET', '/api/inventory').catch(()=>[]),
    api('GET', '/api/inventory/all-issuances').catch(()=>[]),
    api('GET', '/api/audit').catch(()=>[]),
  ]);

  window._historyData = { requests, fuel, drivers, vehicles, receivables, inventory, issuances, audit };
  renderHistory('requests');
}

function filterHistoryTable() {
  const q = (el('hist-search')?.value || '').toLowerCase();
  const from = el('hist-from')?.value;
  const to = el('hist-to')?.value;
  let shown = 0, hidden = 0;

  document.querySelectorAll('.hist-row').forEach(row => {
    const matchText = !q || (row.dataset.search || '').includes(q);
    const rowDate = row.dataset.date?.slice(0,10) || '';
    const matchFrom = !from || rowDate >= from;
    const matchTo = !to || rowDate <= to;
    const show = matchText && matchFrom && matchTo;
    row.style.display = show ? '' : 'none';
    show ? shown++ : hidden++;
  });
}

function exportExcel(tab) {
  const d = window._historyData || {};
  const from = el('hist-from')?.value;
  const to = el('hist-to')?.value;
  const q = (el('hist-search')?.value || '').toLowerCase();

  let rows = [], headers = [], title = '';

  const isVisible = (row) => {
    const matchText = !q || [Object.values(row)].join(' ').toLowerCase().includes(q);
    const rowDate = (row.created_at||row.date||'').slice(0,10);
    const matchFrom = !from || rowDate >= from;
    const matchTo = !to || rowDate <= to;
    return matchText && matchFrom && matchTo;
  };

  if (tab === 'requests') {
    title = 'Payment Requests';
    headers = ['Ref','Description','Category','Amount','Pay Type','Credit Terms','Payee','Bank','Account','Plate','Requester','Status','Date'];
    rows = (d.requests||[]).filter(isVisible).map(r => [r.ref_number,r.description,r.category,r.amount_to_pay||r.amount,r.payment_type,r.credit_terms||'',r.payee_name,r.bank_name,r.account_number,r.plate_number,r.requester_name,r.status,fmtDate(r.created_at)]);
  } else if (tab === 'fuel') {
    title = 'Fuel Requests';
    headers = ['Ref','Vehicle','Driver','Fuel Type','Qty (L)','Station','Amount','Status','Date'];
    rows = (d.fuel||[]).filter(isVisible).map(r => [r.ref_number,r.plate_number,r.driver_name,r.fuel_type,r.quantity,r.station_name,r.amount,r.status,fmtDate(r.created_at)]);
  } else if (tab === 'inventory') {
    title = 'Inventory Transactions';
    headers = ['Type','Item','Qty','Unit','Driver/Supplier','Phone','Vehicle','Purpose','Waybill','Received By','Issued By','Date','Time'];
    rows = (d.issuances||[]).filter(isVisible).map(r => [r.type==='receive'?'Received':'Issued',r.item_name,r.quantity,r.unit,r.type==='receive'?r.supplier_name:r.driver_name,r.supplier_phone||'',r.vehicle_plate||'',r.purpose||'',r.waybill_number||'',r.received_by||'',r.issued_by_name||'',fmtDate(r.created_at),fmtTime(r.created_at)]);
  } else if (tab === 'receivables') {
    title = 'Receivables';
    headers = ['Invoice','Client','Description','Amount','Due Date','Status','Paid Date'];
    rows = (d.receivables||[]).filter(isVisible).map(r => [r.invoice_number,r.client_name,r.description,r.amount,fmtDate(r.due_date),r.paid?'Received':'Pending',r.paid_date?fmtDate(r.paid_date):'']);
  } else if (tab === 'drivers') {
    title = 'Drivers';
    headers = ['Name','Phone','License No.','License Expiry','Bank','Account','Account Name','Depot','Status'];
    rows = (d.drivers||[]).filter(isVisible).map(r => [r.full_name||r.name,r.phone,r.license_number,fmtDate(r.license_expiry),r.bank_name,r.account_number,r.account_name,r.depot,r.active?'Active':'Inactive']);
  } else if (tab === 'vehicles') {
    title = 'Vehicles';
    headers = ['Plate','Make','Model','Year','Fuel Type','Depot','Driver','Insurance Expiry','Road Worthy','V. License','Tracker','Status'];
    rows = (d.vehicles||[]).filter(isVisible).map(r => [r.plate_number,r.make,r.model,r.year,r.fuel_type,r.depot,r.driver_name,fmtDate(r.insurance_expiry),fmtDate(r.road_worthiness_expiry),fmtDate(r.vehicle_license_expiry),fmtDate(r.tracker_expiry),r.status]);
  } else if (tab === 'audit') {
    title = 'Audit Log';
    headers = ['Date','Time','User','Action','Entity','Entity ID'];
    rows = (d.audit||[]).filter(isVisible).map(r => [fmtDate(r.created_at),fmtTime(r.created_at),r.actor_name||'System',r.action,r.entity||'',r.entity_id||'']);
  }

  if (!rows.length) { showToast('No data to export (check filters)', 'warning'); return; }

  // Build CSV (opens in Excel)
  const csvRows = [
    [`VMO — ${title} Export`],
    [`Generated: ${new Date().toLocaleString()} by ${user.full_name||user.name}`],
    from||to ? [`Date filter: ${from||'start'} to ${to||'end'}`] : [],
    [],
    headers,
    ...rows
  ].filter(r => r.length);

  const csv = csvRows.map(row => row.map(cell => '"' + String(cell||'').replace(/"/g, '""') + '"').join(',')).join('\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `VMO_${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function buildLineItemRow(idx, categories, prefill) {
  const cats = (categories.length ? categories : ['Fuel','Maintenance','Accommodation',
    'Dispatch','Driver Allowance','Other Overhead','Logistics','Admin','Operations',
    'Compliance','IT & Technology','Training','Miscellaneous'])
    .map(c => `<option value="${c}" ${prefill?.category===c?'selected':''}>${c}</option>`).join('');
  return `
  <div class="bi-line-row" id="bi-line-${idx}" style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <select class="form-input" id="bi-cat-${idx}" style="flex:1.2" onchange="recalcBudgetTotal()">
      <option value="">— Category —</option>
      ${cats}
    </select>
    <input class="form-input" id="bi-line-title-${idx}" placeholder="Description (optional)"
           style="flex:2" value="${prefill?.title||''}">
    <input class="form-input" type="number" id="bi-line-amt-${idx}" placeholder="₦ Amount"
           style="flex:1;min-width:90px" value="${prefill?.amount||''}"
           oninput="recalcBudgetTotal()">
    <button class="btn btn-ghost btn-sm" style="padding:6px 8px;flex-shrink:0;color:var(--red)"
            onclick="removeBudgetLine(${idx})" title="Remove">
      <i class="ti ti-trash" style="font-size:14px"></i>
    </button>
  </div>`;
}

let _biLineCount = 1;
function addBudgetLine() {
  const wrap = document.getElementById('bi-lines-wrap');
  if (!wrap) return;
  const cats = window._budgetCategories || [];
  const row  = document.createElement('div');
  row.innerHTML = buildLineItemRow(_biLineCount, cats);
  wrap.appendChild(row.firstElementChild);
  _biLineCount++;
  recalcBudgetTotal();
}

function removeBudgetLine(idx) {
  const row = document.getElementById('bi-line-' + idx);
  if (row) row.remove();
  recalcBudgetTotal();
}

function recalcBudgetTotal() {
  let total = 0;
  document.querySelectorAll('[id^="bi-line-amt-"]').forEach(inp => {
    total += parseFloat(inp.value) || 0;
  });
  const disp = document.getElementById('bi-total-display');
  if (disp) {
    disp.textContent = '₦' + total.toLocaleString('en-NG');
  }
}

function collectBudgetLines() {
  const lines = [];
  document.querySelectorAll('.bi-line-row').forEach(row => {
    const id    = row.id.replace('bi-line-','');
    const cat   = document.getElementById('bi-cat-'+id)?.value;
    const title = document.getElementById('bi-line-title-'+id)?.value?.trim();
    const amt   = parseFloat(document.getElementById('bi-line-amt-'+id)?.value) || 0;
    if (cat || amt) lines.push({ category: cat, title: title || cat, amount: amt });
  });
  return lines;
}

async function submitBudgetItem(editId) {
  const title = el('bi-title')?.value?.trim();
  if (!title) { showToast('Budget title is required', 'error'); el('bi-title')?.focus(); return; }

  const lines = collectBudgetLines();
  if (!lines.length) { showToast('Add at least one budget line item', 'error'); return; }

  const totalAmt = lines.reduce((s, l) => s + l.amount, 0);
  if (totalAmt <= 0) { showToast('Total budget amount must be greater than zero', 'error'); return; }

  const btn = el('bi-save-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…'; }

  const payload = {
    title,
    amount:      totalAmt,
    department:  el('bi-dept')?.value?.trim() || user.department || user.role,
    description: el('bi-desc')?.value?.trim(),
    date_from:   el('bi-from')?.value || null,
    date_to:     el('bi-to')?.value   || null,
    line_items:  JSON.stringify(lines),
    posted_by:   user.full_name || user.name,
    status:      'pending',
  };

  try {
    clearCache();
    if (editId) {
      await api('PATCH', `/api/budget/items/${editId}`, payload);
    } else {
      await api('POST', '/api/budget/items', payload);
    }
    closeModal();
    showToast(editId ? 'Budget item updated ✓' : 'Budget item posted ✓', 'success');
    pgBudget();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save Budget'; }
    showToast(e.message, 'error');
  }
}

async function approveBudgetItem(id) {
  try {
    await api('PATCH', `/api/budget/items/${id}`, { status: 'approved' });
    clearCache(); showToast('Budget item approved ✓', 'success'); pgBudget();
  } catch(e) { showToast(e.message, 'error'); }
}

async function declineBudgetItem(id) {
  try {
    await api('PATCH', `/api/budget/items/${id}`, { status: 'declined' });
    clearCache(); showToast('Budget item declined', 'success'); pgBudget();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteBudgetItem(id) {
  showConfirmModal('Delete Budget Item', 'Delete this budget item? This cannot be undone.', async () => {
  try {
    await api('DELETE', `/api/budget/items/${id}`);
    clearCache(); showToast('Removed ✓', 'success'); pgBudget();

  });
}

async function submitCreateVendorUser(vendorId) {
  const name  = el('vu-name')?.value?.trim();
  const email = el('vu-email')?.value?.trim();
  const vId   = vendorId || el('vu-vendor')?.value;
  if (!name || !email) { showToast('Name and email are required', 'error'); return; }
  if (!vId) { showToast('Select a vendor', 'error'); return; }
  try {
    const result = await api('POST', '/api/vendor-users', {
      vendor_id:  vId,
      full_name:  name,
      email,
      phone:      el('vu-phone')?.value?.trim(),
      role:       el('vu-role')?.value || 'vendor_admin',
    });
    clearCache();
    closeModal();
    // Show the temporary password
    const tmpPwd = result.temp_password;
    showModal('Portal Account Created ✓', `
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:40px;margin-bottom:8px">🎉</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">Account created for ${sanitise(name)}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Share these credentials with the vendor:</div>
        <div style="background:var(--ink3);border-radius:10px;padding:16px;text-align:left;font-family:monospace;font-size:13px">
          <div><span style="color:var(--text3)">Login URL:</span> <strong>${window.location.origin}/vendor</strong></div>
          <div style="margin-top:8px"><span style="color:var(--text3)">Email:</span> <strong>${sanitise(email)}</strong></div>
          <div style="margin-top:4px"><span style="color:var(--text3)">Temp password:</span> <strong style="color:var(--gold)">${sanitise(tmpPwd || 'VMO2026!')}</strong></div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:12px">The vendor should change their password on first login.</div>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="closeModal();pgVendorPortal()">Done</button>
    `);
  } catch(e) { showToast(e.message, 'error'); }
}

async function toggleVendorUser(userId, newStatus) {
  try {
    await api('PATCH', `/api/vendor-users/${userId}`, { status: newStatus });
    clearCache();
    showToast(newStatus === 'suspended' ? 'Account suspended' : 'Account reactivated ✓', 'success');
    pgVendorPortal();
  } catch(e) { showToast(e.message, 'error'); }
}

async function resendVendorCredentials(userId) {
  try {
    await api('POST', `/api/vendor-users/${userId}/resend`);
    showToast('Credentials resent ✓', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadDriverAlerts() {
  if (user.role !== 'driver') return;
  try {
    // Check if driver's own licence is expiring
    const drivers = await api('GET', '/api/drivers').catch(() => []);
    // Match by email or user id
    const me = drivers.find(d =>
      d.email?.toLowerCase() === user.email?.toLowerCase() ||
      d.user_id === user.id
    );
    if (!me) return;

    const alerts = [];
    if (me.license_expiry) {
      const days = Math.round((new Date(me.license_expiry) - new Date()) / 86400000);
      if (days <= 30) {
        alerts.push({
          type: 'Licence Expiry',
          title: 'Driver\'s Licence Expiring',
          message: days <= 0
            ? 'Your licence has expired. Please renew immediately.'
            : `Your licence expires in ${days} day${days !== 1 ? 's' : ''}. Renew before it lapses.`,
          expires_at: me.license_expiry,
        });
      }
    }

    if (!alerts.length) return;

    const widget = document.getElementById('driver-alerts-widget');
    if (!widget) return;
    widget.innerHTML = alerts.map(a => `
      <div style="background:rgba(239,68,68,.07);border:1.5px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-id" style="font-size:22px;color:var(--red);flex-shrink:0"></i>
        <div>
          <div style="font-weight:700;font-size:13px;color:var(--text)">${sanitise(a.title)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">${sanitise(a.message)}</div>
        </div>
      </div>`).join('');
  } catch {}
}

function filterInvoice(status) {
  if (status) {
    document.querySelectorAll('[data-if]').forEach(b => b.classList.toggle('active', b.dataset.if === status));
    window._invFilter = status;
  }
  const s = window._invFilter || 'All';
  const q = (el('inv-search')?.value || '').toLowerCase();
  const m = el('inv-month')?.value || '';
  document.querySelectorAll('.inv-row').forEach(row => {
    const matchStatus = s === 'All' || row.dataset.istatus === s;
    const matchSearch = !q || (row.dataset.search || '').includes(q);
    const matchMonth = !m || (row.dataset.month || '').startsWith(m);
    row.style.display = matchStatus && matchSearch && matchMonth ? '' : 'none';
  });
}

async function submitInvoice() {
  const num = el('ni-num')?.value?.trim();
  const amt = el('ni-amt')?.value;
  const client = el('ni-client')?.value?.trim();
  if (!num) { showToast('Enter invoice number', 'info'); return; }
  if (!client) { showToast('Enter client name', 'info'); return; }
  if (!amt || parseFloat(amt) <= 0) { showToast('Enter amount', 'info'); return; }
  try {
    await api('POST', '/api/invoices', {
      invoice_number: num,
      for_month: el('ni-month')?.value,
      client_name: client,
      description: el('ni-desc')?.value,
      amount: parseFloat(amt) + parseFloat(el('ni-vat')?.value || 0),
      vat_amount: parseFloat(el('ni-vat')?.value || 0),
      invoice_date: el('ni-idate')?.value,
      expected_date: el('ni-edate')?.value,
      notes: el('ni-notes')?.value,
    });
    delete cache['GET/api/invoices'];
    closeModal();
    await pgInvoices();
  } catch(e) { showToast(e.message, 'info'); }
}
