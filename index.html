async function pgBudget() {
  // Department heads and above can access budget module
  const canSeeAll = ['real_admin','super_admin','admin','accounts'].includes(user.role);

    ${isAdmin ? `

          <div style="height:6px;background:var(--bg2);border-radius:3px;margin-top:6px"><div style="height:6px;border-radius:3px;width:${Math.min(totalBudgeted>0?totalSpent/totalBudgeted*100:0,100)}%;background:${totalBudgeted>0&&totalSpent/totalBudgeted>0.9?'var(--red)':totalBudgeted>0&&totalSpent/totalBudgeted>0.7?'var(--amber)':'var(--green)'}"></div></div>
        </div>
        <div style="background:var(--bg3);border-radius:8px;padding:10px">

          </div>
        </div>
      </div>
    </div>` : ''}

      const pct = b.total_budgeted > 0 ? Math.min(b.total_spent / b.total_budgeted * 100, 100) : 0;

            <div style="font-size:11px;color:var(--text3)">of ${fmt(b.total_budgeted)}</div>

        </div>
        <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">

async function manageCompanyVehicles(compId, compName) {
  const [assigned, allVeh, companies] = await Promise.all([
    api('GET',`/api/companies/${compId}/vehicles`),
    api('GET','/api/vehicles'),
    api('GET','/api/companies'),
  ]);
  const assignedIds = assigned.map(v => v.id);
  // Find this company type to filter vehicles appropriately
  const thisCompany = companies.find(c => c.id === compId);
  const isPool = thisCompany?.type === 'pool';
  // Filter: pool companies show pool/petrol vehicles, haulage shows haulage vehicles
  const filtered = allVeh.filter(v => {
    if (assignedIds.includes(v.id)) return false;
    if (isPool) return ['pool_car','suv','staff_bus','brt'].includes(v.vehicle_type) || v.fuel_type==='Petrol';
    return true; // haulage shows all unassigned
  });
  const unassigned = filtered;

  showModal(`${compName} — Vehicles`, `
    <div class="form-group"><label class="form-label">Add Vehicle</label>
      <select class="form-input" id="add-veh-sel">
        <option value="">— Select vehicle to add —</option>

      </select>
      <button class="btn btn-primary btn-sm" style="margin-top:6px;width:100%" onclick="addVehicleToCompany(${compId})">Add Vehicle</button>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:8px">Assigned Vehicles</div>
    <div id="assigned-vehs">
      ${assigned.map(v => `<div class="list-item" style="padding:10px;margin-bottom:6px">
        <div class="list-dot blue"><i class="ti ti-truck"></i></div>
        <div class="list-body"><div class="list-title" style="font-size:13px">${v.plate_number}</div>
        <div class="list-sub">${v.make||''} ${v.model||''} · ${v.driver_name||'No driver'}</div></div>
        <button class="btn btn-danger btn-sm" style="font-size:11px" onclick="removeVehicleFromCompany(${compId},${v.id},'${compName}')">Remove</button>
      </div>`).join('') || '<div style="color:var(--text3);font-size:13px;padding:10px">No vehicles assigned yet</div>'}

function exportTrips() {
  const trips = window._currentTrips || [];
  if (!trips.length) { showToast('No trips to export', 'info'); return; }
  const headers = ['Date','Company','Plate No.','Driver','Customer Name','Phone','Area','Shipment No','Waybill No','Loading Site','Offloading Site','To KM','Return KM','Rate','Pallets','Outward Value','Return Value','BIT','Diesel (L)','Diesel Cost','Net Revenue','Availability','Reason','Notes','Logged By','Logged At'];
  const rows = trips.map(t => [
    fmtDate(t.trip_date),t.company_name,t.plate_number,t.driver_name,t.customer_name,
    t.customer_phone,t.area,t.shipment_number,t.waybill_number,t.loading_site,t.offloading_site,
    t.to_km,t.from_km,t.rate,t.pallet_size,t.outward_value,t.return_value,t.bit_allowance,
    t.total_diesel,t.diesel_amount,(+t.outward_value||0)+(+t.return_value||0)-(+t.diesel_amount||0),
    t.availability_code,t.reason_code,t.notes,t.created_by_name,
    t.created_at?new Date(t.created_at).toLocaleString():''
  ]);
  const nl='\n';
  const csv=['VMO — Trip Log Export',`Generated: ${new Date().toLocaleString()} — IMMUTABLE AUDIT RECORD`,[],headers,...rows]
    .map(row=>Array.isArray(row)?row.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(','):'"'+(row||'')+'"'  ).join(nl);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`VMO_TripLog_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function submitVendor() {
  const payload = {
    vendor_type: el('nv-type')?.value,
    company_name: el('nv-cname')?.value,
    contact_person: el('nv-contact')?.value,
    phone: el('nv-phone')?.value,
    email: el('nv-email')?.value,
    tin: el('nv-tin')?.value,
    products_services: el('nv-products')?.value,
    credit_terms: el('nv-credit')?.value,
    price_per_litre: el('nv-price')?.value,
    bank_name: el('nv-bank')?.value,
    account_number: el('nv-acct')?.value,
    account_name: el('nv-aname')?.value,
    cac_reference: el('nv-cac')?.value,
  };
  if (!payload.company_name || !payload.contact_person || !payload.phone) {
    showToast('Company name, contact person and phone are required', 'error'); return;
  }
  try {
    clearCache();
    try {
      await api('POST', '/api/vendors', payload);
    } catch(e) {
      // Store locally if backend endpoint not deployed yet
      const local = JSON.parse(localStorage.getItem('vmo_vendors_local')||'[]');
      payload.id = Date.now(); payload.status = 'active';
      local.push(payload);
      localStorage.setItem('vmo_vendors_local', JSON.stringify(local));
    }
    // Auto-create imprest for petrol stations
    if (payload.vendor_type === 'petrol_station') {
      try {
        const vendorsNow = await api('GET','/api/vendors').catch(()=>[]);
        const newV = vendorsNow.find(v => v.company_name===payload.company_name || v.phone===payload.phone);
        if (newV?.id) {
          // Only create if no imprest linked to this vendor yet
          const allImprests = await api('GET','/api/imprest').catch(()=>[]);
          const hasLinked = allImprests.find(a =>
            (a.name||'').toLowerCase().includes((payload.company_name||'').toLowerCase().slice(0,15))
          );
          if (!hasLinked) {
            await api('POST', '/api/imprest', {
              name: payload.company_name + ' — Fuel Float',
              holder_type: 'unit',
              holder_name: payload.company_name,
              vendor_id: newV.id,
              dedicated_category: 'FUEL',
              bank_name: payload.bank_name||'',
              account_number: payload.account_number||'',
              account_name: payload.account_name||'',
              balance: 0,
              original_balance: 0,
              status: 'active',
            });
          }
        }
        showToast('Petrol station registered + Fuel Float account created in Imprest','success');
      } catch(e2) {
        showToast('Vendor registered. Imprest auto-creation pending — fund manually.','success');
      }
    } else {
      showToast('Vendor registered successfully','success');
    }
    closeModal();
    navigate('vendors');
  } catch(e) { showToast(e.message||'Failed to register vendor', 'error'); }
}

function exportDebitSheet() {
  const trips = window._debitTrips || [];
  if (!trips.length) { showToast('No data to export', 'info'); return; }
  const headers = ['Date','Waybill No','Invoice No','Plate No','Driver','Company','Shipment No','From','Destination','Customer','Phone','Load Details','Supervisor','Gross Freight','Diesel L','Diesel Cost','Net Revenue'];
  const rows = trips.map(t => {
    const freight = (+t.outward_value||0)+(+t.return_value||0);
    const net = freight - (+t.diesel_amount||0);
    return [
      t.trip_date?new Date(t.trip_date).toLocaleDateString('en-GB'):'',
      t.waybill_number||'', t.invoice_number||'', t.plate_number||'',
      t.driver_name||'', t.company_name||'', t.shipment_number||'',
      t.loading_site||'', t.offloading_site||'', t.customer_name||'',
      t.customer_phone||'', t.load_description||t.notes||'',
      t.closed_by||t.created_by_name||'', freight, t.total_diesel||'',
      t.diesel_amount||'', net
    ];
  });
  const csv = [headers, ...rows].map(row=>row.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `VMO_DebitSheet_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function submitNewTripEnforced() {
  // 1. Check waybill document attached
  const doc1 = el('nt-waybill-doc-1')?.files?.[0];
  if (!doc1) {
    showToast('Please attach at least one loading waybill document before saving the trip.', 'info');
    return;
  }

  // 2. Check required fields
  if (!el('nt-waybill')?.value) { showToast('Waybill number is required', 'error'); return; }
  if (!el('nt-cust')?.value) { showToast('Customer name is required', 'error'); return; }
  if (!(getSSValue('nt-veh') || el('nt-veh')?.value || '')) { showToast('Please select a vehicle', 'info'); return; }

  // 3. Check vehicle has no open trip
  const vehicleId = (getSSValue('nt-veh') || el('nt-veh')?.value || '');
  try {
    const openTrips = await api('GET', `/api/trips?vehicle_id=${vehicleId}&open=1`).catch(()=>[]);
    const open = openTrips.find(t => t.trip_status && !['closed'].includes(t.trip_status));
    if (open) {
      const vName = user?.full_name || user?.name || 'User';
      showToast(`${vName}, please close out on the previous trip (${open.waybill_number||'#'+open.id}) by completing the trip details and debit record before loading this truck again.`, 'info');
      return;
    }
  } catch(e) {}

  // 4. Convert waybill docs to base64
  const waybillDocs = [];
  for (let i=1; i<=4; i++) {
    const f = el(`nt-waybill-doc-${i}`)?.files?.[0];
    if (f) {
      const b64 = await fileToBase64(f);
      waybillDocs.push({ name: f.name, type: f.type, data: b64 });
    }
  }

  const payload = {
    trip_date: el('nt-date')?.value,
    company_id: el('nt-co')?.value,

// Store attached files in memory (keyed by list id)
const _waybillFiles = {};

function addWaybillFiles(input, listId, dropzoneId) {
  if (!_waybillFiles[listId]) _waybillFiles[listId] = [];
  const maxSize = 10 * 1024 * 1024; // 10 MB
  let rejected = 0;

  Array.from(input.files).forEach(file => {
    if (file.size > maxSize) { rejected++; return; }
    // Avoid exact duplicates by name+size
    const dup = _waybillFiles[listId].find(f => f.name === file.name && f.size === file.size);
    if (!dup) _waybillFiles[listId].push(file);
  });

  if (rejected) showToast(`${rejected} file${rejected > 1 ? 's' : ''} skipped — each file must be under 10 MB`, 'error');
  input.value = ''; // reset so same file can be re-added if needed
  renderWaybillList(listId, dropzoneId);
}

function handleWaybillDrop(event, listId, dropzoneId) {
  event.preventDefault();
  const dz = document.getElementById(dropzoneId);
  if (dz) dz.style.borderColor = 'rgba(239,68,68,.3)';
  const input = { files: event.dataTransfer.files };
  addWaybillFiles(input, listId, dropzoneId);
}

function removeWaybillFile(listId, dropzoneId, idx) {
  if (_waybillFiles[listId]) _waybillFiles[listId].splice(idx, 1);
  renderWaybillList(listId, dropzoneId);
}

function renderWaybillList(listId, dropzoneId) {
  const container = document.getElementById(listId);
  const dz = document.getElementById(dropzoneId);
  if (!container) return;

  const files = _waybillFiles[listId] || [];

  if (files.length === 0) {
    container.innerHTML = '';
    if (dz) dz.style.borderColor = 'rgba(239,68,68,.3)';
    return;
  }

  // Update dropzone to show count
  if (dz) {
    dz.style.borderColor = 'var(--green)';
    const countEl = dz.querySelector('.wb-count');
    if (countEl) {
      countEl.textContent = `${files.length} file${files.length > 1 ? 's' : ''} attached`;
    } else {
      const span = document.createElement('div');
      span.className = 'wb-count';
      span.style.cssText = 'font-size:11px;color:var(--green);font-weight:700;margin-top:4px';
      span.textContent = `${files.length} file${files.length > 1 ? 's' : ''} attached`;
      dz.appendChild(span);
    }
  }

  container.innerHTML = files.map((f, i) => {
    const isImage = f.type.startsWith('image/');
    const icon = isImage ? 'ti-photo' : 'ti-file-type-pdf';
    const iconColor = isImage ? 'var(--accent)' : '#f87171';
    const sizeKB = (f.size / 1024).toFixed(0);
    return `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--ink3);border-radius:8px;border:1px solid var(--border)">
      <i class="ti ${icon}" style="font-size:18px;color:${iconColor};flex-shrink:0"></i>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sanitise(f.name)}</div>
        <div style="font-size:10px;color:var(--text3)">${sizeKB} KB</div>
      </div>
      <button onclick="removeWaybillFile('${listId}','${dropzoneId}',${i})"
              style="background:none;border:none;cursor:pointer;color:var(--red);padding:4px;line-height:1;flex-shrink:0"
              title="Remove">
        <i class="ti ti-x" style="font-size:14px"></i>
      </button>
    </div>`;
  }).join('');
}

async function getWaybillDocs(listId) {
  const files = _waybillFiles[listId] || [];
  const docs = [];
  for (const f of files) {
    const b64 = await fileToBase64(f);
    docs.push({ name: f.name, type: f.type, size: f.size, data: b64 });
  }
  return docs;
}

function clearWaybillFiles(listId) {
  _waybillFiles[listId] = [];
}


function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      // Strip the "data:mime/type;base64," prefix — store pure base64
      const result = e.target.result;
      const b64 = result.includes(',') ? result.split(',')[1] : result;
      res(b64);
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

async function submitCloseTrip(tripId) {

  const ctFiles = _waybillFiles['ct-wb-files'] || [];

    document.getElementById('ct-wb-dropzone')?.scrollIntoView({ behavior: 'smooth', block: 'center' });

    showToast('Please fill the debit values (outward value, return value etc.) or tick "No debit for this trip".', 'info');

  const closingDocs = await getWaybillDocs('ct-wb-files');

    depot_departure: el('ct-depot-dep')?.value || null,
    outward_value: noDebit ? 0 : (el('ct-outval')?.value || 0),

    closing_notes: el('ct-notes')?.value || '',

}

async function downloadWaybillReport() {
  const from = el('wb-from')?.value;
  const to = el('wb-to')?.value;
  const coId = el('wb-co')?.value;
  const status = el('wb-status')?.value;
  const wbType = el('wb-type')?.value;

  let trips = await api('GET', `/api/trips?from=${from}&to=${to}${coId?'&company_id='+coId:''}`).catch(()=>[]);
  if (status) trips = trips.filter(t => (t.trip_status||'completed')===status);

  const headers = [
    'Trip Date','Waybill No','Invoice No','Plate No','Driver','Company',
    'Loading Site','Destination','Customer','Shipment No',
    'Trip Status','Loading Docs','Closing Docs','Debit Filled','Outward (₦)','Return (₦)','Diesel (L)','Net (₦)'
  ];

  const rows = trips.map(t => {
    const freight = (+t.outward_value||0)+(+t.return_value||0);
    const net = freight - (+t.diesel_amount||0);
    let loadingDocs = '—', closingDocs = '—';
    try { loadingDocs = t.loading_waybill_docs ? JSON.parse(t.loading_waybill_docs).length+' doc(s)' : '—'; } catch(e){}
    try { closingDocs = t.closing_waybill_docs ? JSON.parse(t.closing_waybill_docs).length+' doc(s)' : '—'; } catch(e){}
    return [
      t.trip_date?new Date(t.trip_date).toLocaleDateString('en-GB'):'',
      t.waybill_number||'', t.invoice_number||'', t.plate_number||'',
      t.driver_name||'', t.company_name||'', t.loading_site||'', t.offloading_site||'',
      t.customer_name||'', t.shipment_number||'',
      t.trip_status||'', loadingDocs, closingDocs,
      t.no_debit?'No Debit':t.outward_value?'Yes':'Pending',
      t.outward_value||0, t.return_value||0, t.total_diesel||0, net
    ];
  });

  const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `VMO_Waybills_${from}_to_${to}.csv`;
  a.click();
  closeModal();
  showToast(`${trips.length} trip(s) exported`,'success');
}

// Check if selected vehicle has an open unclosed trip — called when vehicle changes
async function checkVehicleOpenTrip() {
  const sel  = el('nt-veh');
  const lock = el('nt-vehicle-lock');
  const msg  = el('nt-lock-msg');
  const btn  = el('nt-submit-btn');
  if (!sel || !lock) return;

  const vehicleId = sel.value;
  if (!vehicleId) { lock.style.display = 'none'; return; }

  const plate     = sel.options[sel.selectedIndex]?.dataset?.plate || vehicleId;
  const vehType   = (sel.options[sel.selectedIndex]?.dataset?.type || '').toLowerCase();

  // Only enforce lock for haulage trucks (not pool cars)
  if (!['haulage','truck'].includes(vehType)) { lock.style.display = 'none'; return; }

  try {
    const trips = await api('GET', `/api/trips?vehicle_id=${vehicleId}&status=open`).catch(() => []);
    const openTrips = Array.isArray(trips) ? trips.filter(t => t.trip_status !== 'closed') : [];

    if (openTrips.length) {
      const openTrip = openTrips[0];
      const name = user?.full_name?.split(' ')?.[0] || 'there';
      msg.innerHTML = `${name}, this truck (${sanitise(plate)}) has an open trip 
        <strong>${sanitise(openTrip.waybill_number || '#' + openTrip.id)}</strong> 
        that has not been closed out and debit declared. 
        Close out the previous trip before loading this truck again.`;
      lock.style.display = 'block';
      if (btn) btn.disabled = true;
    } else {
      lock.style.display = 'none';
      if (btn) btn.disabled = false;
    }
  } catch {
    lock.style.display = 'none';
  }
}

function clearTripLockWarning() {
  const lock = el('nt-vehicle-lock');
  const btn  = el('nt-submit-btn');
  if (lock) lock.style.display = 'none';

}

function removeCustRow(idx) {
  const row = el(`cust-row-${idx}`);
  if (row) row.remove();

function collectMultiCustomers() {
  const rows = el('nt-cust-rows')?.querySelectorAll('[id^="cust-row-"]') || [];
  const customers = [];
  let valid = true;
  rows.forEach((row, i) => {
    const idxStr = row.id.replace('cust-row-','');
    const name  = el(`mc-name-${idxStr}`)?.value?.trim();
    const phone = el(`mc-phone-${idxStr}`)?.value?.trim();
    const addr  = el(`mc-addr-${idxStr}`)?.value?.trim();
    const load  = el(`mc-load-${idxStr}`)?.value?.trim();
    const qty   = el(`mc-qty-${idxStr}`)?.value?.trim();
    if (!name || !phone || !addr || !load) { valid = false; }
    customers.push({ name, phone, address: addr, load_details: load, quantity: qty });
  });
  return { customers, valid };
}

function calcWaitTimes() {
  const diffHrs = (a, b) => {
    const ta = new Date(a), tb = new Date(b);
    if (!isNaN(ta) && !isNaN(tb) && tb > ta) return ((tb - ta) / 3600000).toFixed(2);
    return '';
  };
  const pa = el('nt-plant-arr')?.value, pd = el('nt-plant-dep')?.value;
  if (pa && pd && el('nt-plant-wait')) el('nt-plant-wait').value = diffHrs(pa, pd) + (diffHrs(pa,pd)?'h':'');
  const da = el('nt-depot-arr')?.value, dd = el('nt-depot-dep')?.value;
  if (da && dd && el('nt-cust-wait')) el('nt-cust-wait').value = diffHrs(da, dd) + (diffHrs(da,dd)?'h':'');
}

async function loadCompanyAssets() {
  const sel = el('nt-co');
  const compId = sel?.value;
  if (!compId) return;

  // Show loading state in dropdowns
  const vSel = el('nt-veh');
  const dSel = el('nt-drv');
  if (vSel) { vSel.innerHTML = '<option>Loading vehicles…</option>'; vSel.disabled = true; }
  if (dSel) { dSel.innerHTML = '<option>Loading drivers…</option>'; dSel.disabled = true; }

  // Load vehicles and drivers assigned to this company
  let [vehs, drvs] = await Promise.all([
    api('GET', `/api/companies/${compId}/vehicles`).catch(() => []),
    api('GET', `/api/companies/${compId}/drivers`).catch(() => []),
  ]);

  // If none assigned, fall back to ALL vehicles/drivers so nothing is blocked
  if (!vehs.length) {
    vehs = await api('GET', '/api/vehicles').catch(() => []);
  }
  if (!drvs.length) {
    drvs = await api('GET', '/api/drivers').catch(() => []);
  }

  // Cache for search
  window._ntVehicles = vehs;
  window._ntDrivers  = drvs;

  // Rebuild vehicle searchable dropdown
  buildSearchableSelect('nt-veh', vehs, v => ({
    value: v.id,
    label: `${v.plate_number}${v.vehicle_type ? '  ·  ' + v.vehicle_type : ''}${v.fuel_type ? '  (' + v.fuel_type + ')' : ''}`,
    sub: v.driver_name ? 'Driver: ' + v.driver_name : '',
  }), 'Search vehicle plate…', 'checkVehicleOpenTrip');

  // Rebuild driver searchable dropdown
  buildSearchableSelect('nt-drv', drvs, d => ({
    value: d.id,
    label: d.full_name || d.name || 'Unknown',
    sub: d.phone || d.licence_number || '',
  }), 'Search driver name…', null);

  // Update diesel rate from company option
  const opt = sel?.options[sel.selectedIndex];
  const dpEl = el('nt-dprice');
  if (dpEl && opt?.dataset?.diesel) dpEl.value = opt.dataset.diesel;
}

// ── Searchable dropdown builder ──────────────────────────────────────────────
// Replaces a <select> with a styled type-to-filter input + dropdown list
function buildSearchableSelect(targetId, items, mapper, placeholder, onSelectFn) {
  const orig = document.getElementById(targetId);
  if (!orig) return;

  // Build the wrapper
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:relative;width:100%';
  wrapper.id = targetId + '-wrapper';

  const input = document.createElement('input');
  input.className = 'form-input';
  input.placeholder = placeholder;
  input.autocomplete = 'off';
  input.id = targetId + '-search';
  input.style.cssText = 'width:100%;cursor:text';

  const hidden = document.createElement('input');
  hidden.type = 'hidden';
  hidden.id = targetId + '-val';

  const list = document.createElement('div');
  list.id = targetId + '-list';
  list.style.cssText = `
    position:absolute;top:100%;left:0;right:0;z-index:9999;
    background:var(--bg2, #1e2235);border:1px solid var(--border, #2a3050);
    border-radius:8px;max-height:220px;overflow-y:auto;display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.4);margin-top:3px
  `;

  const mappedItems = items.map(mapper);

  function renderList(query) {
    const q = (query || '').toLowerCase();
    const filtered = q ? mappedItems.filter(m => m.label.toLowerCase().includes(q) || (m.sub||'').toLowerCase().includes(q)) : mappedItems;
    if (!filtered.length) {
      list.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--text3)">No results found</div>';
    } else {
      list.innerHTML = filtered.map(m => `
        <div class="ss-item" data-val="${m.value}" data-label="${m.label.replace(/"/g,'')}"
          style="padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:.1s"
          onmouseover="this.style.background='rgba(79,142,247,.12)'"
          onmouseout="this.style.background=''"
          onclick="selectSSItem('${targetId}','${String(m.value).replace(/'/g,'')}','${m.label.replace(/'/g,'').replace(/"/g,'')}','${onSelectFn||''}')">
          <div style="font-size:13px;color:var(--text, #e2e8f0);font-weight:500">${sanitise(m.label)}</div>
          ${m.sub ? `<div style="font-size:11px;color:var(--text3, #64748b);margin-top:2px">${sanitise(m.sub)}</div>` : ''}
        </div>`).join('');
    }
    list.style.display = 'block';
  }

  input.addEventListener('input', () => renderList(input.value));
  input.addEventListener('focus', () => renderList(input.value));
  input.addEventListener('blur', () => setTimeout(() => { list.style.display = 'none'; }, 200));
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { list.style.display = 'none'; input.blur(); }
  });

  wrapper.appendChild(input);
  wrapper.appendChild(hidden);
  wrapper.appendChild(list);

  // Replace original element
  orig.replaceWith(wrapper);
}

function selectSSItem(targetId, value, label, onSelectFn) {
  const inp = document.getElementById(targetId + '-search');
  const hid = document.getElementById(targetId + '-val');
  const lst = document.getElementById(targetId + '-list');
  if (inp) inp.value = label;
  if (hid) hid.value = value;
  if (lst) lst.style.display = 'none';
  // Call any onSelect handler
  if (onSelectFn && window[onSelectFn]) window[onSelectFn](value, label);
}

function getSSValue(targetId) {
  return document.getElementById(targetId + '-val')?.value || '';
}

function calcTripValues() {
  const toKm = parseFloat(el('nt-tokm')?.value||0);
  const fromKm = parseFloat(el('nt-fromkm')?.value||0);
  const rate = parseFloat(el('nt-rate')?.value||0);
  const diesel = parseFloat(el('nt-diesel')?.value||0);
  const addDiesel = parseFloat(el('nt-adddiesel')?.value||0);
  const dPrice = parseFloat(el('nt-dprice')?.value||990);

  const outVal = toKm * rate;
  const retVal = fromKm * rate;
  const totalDiesel = diesel + addDiesel;
  const dieselCost = totalDiesel * dPrice;
  const net = outVal + retVal - dieselCost;

  const calc = el('trip-calc');
  if (calc && (toKm || rate)) {
    calc.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Outward Value:</span><strong style="color:var(--green)">${fmt(outVal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Return Value:</span><strong style="color:var(--green)">${fmt(retVal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Diesel Cost (${totalDiesel}L × ₦${dPrice}):</span><strong style="color:var(--red)">-${fmt(dieselCost)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:6px;margin-top:6px">
        <span style="font-weight:700">Net Revenue:</span><strong style="color:${net>=0?'var(--green)':'var(--red)'}">${fmt(net)}</strong>
      </div>`;
  }
}

async function submitTrip() {
  const custName = el('nt-cust')?.value;
  if (!custName) { showToast('Customer name is required', 'error'); return; }
  try {
    clearCache();
    await api('POST','/api/trips',{
      company_id: el('nt-co')?.value,
      vehicle_id: (getSSValue('nt-veh') || el('nt-veh')?.value || ''),
      driver_id: (getSSValue('nt-drv') || el('nt-drv')?.value || ''),
      trip_date: el('nt-date')?.value,
      shipment_number: el('nt-ship')?.value,
      waybill_number: el('nt-waybill')?.value,
      customer_name: custName,
      customer_phone: el('nt-phone')?.value,
      area: el('nt-area')?.value,
      loading_site: el('nt-load')?.value,
      offloading_site: el('nt-offload')?.value,
      to_km: el('nt-tokm')?.value,
      from_km: el('nt-fromkm')?.value,
      rate: el('nt-rate')?.value,
      pallet_size: el('nt-pallet')?.value,
      diesel_dispensed: el('nt-diesel')?.value,
      additional_diesel: el('nt-adddiesel')?.value,
      diesel_price_per_litre: el('nt-dprice')?.value,
      availability_code: el('nt-avail')?.value,
      notes: el('nt-notes')?.value,
    });
    closeModal(); loadTripsForCompany();
  } catch(e) { showToast(e.message, 'info'); }
}

// ── Inline input modal — replaces native prompt() ─────────────────────────
function showInputModal(title, placeholder, callback, opts = {}) {
  const id = 'imdlg_' + Date.now();
  const inputType = opts.password ? 'password' : (opts.number ? 'number' : 'text');
  const prefill = opts.prefill || '';
  showModal(title, `
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">${opts.message || ''}</p>
    <input class="form-input" id="${id}" type="${inputType}" value="${prefill}"
      placeholder="${placeholder}" style="margin-bottom:14px"
      onkeydown="if(event.key==='Enter'){document.getElementById('${id}_ok').click()}">
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" id="${id}_ok"
        onclick="const v=document.getElementById('${id}').value; if(v||${!!opts.allowEmpty}){closeModal();(${callback.toString()})(v);}else{document.getElementById('${id}').style.outline='2px solid var(--red)'}">
        ${opts.okLabel || 'Confirm'}
      </button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
    </div>
  `);
  setTimeout(() => document.getElementById(id)?.focus(), 100);
}

// ── Inline confirm modal — replaces native confirm() ──────────────────────
function showConfirmModal(title, message, onConfirm, opts = {}) {
  showModal(title, `
    <p style="font-size:14px;color:var(--text2);margin-bottom:18px;line-height:1.6">${message}</p>
    <div style="display:flex;gap:8px">
      <button class="btn ${opts.danger ? 'btn-danger' : 'btn-primary'}" style="flex:1"
        onclick="closeModal();(${onConfirm.toString()})()">
        ${opts.confirmLabel || 'Confirm'}
      </button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
    </div>
  `);
}

function showModal(title, body, size) {
  const existing = el('modal-overlay');
  if (existing) existing.remove();
  const d = document.createElement('div');
  d.id = 'modal-overlay';
  d.className = 'modal-overlay';
  const wideStyle = size === 'lg' ? 'max-width:900px;width:95vw' : '';
  d.innerHTML = `<div class="modal" style="${wideStyle}">
    <div class="modal-handle"></div>
    <div class="modal-title">${title}<button class="modal-close" onclick="closeModal()">✕</button></div>
    ${body}
  </div>`;
  d.addEventListener('click', e => { if(e.target===d) closeModal(); });
  document.body.appendChild(d);
}
function closeModal() {
  // Clear any staged waybill files when modal is dismissed
  clearWaybillFiles('nt-wb-files');
  clearWaybillFiles('ct-wb-files');
  const d = el('modal-overlay');
  if (d) d.remove();
}

// ── PRELOAD ALL DATA ──────────────────────────────────────────────────────────
async function preloadAll() {
  const allowed = allowedPages().map(p => p.id);

  // Dashboard data loads first so the user sees something immediately
  await Promise.allSettled([
    allowed.includes('dashboard') ? api('GET', '/api/analytics/dashboard').catch(() => ({})) : null,
  ].filter(Boolean));

  loadPage(page);

  // Everything else loads silently in the background
  // Note: compliance/alerts is intentionally excluded here — it runs separately
  // when the dashboard widget requests it, avoiding a slow startup penalty
  setTimeout(() => {
    Promise.allSettled([
      allowed.includes('requests')    && api('GET', '/api/requests').catch(() => []),
      allowed.includes('fuel')        && api('GET', '/api/fuel').catch(() => []),
      allowed.includes('vehicles')    && api('GET', '/api/vehicles').catch(() => []),
      allowed.includes('drivers')     && api('GET', '/api/drivers').catch(() => []),
      allowed.includes('clients')     && api('GET', '/api/clients').catch(() => []),
      allowed.includes('receivables') && api('GET', '/api/receivables').catch(() => []),
      allowed.includes('imprest')     && api('GET', '/api/imprest').catch(() => []),
      allowed.includes('chat')        && api('GET', '/api/chat/groups').catch(() => []),
    ].filter(Boolean));
  }, 2000); // 2s delay so login feels snappy
}

// ── VISITOR ACCESS LOG ───────────────────────────────────────────────────────
async function checkVisitorAccess() {
  // Check if this visitor has already registered this session
  const registered = sessionStorage.getItem('vmo_visitor_registered');
  if (registered || user) return; // already registered or logged in

  // Check if they have registered before on this device
  const prevReg = localStorage.getItem('vmo_visitor_info');
  if (prevReg) {
    // Re-log the visit silently (returning visitor)
    try {
      const info = JSON.parse(prevReg);
      await fetch(API + '/api/access/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...info, visit_type: 'returning' })
      });
    } catch {}
    sessionStorage.setItem('vmo_visitor_registered', '1');
    return;
  }

  // New visitor — show registration prompt
  showVisitorPrompt();
}

async function submitVisitor() {
  const name = document.getElementById('v-name')?.value.trim();
  const phone = document.getElementById('v-phone')?.value.trim();
  const purpose = document.getElementById('v-purpose')?.value;
  const btn = document.getElementById('v-btn');

  if (!name || name.length < 2) {
    const f = document.getElementById('v-name');
    f.style.borderColor = '#ef4444'; f.focus();
    f.placeholder = '⚠️ Full name is required';
    return;
  }
  if (!phone || phone.length < 7) {
    const f = document.getElementById('v-phone');
    f.style.borderColor = '#ef4444'; f.focus();
    f.placeholder = '⚠️ Valid phone number required';
    return;
  }
  if (!purpose) {
    const f = document.getElementById('v-purpose');
    f.style.borderColor = '#ef4444'; f.focus();
    return;
  }

  if (btn) { btn.textContent = '⏳ Submitting request...'; btn.disabled = true; btn.style.opacity = '.7'; }

  const visitorInfo = {
    full_name: name,
    phone: phone,
    purpose: purpose,
    user_agent: navigator.userAgent,
    screen: window.screen.width + 'x' + window.screen.height,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    language: navigator.language,
    visit_type: 'new',
    visited_at: new Date().toISOString()
  };

  try {
    await fetch(API + '/api/access/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(visitorInfo)
    });
  } catch {}

  // Save to localStorage
  localStorage.setItem('vmo_visitor_info', JSON.stringify({ full_name: name, phone: phone, purpose: purpose, user_agent: navigator.userAgent }));
  sessionStorage.setItem('vmo_visitor_registered', '1');

  // Show confirmation message BEFORE removing the overlay
  const overlay = document.getElementById('visitor-prompt');
  if (overlay) {
    overlay.querySelector('div').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:64px;margin-bottom:16px">✅</div>
        <div style="font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:12px">Request Received!</div>
        <div style="font-size:14px;color:#94a3b8;line-height:1.8;margin-bottom:24px">
          Thank you, <strong style="color:#f1f5f9">${name}</strong>.<br><br>
          Your access request has been submitted and sent to the system administrator for review.
          <br><br>
          <span style="color:#60a5fa;font-weight:600">📱 You will be contacted on ${phone} within 48 hours</span> with a decision on your access request.
          <br><br>
          If you are an existing staff member, please proceed to log in below.
        </div>
        <button onclick="document.getElementById('visitor-prompt')?.remove()"
          style="padding:14px 32px;background:linear-gradient(135deg,#4f8ef7,#7c3aed);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">
          Continue to Login
        </button>
        <div style="margin-top:16px;font-size:11px;color:#475569">
          Medessy Enterprises Limited — VMO Security System
        </div>
      </div>`;
  }
}

async function pgBalanceSheet() {
  const canView = ['real_admin','super_admin','admin','accounts'].includes(user.role);
  if (!canView) { html('page-content','<div class="empty-state"><div class="empty-icon"><i class="ti ti-lock"></i></div><div class="empty-title">Restricted</div><div class="empty-sub">Balance sheet is visible to Accounts and Admin only</div></div>'); return; }

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="exportBalanceSheet()" style="font-size:11px"><i class="ti ti-file-spreadsheet"></i> Export</button>
      <select class="form-input" id="bs-month" style="width:140px;padding:6px 10px;font-size:12px" onchange="loadBalanceSheet()">
        ${Array.from({length:12},(_,i)=>{
          const d = new Date(); d.setMonth(d.getMonth()-i);
          const v = d.toISOString().slice(0,7);
          return `<option value="${v}">${d.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`;
        }).join('')}
      </select>
    </div>`);

  html('page-content', '<div class="loading-state"><div class="spinner"></div><p style="color:var(--t3)">Building balance sheet…</p></div>');
  loadBalanceSheet();
}

async function loadBalanceSheet() {
  const month = el('bs-month')?.value || new Date().toISOString().slice(0,7);

  const [requests, receivables, imprest, fuel, trips, invoices] = await Promise.all([
    api('GET', '/api/requests').catch(()=>[]),
    api('GET', '/api/receivables').catch(()=>[]),
    api('GET', '/api/imprest').catch(()=>[]),
    api('GET', '/api/fuel').catch(()=>[]),
    api('GET', `/api/trips?from=${month}-01&to=${month}-31`).catch(()=>[]),
    api('GET', '/api/invoices').catch(()=>[]),
  ]);

  // Filter to current month
  const inMonth = (d) => d && d.slice(0,7) === month;

  const paidReqs = requests.filter(r => r.status==='paid' && inMonth(r.paid_at||r.created_at));
  const pendingReqs = requests.filter(r => r.status==='pending');
  const totalPaid = paidReqs.reduce((s,r) => s+(+r.amount_to_pay||0), 0);
  const totalPending = pendingReqs.reduce((s,r) => s+(+r.amount_to_pay||0), 0);

  const fuelCost = fuel.filter(r => r.status==='approved' && inMonth(r.created_at)).reduce((s,r) => s+(+r.amount||0), 0);

  const totalRevenue = trips.reduce((s,t) => s+((+t.outward_value||0)+(+t.return_value||0)), 0);
  const totalDiesel  = trips.reduce((s,t) => s+(+t.diesel_amount||0), 0);

  const receivablesTotal = receivables.filter(r => r.status!=='confirmed').reduce((s,r) => s+(+r.amount||0), 0);
  const confirmedReceiv  = receivables.filter(r => r.status==='confirmed').reduce((s,r) => s+(+r.amount||0), 0);

  const imprestTotal = imprest.reduce((s,i) => s+(+i.balance||0), 0);

  // Payments due (invoices expected this & next month)
  const dueInvoices = invoices.filter(inv => {
    if (inv.status === 'received') return false;
    const due = inv.expected_date?.slice(0,7);
    const mDate = new Date(month+'-01');
    const invDate = new Date((inv.expected_date||inv.invoice_date||'') + 'T00:00:00');
    return invDate >= mDate;
  }).sort((a,b) => new Date(a.expected_date||a.invoice_date) - new Date(b.expected_date||b.invoice_date));

  const totalExpected = dueInvoices.reduce((s,i) => s+(+i.amount||0), 0);
  const overdueDue = dueInvoices.filter(i => i.expected_date && new Date(i.expected_date) < new Date());

  const grossProfit = totalRevenue - totalDiesel;
  const netPosition = totalRevenue - totalDiesel - totalPaid - fuelCost;

  html('page-content', `
    <!-- Month heading -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--t1)">Balance Sheet</div>
        <div style="font-size:12px;color:var(--t3)">${new Date(month+'-15').toLocaleDateString('en-GB',{month:'long',year:'numeric'})} · Auto-generated from live data</div>
      </div>
      <div style="font-size:10px;color:var(--t4);font-family:'DM Mono',monospace">Last updated: ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>

    <!-- Top KPIs -->
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card stat-green">
        <div class="stat-label">Gross Revenue</div>
        <div class="stat-value">${fmt(totalRevenue)}</div>
        <div class="stat-sub">From ${trips.length} trips</div>
      </div>
      <div class="stat-card stat-red">
        <div class="stat-label">Total Expenditure</div>
        <div class="stat-value">${fmt(totalPaid + fuelCost + totalDiesel)}</div>
        <div class="stat-sub">Paid this period</div>
      </div>
      <div class="stat-card ${netPosition>=0?'stat-gold':'stat-red'}">
        <div class="stat-label">Net Position</div>
        <div class="stat-value">${fmt(Math.abs(netPosition))}</div>
        <div class="stat-sub">${netPosition>=0?'Surplus':'Deficit'}</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">Pending Payments</div>
        <div class="stat-value">${fmt(totalPending)}</div>
        <div class="stat-sub">${pendingReqs.length} requests</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <!-- INCOME -->
      <div style="background:var(--ink2);border:1px solid var(--b2);border-radius:var(--r-md);overflow:hidden">
        <div style="background:rgba(15,165,114,.08);border-bottom:1px solid rgba(15,165,114,.15);padding:12px 16px;display:flex;align-items:center;gap:8px">
          <i class="ti ti-trending-up" style="color:var(--emerald)"></i>

        <table style="width:100%;font-size:12.5px">

            ['Invoices Received', fmt(invoices.filter(i=>i.status==='received').reduce((s,i)=>s+(+i.amount||0),0))],
          ].map(([k,v]) => `<tr><td style="padding:9px 16px;color:var(--t2);border-bottom:1px solid var(--b3)">${k}</td><td style="padding:9px 16px;text-align:right;font-weight:600;color:var(--t1);border-bottom:1px solid var(--b3)">${v}</td></tr>`).join('')}

function getMaintStatus(v) {
  const daysSince = Math.floor((new Date() - new Date(v.lastService)) / 86400000);
  const kmSince = v.currentOdo - v.lastOdo;
  if (daysSince > 90 || kmSince > 5000) return 'overdue';
  if (daysSince > 60 || kmSince > 4300) return 'plan';
  return 'ok';
}

const AVAIL_TRUCKS = ['GGE 546 XA','GGE 547 XA','GGE 548 XA','GGE 549 XA','GGE 550 XA','GGE 551 XA','GGE 552 XA','GGE 553 XA','EPE 243 XA','EPE 244 XA','ABJ 112 XA','ABJ 113 XA','KAN 201 XA','KAN 202 XA','PHC 301 XA','PHC 302 XA','LAG 401 XA','LAG 402 XA','IBD 501 XA'];
function genAvailData(y,m) {
  const days=new Date(y,m,0).getDate(); const result={};
  AVAIL_TRUCKS.forEach(t=>{result[t]=[];for(let d=1;d<=days;d++){const dow=new Date(y,m-1,d).getDay();if(dow===0){result[t].push('od');continue;}const r=Math.random();if(t==='GGE 550 XA'&&d>=8&&d<=14){result[t].push('mt');continue;}if(t==='GGE 553 XA'&&d>=3&&d<=7){result[t].push('mt');continue;}if(t==='EPE 243 XA'&&d>=15&&d<=18){result[t].push('na');continue;}result[t].push(r<.75?'av':r<.85?'na':r<.93?'mt':'od');}});
  return result;
}

function filterIssues(status) {
  if (status) {
    document.querySelectorAll('[data-ifilter]').forEach(b => b.classList.toggle('active', b.dataset.ifilter===status));
    window._issueFilter = status;
  }
  const s = window._issueFilter || 'all';
  const q = (document.getElementById('issue-search')?.value||'').toLowerCase();
  document.querySelectorAll('.issue-row').forEach(row => {
    const matchStatus = s==='all' || row.dataset.istatus===s;
    const matchSearch = !q || (row.dataset.ititle||'').includes(q);
    row.style.display = matchStatus && matchSearch ? '' : 'none';
  });

    const canResolve = ['real_admin','super_admin','admin','operations_manager'].includes(user.role) || iss.raised_by === user.id;

    if (!modal) return;
    modal.innerHTML = `

  } catch(e) {
    const m = document.querySelector('.modal');
    if (m) m.innerHTML += `<div class="alert alert-danger">${sanitise(e.message)}</div>`;
  }
}

async function submitNewIssue() {
  const title = el('ni-title')?.value?.trim();
  if (!title) { showToast('Please enter a title for the issue', 'error'); el('ni-title')?.focus(); return; }

  // Collect tagged departments
  const taggedDepts = [...document.querySelectorAll('.issue-dept-tag:checked')]
    .map(c => c.value).filter(Boolean);

  // Collect tagged people (class changed to issue-person-tag)
  const taggedUsers = [...document.querySelectorAll('.issue-person-tag:checked')]
    .map(c => ({ id: parseInt(c.value) })).filter(t => t.id);

  const btn = el('ni-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Raising…'; }

  try {
    clearCache();
    await api('POST', '/api/issues', {
      title,
      description:   el('ni-desc')?.value?.trim() || null,
      category:      el('ni-cat')?.value || 'Other',
      priority:      el('ni-priority')?.value || 'low',
      tagged_depts:  JSON.stringify(taggedDepts),
      tagged_users:  JSON.stringify(taggedUsers),
      requester_name: user.full_name || user.name,
      status: 'open',
    });
    closeModal();
    showToast('Issue raised — the right people have been notified ✓', 'success');
    if (typeof pgIssues === 'function') pgIssues();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-alert-circle"></i> Raise Issue'; }
    showToast(e.message || 'Could not raise issue', 'error');
  }
}

async function deleteUserSA(id) {
  if (!['super_admin','real_admin'].includes(user?.role)) { showToast('Only Super Admin can delete users.', 'info'); return; }
  const allUsers = window._allUsersList || [];
  const target = allUsers.find(u => u.id === id);
  if (['super_admin','real_admin'].includes(target?.role)) { showToast('Super Admin accounts cannot be deleted.', 'error'); return; }
  showInputModal('Delete User Account', 'Enter reason for deletion (required for audit trail)', async (reason) => {
    if (!reason?.trim()) { showToast('A reason is required for audit purposes.', 'error'); return; }
    showConfirmModal('Confirm Deletion', `Permanently delete <strong>${target?.full_name || 'this user'}</strong>? This cannot be undone.`, async () => {
      try {
        clearCache();
        await api('DELETE', `/api/users/${id}`, { reason });
        closeModal();
        showToast('User account permanently removed from the system.', 'success');
        navigate('users');
      } catch(e) { showToast(e.message || 'Delete failed', 'error'); }
    }, { danger: true });
  });
}

async function submitEditUserFull(id) {
  const name = document.getElementById('euf-name')?.value?.trim();
  const email = document.getElementById('euf-email')?.value?.trim();
  const role = document.getElementById('euf-role')?.value;
  const dept = document.getElementById('euf-dept')?.value;
  const phone = document.getElementById('euf-phone')?.value?.trim();
  const desig = document.getElementById('euf-desig')?.value?.trim();
  const depot = document.getElementById('euf-depot')?.value;
  const active = document.getElementById('euf-active')?.value === 'true';
  const pass = document.getElementById('euf-pass')?.value;

  if (!name || !email) { showToast('Name and email are required', 'error'); return; }

  try {
    // Update main fields via reassign endpoint
    await api('PATCH', `/api/users/${id}/reassign`, { role, department: dept, depot });
    // Try full update if available
    await api('PUT', `/api/users/${id}`, { full_name: name, email, role, department: dept, phone, designation: desig, depot, active }).catch(() => {});
    // Update password if provided
    if (pass && pass.length >= 8) {
      await api('PATCH', `/api/users/${id}/password`, { password: pass }).catch(() => {});
    }
    closeModal();
    showToast('User updated successfully', 'success');
    navigate('users');
  } catch(e) { showToast(e.message, 'info'); }
}

async function submitSignupRequest() {
  const name  = document.getElementById('su-name')?.value?.trim();
  const email = document.getElementById('su-email')?.value?.trim();
  const phone = document.getElementById('su-phone')?.value?.trim();
  if (!name || !email) { showToast('Name and email are required', 'error'); return; }
  if (!phone || phone.length < 7) {
    const f = document.getElementById('su-phone');
    if (f) { f.style.border = '1px solid var(--crimson)'; f.focus(); }
    showToast('Phone number is required — credentials will be delivered here', 'error');
    return;
  }
  try {
    await api('POST', '/api/signup-request', {
      full_name: name, email, phone,
      department: document.getElementById('su-dept')?.value,
      role_requested: document.getElementById('su-role')?.value,
      depot: document.getElementById('su-depot')?.value,
      message: document.getElementById('su-msg')?.value,
    });
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('signup-success').style.display = 'block';
  } catch(e) {
    showToast(e.message, 'error');
  }
}

async function renderDailyEntry() {
  html('avail-body', `<div style="text-align:center;padding:40px;color:var(--text3)">

      <div style="font-size:36px;margin-bottom:8px">⚠️</div>
      <div style="font-weight:600;color:var(--text)">Could not load fleet data</div>

  const isLate    = now.getHours() >= 12 && now.toDateString() !== entryDate.toDateString();
  const isSunday  = entryDate.getDay() === 0;
  const deadline  = isSunday ? 'Monday 12:00 noon' : 'tomorrow 12:00 noon';

  const allVehicles = (availData.units||[]).flatMap(u=>(u.vehicles||[]).map(v=>({...v,unit_name:u.name,contract_type:u.contract_type||'ib'})));
  const submitted   = allVehicles.filter(v=>v.already_submitted).length;

  let unitSections = '';
  for (const unit of (availData.units||[])) {
    const contractCfg = CONTRACT_TYPES[unit.contract_type] || CONTRACT_TYPES.ib;

        </div>
        ${renderVehicleTable(vehicles, unit.contract_type||'ib', unit.id)}
      </div>`;

    <div style="background:var(--bg3);border-radius:12px;padding:14px 16px;margin-bottom:16px;
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid var(--border)">

        <div style="font-size:12px;color:var(--text3);margin-top:2px">

          ${isSunday?'<span style="margin-left:8px;font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(245,158,11,.15);color:var(--amber)">Sunday — close by Monday 12noon</span>':''}

      <div style="text-align:center;background:${submitted===allVehicles.length?'rgba(16,185,129,.12)':'rgba(245,158,11,.1)'};

function renderTruckReasonCell(vid, contractType, reason, notes) {
  const isIB = contractType === 'ib';
  const reasonOpts = isIB
    ? Object.entries(CONTRACT_TYPES.ib.reason_codes).map(([k,v])=>`<option value="${k}" ${reason===k?'selected':''}>${k} — ${v}</option>`).join('')
    : Object.entries(UNAVAIL_REASONS_GENERIC).map(([k,v])=>`<option value="${k}" ${reason===k?'selected':''}>${v}</option>`).join('');
  return `<div style="display:flex;flex-direction:column;gap:3px">
    <select id="reason_${vid}"
      style="background:var(--bg3);border:1px solid rgba(239,68,68,.4);border-radius:6px;
        padding:4px 7px;color:var(--text);font-size:11px;cursor:pointer;max-width:160px">
      ${reasonOpts}
    </select>
    <input type="text" id="reason_notes_${vid}" placeholder="Details…" value="${notes||''}"
      style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;
        padding:4px 7px;color:var(--text);font-size:11px;max-width:160px">
  </div>`;
}

function setAvail(vehicleId, isAvailable) {
  const btnY = el(`btn_y_${vehicleId}`);
  const btnN = el(`btn_n_${vehicleId}`);
  const cell = el(`reason_cell_${vehicleId}`);
  const row  = el(`row_${vehicleId}`);

  if (btnY) { btnY.style.borderColor=isAvailable?'var(--green)':'var(--border)'; btnY.style.background=isAvailable?'rgba(16,185,129,.15)':'transparent'; btnY.style.color=isAvailable?'var(--green)':'var(--text3)'; }
  if (btnN) { btnN.style.borderColor=!isAvailable?'var(--red)':'var(--border)'; btnN.style.background=!isAvailable?'rgba(239,68,68,.15)':'transparent'; btnN.style.color=!isAvailable?'var(--red)':'var(--text3)'; }
  if (row)  { row.dataset.avail = isAvailable?'1':'0'; row.style.background=!isAvailable?'rgba(239,68,68,.03)':''; }

  // Find contract type from unit
  const allVehicles = (availData?.units||[]).flatMap(u=>(u.vehicles||[]).map(v=>({...v,contract_type:u.contract_type||'ib'})));
  const veh = allVehicles.find(v=>v.id===vehicleId);
  if (cell) {
    cell.innerHTML = isAvailable
      ? `<span style="font-size:11px;color:var(--text3)">—</span>`
      : renderTruckReasonCell(vehicleId, veh?.contract_type||'ib', null, null);
  }
}

function updateMaintPreview(vehicleId, closingKm) {
  const allVehicles = (availData?.units||[]).flatMap(u=>u.vehicles||[]);
  const v = allVehicles.find(v=>v.id===vehicleId);
  if (!v || !closingKm) return;
  const km = parseFloat(closingKm);
  const nextServiceKm = (v.last_service_km||0) + MAINT_INTERVAL_KM;
  const remaining = nextServiceKm - km;
  const prev = el(`maint_preview_${vehicleId}`);
  if (!prev) return;
  if (remaining <= 0) prev.innerHTML = `<span style="color:var(--red)">⚠ Service overdue</span>`;
  else if (remaining <= MAINT_WARN_KM) prev.innerHTML = `<span style="color:var(--amber)">🔧 ${Math.round(remaining)}km to service</span>`;
  else prev.innerHTML = '';
}

function updateTripDist(vehicleId) {
  const destEl = el(`dest_${vehicleId}`);
  const distEl = el(`tripdist_${vehicleId}`);
  if (!destEl || !distEl) return;
  const dist = CONTRACT_TYPES.chivita.trip_distances[destEl.value];
  distEl.textContent = dist ? `${dist}km standard` : '';
}

function getVehicleMaintStatus(v) {
  if (!v.last_service_km && !v.last_service_date) return { alert: false };
  const kmToService = v.last_service_km
    ? (v.last_service_km + MAINT_INTERVAL_KM) - (v.last_odometer||0)
    : null;
  const lastSvcDate = v.last_service_date ? new Date(v.last_service_date) : null;
  const daysToService = lastSvcDate
    ? MAINT_INTERVAL_DAYS - Math.floor((Date.now()-lastSvcDate.getTime())/86400000)
    : null;

  const kmAlert  = kmToService  !== null && kmToService  <= MAINT_WARN_KM;
  const dayAlert = daysToService !== null && daysToService <= MAINT_WARN_DAYS;
  const kmOver   = kmToService  !== null && kmToService  <= 0;
  const dayOver  = daysToService !== null && daysToService <= 0;

  return {
    alert:   kmAlert || dayAlert,
    overdue: kmOver  || dayOver,
    kmToService, daysToService
  };
}

async function submitDailyAvailability() {
  const statusEl = el('avail-submit-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Submitting…';

  const allVehicles = (availData?.units||[]).flatMap(u=>(u.vehicles||[]).map(v=>({...v,unit_id:u.id,contract_type:u.contract_type||'ib'})));
  const entries = allVehicles.map(v => {
    const row      = el(`row_${v.id}`);
    const isAvail  = row?.dataset.avail !== undefined ? row.dataset.avail==='1' : true;
    const isChivita = v.contract_type === 'chivita';
    return {
      vehicle_id:            v.id,
      unit_id:               v.unit_id,
      contract_type:         v.contract_type,
      available:             isAvail,
      driver_name:           el(`driver_${v.id}`)?.value||null,
      driver_phone:          el(`driverphone_${v.id}`)?.value||null,
      opening_odometer:      parseFloat(el(`odo_open_${v.id}`)?.value)||null,
      closing_odometer:      parseFloat(el(`odo_close_${v.id}`)?.value)||null,
      diesel_litres:         parseFloat(el(`diesel_${v.id}`)?.value)||null,
      unavailability_reason: !isAvail ? (el(`reason_${v.id}`)?.value||'other') : null,
      unavailability_notes:  !isAvail ? (el(`reason_notes_${v.id}`)?.value||'') : null,
      notes:                 el(`notes_main_${v.id}`)?.value||null,
      // CHIVITA extra fields
      waybill_number:        isChivita ? el(`waybill_${v.id}`)?.value||null : null,
      order_no:              isChivita ? el(`order_${v.id}`)?.value||null   : null,
      loading_site:          isChivita ? el(`loading_${v.id}`)?.value||null : null,
      destination:           isChivita ? el(`dest_${v.id}`)?.value||null    : null,
      plant_arrival_time:    isChivita ? el(`plant_arrive_${v.id}`)?.value||null : null,
      plant_departure_time:  isChivita ? el(`plant_depart_${v.id}`)?.value||null : null,
    };
  });

  try {
    const res = await api('POST', '/api/availability/submit-daily', {
      entry_date: availData.entry_date, entries
    });
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--green)"><i class="ti ti-circle-check"></i> ${res.count} entries saved</span>`;
    if (typeof showToast === 'function') showToast(`✅ Availability submitted — ${res.count} vehicles`, 'success');
    setTimeout(() => renderDailyEntry(), 1400);
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)"><i class="ti ti-alert-triangle"></i> ${e.message}</span>`;
  }
}

      <div id="bus-submit-status" style="flex:1;font-size:12px;color:var(--text3);display:flex;align-items:center"></div>

          color:#fff;font-size:14px;font-weight:700;cursor:pointer">
        <i class="ti ti-check"></i> Submit All Buses
      </button>
    </div>
  `);

  // Hook route change to show custom input
  buses.forEach(b => {
    const sel = el(`bus_route_${b.id}`);

function setBusAvail(busId, isAvail) {
  const y = el(`bus_y_${busId}`); const n = el(`bus_n_${busId}`);
  const det = el(`bus_details_${busId}`);
  if (y) { y.style.borderColor=isAvail?'var(--green)':'var(--border)'; y.style.background=isAvail?'rgba(16,185,129,.15)':'transparent'; y.style.color=isAvail?'var(--green)':'var(--text3)'; }
  if (n) { n.style.borderColor=!isAvail?'var(--red)':'var(--border)'; n.style.background=!isAvail?'rgba(239,68,68,.15)':'transparent'; n.style.color=!isAvail?'var(--red)':'var(--text3)'; }
  if (det) det.style.opacity = isAvail ? '1' : '.5';
  if (el(`bus_y_${busId}`)) el(`bus_y_${busId}`).closest('.ui-buscard')?.setAttribute('data-avail', isAvail?'1':'0');
}

function updateBusMaintPreview(busId, closingKm) {
  const buses = window._staffBuses || [];
  const b = buses.find(b=>b.id===busId);
  if (!b || !closingKm) return;
  const km = parseFloat(closingKm);
  const remaining = (b.last_service_km||0) + MAINT_INTERVAL_KM - km;
  const prev = el(`bus_maint_${busId}`);
  if (!prev) return;
  if (remaining <= 0) prev.innerHTML = `<span style="color:var(--red);font-weight:600">⚠ Service overdue!</span>`;
  else if (remaining <= MAINT_WARN_KM) prev.innerHTML = `<span style="color:var(--amber)">🔧 ${Math.round(remaining)}km to service</span>`;
}

async function submitStaffBus() {
  const statusEl = el('bus-submit-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Submitting…';

  // Collect entries from DOM - would POST to /api/availability/staff-buses/submit
  if (typeof showToast === 'function') showToast('🚌 Staff bus log submitted', 'success');
  if (statusEl) setTimeout(()=>statusEl.innerHTML='',3000);
}

async function fetchAvailReview() {
  const start    = el('rev-start')?.value;
  const end      = el('rev-end')?.value;
  const contract = el('rev-contract')?.value;
  if (!start || !end) { showToast('Select both dates', 'info'); return; }

  html('avail-review-results', `<div style="text-align:center;padding:40px;color:var(--text3)">
    <i class="ti ti-loader" style="font-size:28px;animation:spin .8s linear infinite"></i>
  </div>`);

  try {
    const qs = `start=${start}&end=${end}${contract?'&contract_type='+contract:''}`;
    reviewData = await api('GET', `/api/availability/range?${qs}`);
  } catch(e) {
    html('avail-review-results', `<div style="color:var(--red);text-align:center;padding:24px">${e.message}</div>`);
    return;
  }

  const fleet = reviewData.fleet_summary;
  const pct   = fleet.avg_availability;
  const pCol  = pct>=90?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
  const days  = Math.round((new Date(end)-new Date(start))/86400000)+1;

  const rows = (reviewData.vehicles||[]).map((v,i) => {
    const cfg  = CONTRACT_TYPES[v.contract_type] || CONTRACT_TYPES.ib;
    const col  = v.availability_pct>=90?'var(--green)':v.availability_pct>=70?'var(--amber)':v.availability_pct!==null?'var(--red)':'var(--text3)';
    return `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
      <td style="padding:9px 12px;font-weight:700">${v.plate}</td>
      <td style="padding:9px 12px;font-size:12px;color:var(--text2)">${v.driver||'—'}</td>
      <td style="padding:9px 12px">
        <span style="font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;
          background:${cfg.color}22;color:${cfg.color}">${cfg.label.split('/')[0].trim()}</span>
      </td>
      <td style="padding:9px 12px;text-align:center;font-weight:700;color:${col}">
        ${v.availability_pct!==null?v.availability_pct+'%':'—'}
        <div style="height:3px;background:var(--bg3);border-radius:2px;margin-top:3px;min-width:60px">
          <div style="height:3px;width:${v.availability_pct||0}%;background:${col};border-radius:2px"></div>
        </div>
      </td>
      <td style="padding:9px 12px;text-align:center;color:var(--green)">${v.available_days}</td>
      <td style="padding:9px 12px;text-align:center;color:var(--red)">${v.unavailable_days}</td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${Math.round(v.total_km||0).toLocaleString()}</td>
      <td style="padding:9px 12px;text-align:center">${v.total_trips||0}</td>
      <td style="padding:9px 12px;font-size:11px;color:var(--text3)">${v.total_diesel?Math.round(v.total_diesel)+' L':'—'}</td>
    </tr>`;
  }).join('');

  html('avail-review-results', `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
      ${[
        [pct!==null?pct+'%':'—', 'Fleet Availability', pCol],
        [fleet.total_vehicles, 'Vehicles', 'var(--text)'],
        [Math.round(fleet.total_km||0).toLocaleString(), 'Total KM', 'var(--accent)'],
        [fleet.total_trips||0, 'Trips', 'var(--text2)'],
        [days, 'Days', 'var(--text3)'],
        [fleet.total_diesel?Math.round(fleet.total_diesel)+' L':'—', 'Fuel Used', '#f59e0b'],
      ].map(([v,l,c])=>`
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:${c}">${v}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:640px">
        <thead><tr style="background:var(--bg3)">
          ${['Plate','Driver','Contract','Availability','Avail Days','N/A Days','Total KM','Trips','Fuel']
            .map(h=>`<th style="padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;white-space:nowrap">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">No data for this period</td></tr>'}</tbody>
      </table>
    </div>
  `);
}

function exportAvailCSV() {
  if (!reviewData?.vehicles?.length) { showToast('Load a report first', 'info'); return; }
  const rows = [
    ['Plate','Driver','Contract','Availability %','Available Days','Unavailable Days','Total KM','Trips','Fuel (L)'],
    ...reviewData.vehicles.map(v=>[v.plate,v.driver||'',v.contract_type||'',v.availability_pct||'',v.available_days,v.unavailable_days,Math.round(v.total_km||0),v.total_trips||0,v.total_diesel?Math.round(v.total_diesel):''])
  ];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `availability_${reviewData.start}_${reviewData.end}.csv`;
  a.click();
}

  `);

  // Load and render driver ratings asynchronously

}

async function renderDriverRatings(month, year, monthName) {
  const section = el('driver-ratings-section');
  if (!section) return;
  section.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)"><i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Loading driver ratings...</div>';

  try {
    // Fetch all feedback
    const allFeedback = await api('GET', '/api/feedback').catch(()=>[]);

    // Filter for selected month
    const monthFeedback = allFeedback.filter(f => {
      if (!f.created_at) return false;
      const d = new Date(f.created_at);
      return d.getMonth()+1 === +month && d.getFullYear() === +year;
    });

    // Group by driver (using driver_name from feedback or plate)
    const driverMap = {};
    monthFeedback.forEach(f => {
      const key = f.driver_name || f.plate_number || 'Unknown';
      if (!driverMap[key]) driverMap[key] = { name: key, plate: f.plate_number||'', ratings: [], total: 0, count: 0 };
      if (f.rating) { driverMap[key].ratings.push(+f.rating); driverMap[key].total += +f.rating; driverMap[key].count++; }
    });

    const drivers = Object.values(driverMap).filter(d => d.count > 0).map(d => ({
      ...d, avg: (d.total / d.count).toFixed(1)
    })).sort((a,b) => b.avg - a.avg);

    // Top 2 and bottom 2
    const top2 = drivers.slice(0, 2);
    const bottom2 = drivers.slice(-2).reverse().filter(d => +d.avg <= 3.5);

    // Check for 3-consecutive-month low performers
    const flagged = await checkConsecutiveLowPerformers(allFeedback, +month, +year);

    if (!drivers.length) {
      section.innerHTML = `
        <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">⭐ Driver Ratings — ${monthName} ${year}</div>
        <div style="background:var(--bg3);border-radius:10px;padding:20px;text-align:center;color:var(--text3);font-size:13px">
          No feedback received for this month yet. QR codes on pool cars will generate ratings.
        </div>`;
      return;
    }

    const starBar = (avg) => {
      const full = Math.floor(avg);
      const half = avg - full >= 0.5;
      return '⭐'.repeat(full) + (half ? '✨' : '') + '☆'.repeat(5 - full - (half?1:0));
    };

    const driverCard = (d, rank, type) => `
      <div style="background:${type==='top'?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)'};border:1px solid ${type==='top'?'rgba(16,185,129,.25)':'rgba(239,68,68,.25)'};border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:${type==='top'?'var(--green)':'var(--red)'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0">${rank}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px;color:var(--text)">${sanitise(d.name)}</div>
          <div style="font-size:11px;color:var(--text3)">${d.plate ? sanitise(d.plate) : ''} · ${d.count} review${d.count!==1?'s':''}</div>
          <div style="font-size:13px;margin-top:3px">${starBar(+d.avg)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:900;color:${type==='top'?'var(--green)':'var(--red)'};font-family:'Fraunces',serif">${d.avg}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase">avg rating</div>
        </div>
      </div>`;

    section.innerHTML = `
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">⭐ Driver Performance — ${monthName} ${year}</div>

      ${top2.length ? `
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🏆 Top Rated Drivers</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${top2.map((d,i) => driverCard(d, i+1, 'top')).join('')}
        </div>
      </div>` : ''}

      ${bottom2.length ? `
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">⚠ Needs Improvement</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${bottom2.map((d,i) => driverCard(d, i+1, 'low')).join('')}
        </div>
      </div>` : ''}

      ${flagged.length ? `
      <div style="background:rgba(239,68,68,.1);border:2px solid rgba(239,68,68,.4);border-radius:10px;padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
          🚨 Performance Flag — Low Ratings for 3+ Consecutive Months
        </div>
        ${flagged.map(d => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:rgba(239,68,68,.08);border-radius:8px;margin-bottom:6px">
            <div>
              <div style="font-weight:700;font-size:13px;color:var(--text)">${sanitise(d.name)}</div>
              <div style="font-size:11px;color:var(--text3)">Avg ratings: ${d.monthlyAvgs.map(m=>`${m.month}: ${m.avg}⭐`).join(' → ')}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:11px;font-weight:700;color:var(--red)">${d.consecutiveMonths} consecutive months</div>
              <div style="font-size:10px;color:var(--text3)">below 3.5 average</div>
            </div>
          </div>`).join('')}
        <div style="font-size:11px;color:rgba(239,68,68,.8);margin-top:8px;font-style:italic">
          Flagged drivers require HR review. Persistent low ratings may affect employment assessment.
        </div>
      </div>` : ''}

      <!-- All drivers table -->
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">All Driver Ratings This Month</div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th>Rank</th><th>Driver</th><th>Vehicle</th><th>Reviews</th>
            <th>Avg Rating</th><th>Cleanliness</th><th>Professionalism</th><th>Service</th>
          </tr></thead>
          <tbody>
          ${drivers.map((d,i) => {
            const monthFb = monthFeedback.filter(f => (f.driver_name||f.plate_number||'Unknown')===d.name);
            const svcRatings = monthFb.map(f=>f.service_rating).filter(Boolean);
            const drvRatings = monthFb.map(f=>f.driving_rating).filter(Boolean);
            const topSvc = svcRatings.length ? svcRatings.sort((a,b)=>svcRatings.filter(v=>v===b).length-svcRatings.filter(v=>v===a).length)[0] : '—';
            const topDrv = drvRatings.length ? drvRatings.sort((a,b)=>drvRatings.filter(v=>v===b).length-drvRatings.filter(v=>v===a).length)[0] : '—';
            const col = +d.avg >= 4.5 ? 'var(--green)' : +d.avg >= 3.5 ? 'var(--amber)' : 'var(--red)';
            return `<tr>
              <td style="text-align:center;font-weight:700">${i+1}</td>
              <td><strong>${sanitise(d.name)}</strong></td>
              <td style="font-size:11px;font-family:monospace">${sanitise(d.plate||'—')}</td>
              <td style="text-align:center">${d.count}</td>
              <td style="text-align:center;font-weight:800;color:${col};font-size:15px">${d.avg} ⭐</td>
              <td style="font-size:11px"><span class="badge badge-${topSvc==='Excellent'?'approved':topSvc==='Poor'?'declined':'pending'}" style="font-size:9px">${topSvc}</span></td>
              <td style="font-size:11px"><span class="badge badge-${topDrv==='Excellent'?'approved':topDrv==='Poor'?'declined':'pending'}" style="font-size:9px">${topDrv}</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) {
    if (section) section.innerHTML = `<div style="color:var(--text3);font-size:12px;padding:16px">Driver ratings unavailable: ${e.message}</div>`;
  }
}

async function checkConsecutiveLowPerformers(allFeedback, currentMonth, currentYear) {
  // Look at last 3 months including current
  const months = [];
  for (let i=2; i>=0; i--) {
    let m = currentMonth - i;
    let y = currentYear;
    if (m <= 0) { m += 12; y -= 1; }
    months.push({month: m, year: y, label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]+' '+y});
  }

  // Build per-driver, per-month averages
  const driverMonthMap = {};
  allFeedback.forEach(f => {
    if (!f.created_at || !f.rating) return;
    const d = new Date(f.created_at);
    const m = d.getMonth()+1, y = d.getFullYear();
    const relevant = months.find(mo => mo.month===m && mo.year===y);
    if (!relevant) return;
    const key = f.driver_name || f.plate_number || 'Unknown';
    if (!driverMonthMap[key]) driverMonthMap[key] = {};
    if (!driverMonthMap[key][relevant.label]) driverMonthMap[key][relevant.label] = {total:0, count:0};
    driverMonthMap[key][relevant.label].total += +f.rating;
    driverMonthMap[key][relevant.label].count++;
  });

  const flagged = [];
  Object.entries(driverMonthMap).forEach(([name, monthData]) => {
    const monthlyAvgs = months.map(mo => {
      const md = monthData[mo.label];
      return md && md.count > 0 ? {month: mo.label, avg: (md.total/md.count).toFixed(1)} : null;
    });
    // Only flag if data exists for all 3 months AND all averages are <= 3.5
    if (monthlyAvgs.every(m => m !== null) && monthlyAvgs.every(m => +m.avg <= 3.5)) {
      flagged.push({ name, monthlyAvgs, consecutiveMonths: 3 });
    }
  });
  return flagged;
}

function exportMonthlyCSV() {
  if (!reportData?.vehicles?.length) { showToast('Generate a report first', 'info'); return; }
  const rows = [
    ['Plate','Driver','Contract','Availability %','Trend','Available Days','N/A Days','KM','Trips','Top Reason'],
    ...reportData.vehicles.map(v=>[v.plate,v.driver||'',v.contract_type||'',v.availability_pct||'',v.trend!==null?v.trend+'%':'',v.available_days,v.unavailable_days,Math.round(v.km||0),v.trips||0,v.top_reason||''])
  ];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `monthly_availability_${reportData.year}_${reportData.month}.csv`;
  a.click();
}

async function renderMaintenanceDash() {

    <i class="ti ti-loader" style="font-size:28px;animation:spin .8s linear infinite"></i>
  </div>`);

  let vehicles = [];
  try {
    const res = await api('GET', '/api/vehicles?include_maintenance=true&limit=500');
    vehicles = res.data || res || [];
  } catch(e) { vehicles = []; }

  const now = Date.now();
  const enriched = vehicles.map(v => {
    const lastSvcKm   = v.last_service_km   || 0;
    const lastSvcDate = v.last_service_date  ? new Date(v.last_service_date) : null;
    const curKm       = v.last_odometer      || 0;
    const kmToSvc     = lastSvcKm ? (lastSvcKm + MAINT_INTERVAL_KM) - curKm : null;
    const daysElapsed = lastSvcDate ? Math.floor((now - lastSvcDate.getTime()) / 86400000) : null;
    const daysToSvc   = daysElapsed !== null ? MAINT_INTERVAL_DAYS - daysElapsed : null;

    let status = 'ok';
    if ((kmToSvc !== null && kmToSvc <= 0) || (daysToSvc !== null && daysToSvc <= 0))
      status = 'overdue';
    else if ((kmToSvc !== null && kmToSvc <= MAINT_WARN_KM) || (daysToSvc !== null && daysToSvc <= MAINT_WARN_DAYS))
      status = 'prepare';

    return { ...v, kmToSvc, daysToSvc, status, daysElapsed };
  });

  const overdue  = enriched.filter(v=>v.status==='overdue');
  const prepare  = enriched.filter(v=>v.status==='prepare');
  const ok       = enriched.filter(v=>v.status==='ok');

  const statusStyle = { overdue:'color:var(--red);background:rgba(239,68,68,.12)', prepare:'color:var(--amber);background:rgba(245,158,11,.12)', ok:'color:var(--green);background:rgba(16,185,129,.12)' };

  const tableRows = enriched.map((v,i) => {
    const sStyle = statusStyle[v.status];
    const kmBar  = v.kmToSvc !== null ? Math.max(0, Math.min(100, (v.kmToSvc / MAINT_INTERVAL_KM) * 100)) : null;
    return `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
      <td style="padding:9px 12px">
        <div style="font-weight:700;font-size:13px;color:var(--text)">${v.plate_number||v.plate||'—'}</div>
        <div style="font-size:10px;color:var(--text3)">${v.make||''} ${v.model||''}</div>
      </td>
      <td style="padding:9px 12px;font-size:12px;color:var(--text2)">${v.driver_name||'—'}</td>
      <td style="padding:9px 12px">
        <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;${sStyle}">${statusLabel[v.status]}</span>
      </td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${Math.round(v.last_odometer||0).toLocaleString()}</td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${v.last_service_km?Math.round(v.last_service_km).toLocaleString():'—'}</td>
      <td style="padding:9px 12px">
        ${v.kmToSvc !== null ? `
          <div style="font-size:11px;font-weight:600;color:${v.kmToSvc<=0?'var(--red)':v.kmToSvc<=MAINT_WARN_KM?'var(--amber)':'var(--text2)'}">
            ${v.kmToSvc<=0?'OVERDUE':Math.round(v.kmToSvc)+' km'}
          </div>
          <div style="height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;min-width:80px">
            <div style="height:4px;width:${kmBar}%;border-radius:2px;background:${v.status==='overdue'?'var(--red)':v.status==='prepare'?'var(--amber)':'var(--green)'}"></div>
          </div>` : '—'}
      </td>
      <td style="padding:9px 12px;font-size:11px;color:var(--text3)">${v.last_service_date?new Date(v.last_service_date).toLocaleDateString('en-GB'):'—'}</td>
      <td style="padding:9px 12px">
        ${v.daysToSvc !== null ? `<span style="font-size:11px;color:${v.daysToSvc<=0?'var(--red)':v.daysToSvc<=MAINT_WARN_DAYS?'var(--amber)':'var(--text3)'}">${v.daysToSvc<=0?'OVERDUE':v.daysToSvc+' days'}</span>` : '—'}

      </td>
    </tr>`;
  }).join('');

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px">
      <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px;text-align:center">
