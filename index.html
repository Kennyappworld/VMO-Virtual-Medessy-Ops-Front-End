/* ══════════════════════════════════════════════════════════
   VMO v11 — DESIGN SYSTEM
   Aesthetic: Refined Industrial Luxury
   Inspiration: Bloomberg Terminal meets luxury Swiss watchmaking
   Palette: Deep ink blacks, warm bronze gold, arctic white
══════════════════════════════════════════════════════════ */
:root {
  /* Core palette */
  --ink:       #080c14;
  --ink2:      #0d1220;
  --ink3:      #141c2e;
  --ink4:      #1c2640;
  --ink5:      #243050;

  /* Gold accent system */
  --gold:      #c9a84c;
  --gold2:     #e8c86a;
  --gold3:     #f5dfa0;
  --gold-glow: rgba(201,168,76,.18);

  /* Semantic */
  --emerald:   #0fa572;
  --crimson:   #e03d5a;
  --amber:     #d97706;
  --sapphire:  #3b82f6;
  --violet:    #7c3aed;

  /* Text */
  --t1: #f0ebe0;
  --t2: #a09880;
  --t3: #5c6480;
  --t4: #343d55;

  /* Borders */
  --b1: rgba(201,168,76,.12);
  --b2: rgba(240,235,224,.06);
  --b3: rgba(240,235,224,.03);

  /* Radii */
  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;

  /* Shadows */
  --s1: 0 2px 8px rgba(0,0,0,.4);
  --s2: 0 8px 32px rgba(0,0,0,.5);
  --s3: 0 24px 64px rgba(0,0,0,.6);
  --s-gold: 0 0 24px rgba(201,168,76,.15);

  /* Layout */
  --topbar-h: 58px;
  --sidebar-w: 228px;

  /* Legacy compat */
  --bg: var(--ink);
  --bg2: var(--ink2);
  --bg3: var(--ink3);
  --bg4: var(--ink4);
  --accent: var(--gold);
  --accent2: var(--violet);
  --green: var(--emerald);
  --red: var(--crimson);
  --text: var(--t1);
  --text2: var(--t2);
  --text3: var(--t3);
  --border: var(--b2);
  --radius: var(--r-md);
  --shadow: var(--s2);
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--t1);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
img { display: block; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ── APP SHELL ── */
.app-wrap { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

/* ══ SIDEBAR ══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--ink2);
  border-right: 1px solid var(--b1);
  display: flex; flex-direction: column;
  position: relative; z-index: 300;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}

/* Subtle texture overlay */
.sidebar::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 24px,
    rgba(201,168,76,.018) 24px, rgba(201,168,76,.018) 25px
  );
}

.sidebar-header {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--b1);
  position: relative;
}

.sidebar-wordmark {
  display: flex; align-items: baseline; gap: 6px;
}
.sidebar-wordmark-vmo {
  font-family: 'Fraunces', serif;
  font-size: 28px; font-weight: 900;
  color: var(--gold); letter-spacing: -1px;
  text-shadow: 0 0 30px rgba(201,168,76,.4);
  line-height: 1;
}
.sidebar-wordmark-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold); margin-bottom: 6px; flex-shrink: 0;
  box-shadow: 0 0 8px var(--gold);
}
.sidebar-sub {
  font-size: 9px; color: var(--t3); margin-top: 3px;
  text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500;
}

.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; border-bottom: 1px solid var(--b2);
  background: rgba(201,168,76,.04);
}
.sidebar-avatar {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold), #8B5E1A);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 11px; color: var(--ink);
  border: 1px solid rgba(201,168,76,.3);
}
.sidebar-name { font-size: 12px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-role { font-size: 10px; color: var(--gold); text-transform: capitalize; font-weight: 500; margin-top: 1px; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 10px; scrollbar-width: none; }
.sidebar-nav::-webkit-scrollbar { display: none; }

.nav-section {
  font-size: 8.5px; font-weight: 700; color: var(--t4);
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 14px 8px 4px; font-family: 'DM Mono', monospace;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r-sm);
  color: var(--t3); font-size: 12.5px; font-weight: 500;
  transition: all .15s; margin-bottom: 1px;
  border: none; background: none; width: 100%; text-align: left;
  position: relative; overflow: hidden;
}
.nav-item:hover { background: rgba(201,168,76,.07); color: var(--t2); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(201,168,76,.15), rgba(201,168,76,.05));
  color: var(--gold); font-weight: 600;
  border-left: 2px solid var(--gold);
  padding-left: 8px;
}
.nav-item i { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; opacity: .8; }
.nav-item.active i { opacity: 1; }

/* Unread badge on chat nav item */
.nav-badge {
  margin-left: auto; background: var(--crimson);
  color: #fff; font-size: 9px; font-weight: 800;
  padding: 1px 5px; border-radius: 20px; min-width: 16px;
  text-align: center;
}

.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--b2); }
.btn-signout {
  width: 100%; padding: 9px 12px; border-radius: var(--r-sm);
  background: rgba(224,61,90,.08); border: 1px solid rgba(224,61,90,.15);
  color: #f87171; font-size: 11.5px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 7px; transition: .15s;
}
.btn-signout:hover { background: rgba(224,61,90,.15); border-color: rgba(224,61,90,.3); }

/* ══ TOPBAR ═══════════════════════════════════════════════ */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar {
  height: var(--topbar-h); flex-shrink: 0;
  background: rgba(13,18,32,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  position: relative; z-index: 100;
}
.topbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: .3;
}
.topbar-menu {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--b2);
  color: var(--t3); display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: .15s;
}
.topbar-menu:hover { background: var(--ink3); color: var(--t2); }
.topbar-title {
  flex: 1; font-size: 16px; font-weight: 700; color: var(--t1);
  font-family: 'Fraunces', serif; letter-spacing: -0.3px;
}
.topbar-action {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--gold), #a8782a);
  border: none; color: var(--ink); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: .15s;
  box-shadow: 0 2px 12px rgba(201,168,76,.35);
}
.topbar-action:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(201,168,76,.5); }

/* ══ PAGE CONTENT ═════════════════════════════════════════ */
.page-content {
  flex: 1; overflow-y: auto;
  padding: 20px; padding-bottom: 32px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--ink4) transparent;
}
.page-content::-webkit-scrollbar { width: 4px; }
.page-content::-webkit-scrollbar-track { background: transparent; }
.page-content::-webkit-scrollbar-thumb { background: var(--ink4); border-radius: 2px; }

/* ══ SIDEBAR OVERLAY ══════════════════════════════════════ */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 299;
  backdrop-filter: blur(4px); opacity: 0;
  pointer-events: none; transition: opacity .3s;
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 40px rgba(0,0,0,.7);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; }
}

/* ══ LOGIN ════════════════════════════════════════════════ */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background: #050810;
  position: relative; overflow: hidden;
}

/* Deep space background */
.login-wrap::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, rgba(201,168,76,.09) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 85% 80%, rgba(124,58,237,.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(201,168,76,.04) 0%, transparent 65%),
    radial-gradient(ellipse 30% 50% at 70% 10%, rgba(59,130,246,.05) 0%, transparent 50%);
  animation: loginPulse 10s ease-in-out infinite alternate;
}
@keyframes loginPulse {
  0%   { opacity: .7; transform: scale(1); }
  50%  { opacity: 1;  transform: scale(1.03); }
  100% { opacity: .8; transform: scale(1.01); }
}

/* Fine grid */
.login-wrap::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(201,168,76,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.035) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* Animated orbs */
.login-orb {
  position: absolute; border-radius: 50%; pointer-events: none; filter: blur(60px);
}
.login-orb-1 {
  width: 400px; height: 400px; top: -100px; left: -100px;
  background: radial-gradient(circle, rgba(201,168,76,.12), transparent 70%);
  animation: orbFloat1 12s ease-in-out infinite;
}
.login-orb-2 {
  width: 300px; height: 300px; bottom: -80px; right: -60px;
  background: radial-gradient(circle, rgba(124,58,237,.1), transparent 70%);
  animation: orbFloat2 15s ease-in-out infinite;
}
.login-orb-3 {
  width: 200px; height: 200px; top: 40%; right: 15%;
  background: radial-gradient(circle, rgba(59,130,246,.07), transparent 70%);
  animation: orbFloat3 18s ease-in-out infinite;
}
@keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(40px,-30px)} 66%{transform:translate(-20px,40px)} }
@keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-30px,40px)} 66%{transform:translate(30px,-20px)} }
@keyframes orbFloat3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,30px)} }

.login-card {
  width: 100%; max-width: 440px;
  background: linear-gradient(160deg, rgba(16,22,40,.95) 0%, rgba(10,14,24,.98) 100%);
  backdrop-filter: blur(40px);
  border: 1px solid rgba(201,168,76,.18);
  border-radius: 28px;
  padding: 48px 40px;
  box-shadow:
    0 32px 80px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.03),
    inset 0 1px 0 rgba(201,168,76,.12),
    0 0 60px rgba(201,168,76,.06);
  position: relative; z-index: 1;
  animation: loginSlide .6s cubic-bezier(.16,1,.3,1) both;
}
/* Card inner glow top edge */
.login-card::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.5), transparent);
  border-radius: 1px;
}
@keyframes loginSlide {
  from { transform: translateY(32px) scale(.97); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
.login-logo {
  font-family: 'Fraunces', serif;
  font-size: 58px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg, #f5dfa0 0%, #c9a84c 40%, #e8c86a 70%, #a8782a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -3px; text-align: center; margin-bottom: 4px;
  filter: drop-shadow(0 0 24px rgba(201,168,76,.4));
  animation: logoGlow 3s ease-in-out infinite alternate;
}
@keyframes logoGlow {
  0%   { filter: drop-shadow(0 0 16px rgba(201,168,76,.3)); }
  100% { filter: drop-shadow(0 0 32px rgba(201,168,76,.6)); }
}
.login-sub {
  text-align: center; font-size: 11px; color: rgba(160,152,128,.7);
  margin-bottom: 28px; line-height: 1.8;
  text-transform: uppercase; letter-spacing: 1.4px;
  font-family: 'DM Mono', monospace;
}
.login-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.6), transparent);
  margin: 0 auto 32px;
  position: relative;
}
.login-divider::before {
  content: '◆'; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  font-size: 6px; color: var(--gold); opacity: .8;
}

/* ══ FORMS ════════════════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label {
  display: block; font-size: 10.5px; font-weight: 700;
  color: var(--t3); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}
.form-input {
  width: 100%; padding: 10px 13px;
  background: var(--ink3); border: 1px solid var(--b2);
  border-radius: var(--r-sm); color: var(--t1);
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: all .2s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,.06);
  box-shadow: 0 0 0 3px rgba(201,168,76,.1);
}
.form-input::placeholder { color: var(--t4); }
select.form-input option { background: var(--ink3); }
textarea.form-input { resize: vertical; min-height: 80px; line-height: 1.5; }

/* ══ BUTTONS ══════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px; padding: 9px 16px; border-radius: var(--r-sm);
  font-size: 12.5px; font-weight: 600; transition: all .15s;
  cursor: pointer; border: 1px solid transparent; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.btn i { font-size: 14px; }
.btn-primary {
  background: linear-gradient(135deg, var(--gold), #a8782a);
  color: var(--ink); border-color: transparent;
  box-shadow: 0 2px 12px rgba(201,168,76,.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,.45); filter: brightness(1.05); }
.btn-ghost {
  background: transparent; color: var(--t2);
  border-color: var(--b2);
}
.btn-ghost:hover { background: var(--ink3); color: var(--t1); border-color: var(--b1); }
.btn-danger { background: rgba(224,61,90,.12); color: #f87171; border-color: rgba(224,61,90,.2); }
.btn-danger:hover { background: rgba(224,61,90,.2); }
.btn-sm { padding: 6px 11px; font-size: 11.5px; }
.btn-block { width: 100%; }

/* ══ STAT CARDS ═══════════════════════════════════════════ */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--ink2);
  border: 1px solid var(--b2);
  border-radius: var(--r-md);
  padding: 16px 14px;
  position: relative; overflow: hidden;
  transition: all .2s;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card:hover { transform: translateY(-2px); border-color: var(--b1); box-shadow: var(--s1); }
.stat-card.stat-amber::before { background: linear-gradient(90deg, var(--gold), var(--amber)); }
.stat-card.stat-green::before { background: linear-gradient(90deg, var(--emerald), #06b6d4); }
.stat-card.stat-blue::before { background: linear-gradient(90deg, var(--sapphire), var(--violet)); }
.stat-card.stat-purple::before { background: linear-gradient(90deg, var(--violet), #ec4899); }
.stat-card.stat-red::before { background: linear-gradient(90deg, var(--crimson), var(--amber)); }
.stat-card.stat-gold::before { background: linear-gradient(90deg, var(--gold), var(--gold3)); }
.stat-label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.stat-value { font-size: 24px; font-weight: 800; color: var(--t1); line-height: 1; font-family: 'Fraunces', serif; }
.stat-sub { font-size: 11px; color: var(--t3); margin-top: 4px; }

/* ══ LIST ITEMS ═══════════════════════════════════════════ */
.list-item {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--ink2); border: 1px solid var(--b3);
  border-radius: var(--r-md); padding: 14px;
  margin-bottom: 6px; transition: all .15s;
}
.list-item:hover { border-color: var(--b1); background: var(--ink3); }
.list-dot {
  width: 38px; height: 38px; border-radius: var(--r-sm); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.list-dot.amber { background: rgba(217,119,6,.15); color: var(--amber); }
.list-dot.green { background: rgba(15,165,114,.15); color: var(--emerald); }
.list-dot.red { background: rgba(224,61,90,.15); color: var(--crimson); }
.list-dot.blue { background: rgba(59,130,246,.15); color: var(--sapphire); }
.list-dot.gold { background: rgba(201,168,76,.15); color: var(--gold); }
.list-body { flex: 1; min-width: 0; }
.list-title { font-size: 13.5px; font-weight: 600; color: var(--t1); }
.list-sub { font-size: 11.5px; color: var(--t3); margin-top: 2px; }
.list-meta { font-size: 11.5px; color: var(--t3); text-align: right; flex-shrink: 0; }

/* ══ BADGES ═══════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  font-family: 'DM Mono', monospace;
}
.badge-approved { background: rgba(15,165,114,.15); color: var(--emerald); border: 1px solid rgba(15,165,114,.2); }

<script>
'use strict';

// ── SECURITY HARDENING ────────────────────────────────────────────────────────
// ① No secrets in source — API key, tokens are server-side only
// ② Token stored in memory + localStorage (no sessionStorage leak)
// ③ All user-supplied strings escaped before DOM insertion
// ④ Login rate-limiting: max 5 attempts per 10 min
// ⑤ Token validation on every page load
// ⑥ XSS protection: sanitise() used on all untrusted strings
// ─────────────────────────────────────────────────────────────────────────────

const API = 'https://vmo-virtual-medessy-opps-backend-production.up.railway.app';
const PUSHER_KEY     = 'YOUR_PUSHER_APP_KEY';
const PUSHER_CLUSTER = 'eu';

// ── SECURITY: Input sanitisation to prevent XSS ──────────────────────────────
function sanitise(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}

// ── SECURITY: Login rate limiting ─────────────────────────────────────────────
const _loginAttempts = { count: 0, resetAt: 0 };
function checkLoginRateLimit() {
  const now = Date.now();
  if (now > _loginAttempts.resetAt) { _loginAttempts.count = 0; _loginAttempts.resetAt = now + 600000; }
  if (_loginAttempts.count >= 5) {
    const wait = Math.ceil((_loginAttempts.resetAt - now) / 60000);
    throw new Error(`Too many attempts. Try again in ${wait} minute(s).`);
  }
  _loginAttempts.count++;
}
function resetLoginRateLimit() { _loginAttempts.count = 0; }

// ── SECURITY: Token validation ────────────────────────────────────────────────
function isTokenExpired(tok) {
  if (!tok) return true;
  try {
    const payload = JSON.parse(atob(tok.split('.')[1]));
    return payload.exp ? Date.now() / 1000 > payload.exp : false;
  } catch { return false; }
}

let _pusher = null;
let _pusherChannel = null;
let _pusherAvailChannel = null;

function initPusher() {
  if (!PUSHER_KEY || PUSHER_KEY === 'YOUR_PUSHER_APP_KEY') return;
  try {
    _pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      authEndpoint: API + '/pusher/auth',
      auth: { headers: { Authorization: 'Bearer ' + token } }
    });

    // System channel — settings changes, announcements
    _pusherChannel = _pusher.subscribe('vmo-system');
    _pusherChannel.bind('cron-settings-updated', (data) => {
      showToast(`⚙️ Report schedule updated by ${data.updated_by}`, 'info');
    });

    // Availability channel — live entry updates
    _pusherAvailChannel = _pusher.subscribe('vmo-availability');
    _pusherAvailChannel.bind('entry-submitted', (data) => {
      if (page === 'availability') {
        showToast(`✅ ${data.submitted_by} submitted availability for ${data.unit_name}`, 'success');
        if (availTab === 'daily') renderDailyEntry();
      }
    });
    _pusherAvailChannel.bind('report-ready', (data) => {
      showToast(`📊 ${data.report_type} report is ready`, 'info');
    });

    // Chat channel — subscribe when opening a group
    
  } catch(e) {
    // warn: 'Pusher init failed (will use polling fallback):', e.message);
  }
}

function subscribeChatChannel(groupId) {
  if (!_pusher) return;
  if (_pusher._chatChan) _pusher._chatChan.unbind_all();
  _pusher._chatChan = _pusher.subscribe(`vmo-chat-${groupId}`);
  _pusher._chatChan.bind('new-message', (data) => {
    if (activeGroupId === groupId) {
      appendChatMessage(data);
    } else {
      showToast(`💬 New message in ${data.group_name}`, 'info');
    }
  });
}

// ── API ──────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const key = method + path;
  if (method === 'GET' && cache[key]) {
    // Return cached immediately — refresh in background if stale
    const stale = (Date.now() - cache[key].ts) > 120000;
    if (stale) {
      // Background refresh without blocking
      fetch(API + path, {
        headers: { 'Content-Type': 'application/json', ...(token ? {'Authorization':'Bearer '+token} : {}) },
        signal: AbortSignal.timeout(15000)
      }).then(r => r.json()).then(d => { cache[key] = { data: d, ts: Date.now() }; }).catch(() => {});
    }
    return cache[key].data;
  }
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(15000)
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) {
    // Session expired — clear token and redirect to login
    if (r.status === 401) {
      token = null; user = null;
      sessionStorage.removeItem('vmo_token');
      sessionStorage.removeItem('vmo_user');
      render();
      return;
    }
    // 403 — friendly permission message
    if (r.status === 403) throw new Error("You do not have permission to do that.");
    // 429 — rate limited
    if (r.status === 429) throw new Error('Too many requests — please wait a moment and try again.');
    // 500+ — server error without leaking internals
    if (r.status >= 500) throw new Error('Something went wrong on our end. Please try again.');
    throw new Error(d.error || d.message || "That request did not go through. Please try again.");
  }
  if (method === 'GET') cache[key] = { data: d, ts: Date.now() };
  return d;
}

function clearCache() { cache = {}; }

function fmt(n) {
  const num = parseFloat(n) || 0;
  if (num >= 1000000) return '₦' + (num/1000000).toFixed(1) + 'M';
  if (num >= 1000) return '₦' + (num/1000).toFixed(0) + 'K';
  return '₦' + num.toLocaleString();
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
}
function avatar(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}
function daysLeft(date) {
  if (!date) return null;
  return Math.ceil((new Date(date) - new Date()) / 86400000);
}

function html(id, content) { const e = el(id); if (e) e.innerHTML = content; }

async function doLogin() {
  const email = el('le')?.value.trim();
  const pass  = el('lp')?.value;
  if (!email || !pass) { showToast('Enter email and password', 'error'); return; }

  // Validate email format
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Invalid email format', 'error'); return; }

  // Rate limiting
  try { checkLoginRateLimit(); } catch(e) { renderLogin(e.message); return; }

  const btn = el('lb');
  btn.innerHTML = '<span class="spinner"></span> Authenticating…';
  btn.disabled = true;
  try {
    const d = await api('POST', '/api/auth/login', { email, password: pass });
    if (!d || !d.token || !d.user) {
      throw new Error('Login failed — please check your email and password.');
    }
    token = d.token;
    user  = d.user;
    resetLoginRateLimit();
    if (isTokenExpired(token)) throw new Error('Received an expired session. Please try again.');
    sessionStorage.setItem('vmo_token', token);
    sessionStorage.setItem('vmo_user', JSON.stringify(user));
    page = 'dashboard';
    render();
    preloadAll();
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-lock"></i> Sign in to VMO';
    // Show a friendly message, never expose internal errors
    const msg = e.message?.toLowerCase() || '';
    const friendlyMsg =
      msg.includes('invalid credentials') || msg.includes('check your email')
        ? 'Email or password is incorrect. Please try again.'
      : msg.includes('not found') || msg.includes('no user')
        ? 'No account found with that email address.'
      : msg.includes('rate') || msg.includes('too many')
        ? 'Too many login attempts. Please wait a few minutes.'
      : msg.includes('expired')
        ? 'Your session expired. Please log in again.'
      : msg.includes('server')
        ? 'The server is temporarily unavailable. Please try again.'
      : e.message || 'Something went wrong on our end. Please try again.';
    renderLogin(friendlyMsg);
  }
}

  } catch(e) {
    const offline = e.message.includes('fetch') || e.message.includes('network') || e.message.includes('Failed') || e.message.includes('NetworkError');
    html('page-content', `
      <div class="error-state">
        <div style="font-size:56px">${offline?'🔌':'⚠️'}</div>
        <div style="font-size:17px;font-weight:700;color:var(--text)">${offline?'No connection':'Something went wrong on our end. Please try again.'}</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:8px">${e.message}</div>
        ${offline?'<div style="font-size:12px;color:var(--text3);margin-bottom:16px">The server may be waking up. Wait 30 seconds and retry.</div>':''}
        <button class="btn btn-primary" onclick="loadPage('${p}')"><i class="ti ti-refresh"></i> Retry</button>
      </div>`);
  }
}

// ── IMPREST LOW-BALANCE ALERT WIDGET ─────────────────────────────────────────
async function loadImprestAlerts() {
  const w = document.getElementById('imprest-alert-widget');
  if (!w) return;

  try {
    const { alerts = [] } = await api('GET', '/api/imprest/alerts').catch(() => ({ alerts: [] }));
    if (!alerts.length) { w.innerHTML = ''; return; }

    const fmt = n => '₦' + Number(n || 0).toLocaleString('en-NG', { minimumFractionDigits: 0 });

    w.innerHTML = `
      <div class="card" style="border-left:3px solid var(--amber,#f59e0b);margin-bottom:14px;padding:14px 16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <i class="ti ti-alert-triangle" style="color:var(--amber,#f59e0b);font-size:18px"></i>
          <span style="font-weight:700;font-size:14px;color:var(--text)">
            ${alerts.length} Imprest Account${alerts.length > 1 ? 's' : ''} Require Top-Up
          </span>
          <span style="margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer"
            onclick="navigate('imprest')">View all →</span>
        </div>

        ${alerts.map(a => {
          const isCritical = a.severity === 'critical';
          const accentColor = isCritical ? 'var(--red,#ef4444)' : 'var(--amber,#f59e0b)';
          const bgColor     = isCritical ? 'rgba(239,68,68,.07)' : 'rgba(245,158,11,.07)';

          // Describe who/what this account serves
          const linkedTo = a.linked_user_name
            ? `Linked to: ${sanitise(a.linked_user_name)}`
            : a.linked_department
              ? `Department: ${sanitise(a.linked_department)}`
              : a.vendor_name
                ? `Vendor: ${sanitise(a.vendor_name)}`
                : a.owner_name
                  ? `Holder: ${sanitise(a.owner_name)}`
                  : '';

          // Impact statement based on what the account funds
          const category = a.dedicated_category || a.sub_name || 'operations';
          let impact = '';
          if (/fuel|diesel|petrol/i.test(category))
            impact = 'Trucks may be unable to load — fuel supply could halt.';
          else if (/driver|allowance/i.test(category))
            impact = 'Driver allowances may be delayed, affecting dispatch.';
          else if (/maintenance|repair/i.test(category))
            impact = 'Vehicle maintenance requests may be blocked.';
          else if (/logistics|dispatch/i.test(category))
            impact = 'Logistics operations may be disrupted.';
          else
            impact = `${sanitise(category)} spending may be blocked.`;

          return `
          <div style="background:${bgColor};border:1px solid ${accentColor}33;border-radius:10px;
                      padding:12px 14px;margin-bottom:8px">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">
              <div style="flex:1;min-width:0">
                <!-- Account name + severity badge -->
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                  <span style="font-size:14px;font-weight:700;color:var(--text)">${sanitise(a.name)}</span>
                  ${a.sub_name ? `<span style="font-size:11px;color:var(--text3)">${sanitise(a.sub_name)}</span>` : ''}
                  <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
                               background:${accentColor}22;color:${accentColor};text-transform:uppercase;letter-spacing:.5px">
                    ${isCritical ? '🔴 Critical' : '⚠ Low'}  ${a.pct}% remaining
                  </span>
                </div>

                <!-- Linked to -->
                ${linkedTo ? `<div style="font-size:12px;color:var(--text3);margin-bottom:6px">
                  <i class="ti ti-link" style="margin-right:4px"></i>${linkedTo}
                </div>` : ''}

                <!-- Balance bar -->
                <div style="background:rgba(255,255,255,.08);border-radius:4px;height:6px;margin-bottom:8px;overflow:hidden">
                  <div style="height:100%;width:${Math.min(100,a.pct)}%;background:${accentColor};border-radius:4px;transition:.4s"></div>
                </div>

                <!-- Numbers row -->
                <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-bottom:8px">
                  <span>Balance: <strong style="color:${accentColor}">${fmt(a.balance)}</strong></span>
                  ${a.avg_retirement > 0 ? `<span>Avg reimbursement: <strong>${fmt(a.avg_retirement)}</strong></span>` : ''}
                  ${a.monthly_spend > 0 ? `<span>Monthly spend: <strong>${fmt(a.monthly_spend)}</strong></span>` : ''}
                  ${a.days_left !== null ? `<span>Est. runway: <strong style="color:${accentColor}">${a.days_left} day${a.days_left !== 1 ? 's' : ''}</strong></span>` : ''}
                </div>

                <!-- Impact warning -->
                <div style="font-size:12px;color:${accentColor};display:flex;align-items:flex-start;gap:6px">
                  <i class="ti ti-alert-circle" style="flex-shrink:0;margin-top:1px"></i>
                  <span><strong>Potential impact:</strong> ${impact}</span>
                </div>
              </div>

              <!-- Top-up action -->
              <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
                <button class="btn btn-sm"
                  style="background:${accentColor};color:#fff;border:none;font-size:12px;padding:6px 14px;
                         border-radius:8px;cursor:pointer;white-space:nowrap"
                  onclick="navigate('imprest');setTimeout(()=>showImprestTopUp(${a.id},'${sanitise(a.name).replace(/'/g,'')}'),500)">
                  <i class="ti ti-plus"></i> Top Up
                </button>
                ${a.recommended_topup > 0 ? `
                  <span style="font-size:10px;color:var(--text3);text-align:right">
                    Suggested: ${fmt(a.recommended_topup)}
                  </span>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    console.error('[Imprest alerts widget]', e.message);
  }
}

function filterReqTable(status) {
  if (status) {
    document.querySelectorAll('[data-rf]').forEach(b => b.classList.toggle('active', b.dataset.rf===status));

  }
  const s = window._reqFilter || 'All';
  const q = (el('req-search')?.value || '').toLowerCase();
  document.querySelectorAll('.req-row').forEach(row => {
    row.style.display = (s==='All'||row.dataset.status===s) && (!q||(row.dataset.search||'').includes(q)) ? '' : 'none';
  });
}

function addBulkRow() {
  window._bulkRows = window._bulkRows || [];
  saveBulkRowData();
  window._bulkRows.push({});
  renderBulkModal();
}

function addBulkRows(n) {
  window._bulkRows = window._bulkRows || [];
  saveBulkRowData();
  for(let i=0;i<n;i++) window._bulkRows.push({});
  renderBulkModal();
}

function removeBulkRow(i) {
  saveBulkRowData();
  window._bulkRows.splice(i,1);
  if (window._bulkRows.length === 0) window._bulkRows = [{}];
  renderBulkModal();
}

function saveBulkRowData() {
  const tbody = document.getElementById('bulk-tbody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => {
    if (!window._bulkRows[i]) window._bulkRows[i] = {};
    const inputs = row.querySelectorAll('input,select');
    if (inputs[0]) window._bulkRows[i].description = inputs[0].value;
    if (inputs[1]) window._bulkRows[i].category = inputs[1].value;
    if (inputs[2]) window._bulkRows[i].amount = inputs[2].value;
    if (inputs[3]) window._bulkRows[i].payee = inputs[3].value;
    if (inputs[4]) window._bulkRows[i].bank = inputs[4].value;
    if (inputs[5]) window._bulkRows[i].acct = inputs[5].value;
    if (inputs[6]) window._bulkRows[i].priority = inputs[6].value;
  });
}

function checkBulkDuplicates() {
  saveBulkRowData();
  const rows = window._bulkRows || [];
  const valid = rows.filter(r => r.description && r.amount > 0);
  if (valid.length === 0) { showToast('Add at least one row with description and amount', 'info'); return; }
  
  // Check for duplicates within the batch
  const descAmts = {};
  const dups = [];
  valid.forEach((r, i) => {
    const key = `${(r.description||'').toLowerCase().trim()}|${r.amount}`;
    if (descAmts[key] !== undefined) {
      dups.push(`Row ${descAmts[key]+1} and Row ${i+1}: "${r.description}" ₦${r.amount}`);
    } else {
      descAmts[key] = i;
    }
  });
  
  if (dups.length > 0) {
    const warn = document.getElementById('bulk-dup-warn');
    if (warn) {
      warn.style.display = '';
      warn.innerHTML = `<strong>⚠ Possible Duplicates Detected:</strong><br>${dups.map(d=>`• ${sanitise(d)}`).join('<br>')}`;
    }
    // Duplicate warning handled inline — proceed
  }
  submitBulkRequests();
}

async function submitBulkRequests() {
  saveBulkRowData();
  const rows = (window._bulkRows || []).filter(r => r.description && r.amount > 0);
  if (rows.length === 0) { showToast('No valid rows to submit', 'info'); return; }
  
  const btn = document.querySelector('.modal .btn-primary');
  if (btn) { btn.textContent = `Submitting ${rows.length} requests…`; btn.disabled = true; }
  
  let success = 0, failed = 0;
  for (const r of rows) {
    try {
      await api('POST', '/api/requests', {
        description: r.description,
        category: r.category || 'OTHER OVH',
        amount: r.amount,
        amount_to_pay: r.amount,
        payment_type: 'cash',
        payee_name: r.payee || '',
        bank_name: r.bank || '',
        account_number: r.acct || '',
        priority: r.priority || 'normal',
      });
      success++;
    } catch(e) { failed++; }
  }
  
  clearCache();
  closeModal();
  showToast(`${success} request${success!==1?'s':''} submitted${failed?`, ${failed} failed`:''}`, success > 0 ? 'success' : 'error');
  navigate('requests');
}

function filterFuelTable(status) {
  if (status) {
    document.querySelectorAll('[data-ff]').forEach(b => b.classList.toggle('active', b.dataset.ff===status));
    window._fuelFilter = status;
  }
  const s = window._fuelFilter || 'All';
  const q = (el('fuel-search')?.value || '').toLowerCase();
  let visibleCount = 0, visibleAmount = 0, visibleQty = 0;
  document.querySelectorAll('.fuel-row').forEach(row => {
    const matchStatus = s === 'All' || row.dataset.fstatus === s;
    const matchSearch = !q || (row.dataset.search || '').includes(q);
    const show = matchStatus && matchSearch;
    row.style.display = show ? '' : 'none';
    if (show) {
      visibleCount++;
      visibleAmount += parseFloat(row.dataset.amount || 0);
      visibleQty += parseFloat(row.dataset.qty || 0);
    }
  });
  // Update live totals
  const totalRow = document.getElementById('fuel-total-row');
  if (totalRow) {
    totalRow.querySelector('.fuel-total-count').textContent = `${s === 'All' ? 'ALL' : s.toUpperCase()} — ${visibleCount} record${visibleCount!==1?'s':''}`;
    totalRow.querySelector('.fuel-total-amount').textContent = '₦' + visibleAmount.toLocaleString('en-NG', {maximumFractionDigits:0});
    totalRow.querySelector('.fuel-total-qty').textContent = visibleQty.toLocaleString('en-NG', {maximumFractionDigits:1}) + ' L';
  }
  // Update stat cards
  if (s !== 'All') {
    const statAmt = document.getElementById('fuel-stat-amount');
    if (statAmt) statAmt.textContent = '₦' + (visibleAmount/1000000).toFixed(2) + 'M';
  }
}

function previewPaymentCSV() {
  const file = el('pay-csv-file')?.files?.[0];
  if (!file) { showToast('Please select a file first', 'info'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => !l.startsWith('"//') && l.trim());
    if (!lines.length) { showToast('File appears empty or invalid', 'error'); return; }
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
    const rows = lines.slice(1).map(l => {
      const vals = l.match(/(".*?"|[^,]+)(?=,|$)/g) || l.split(',');
      return vals.map(v => v.replace(/^"|"$/g,'').trim());
    }).filter(r => r.some(v => v));

    window._csvHeaders = headers;
    window._csvRows = rows;

    const preview = el('pay-csv-preview');
    preview.style.display = '';
    preview.innerHTML = `
      <div style="font-size:11px;color:var(--green);margin-bottom:8px"><i class="ti ti-check"></i> ${rows.length} row(s) ready to import</div>
      <table style="width:100%;border-collapse:collapse;font-size:10px">
        <thead><tr>${headers.map(h=>`<th style="padding:4px 6px;background:var(--bg3);border:1px solid var(--border);white-space:nowrap">${h}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,5).map(r=>`<tr>${r.map(v=>`<td style="padding:3px 6px;border:1px solid var(--border);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sanitise(v)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
      ${rows.length>5?`<div style="font-size:10px;color:var(--text3);margin-top:4px">... and ${rows.length-5} more rows</div>`:''}
    `;
  };
  reader.readAsText(file);
}

async function submitPaymentCSV() {
  const headers = window._csvHeaders;
  const rows = window._csvRows;
  if (!rows?.length) { showToast('Please preview the file first', 'info'); return; }

  const idx = k => headers.findIndex(h => h.toLowerCase()===k.toLowerCase());
  let ok = 0, fail = 0;

  for (const row of rows) {
    const get = k => row[idx(k)] || '';
    const payload = {
      description: get('description'),
      category: get('category') || 'OTHER OVH',
      amount: parseFloat(get('amount'))||0,
      amount_to_pay: parseFloat(get('pay_now')||get('amount'))||0,
      payment_type: get('payment_type') || 'cash',
      credit_terms: get('credit_terms'),
      payee_name: get('payee_name'),
      bank_name: get('bank_name'),
      account_number: get('account_number'),
      account_name: get('account_name'),
      priority: get('priority') || 'normal',
      shipment_number: get('shipment_number'),
      customer_name: get('customer_name'),
      waybill_number: get('waybill_number'),
      notes: get('notes'),
      source: 'csv_upload',
    };
    if (!payload.description || !payload.amount) { fail++; continue; }
    try { await api('POST','/api/requests', payload); ok++; }
    catch(e) { fail++; }
  }
  closeModal();
  showToast(`${ok} request(s) submitted${fail?', '+fail+' skipped (missing data)':''}`, ok?'success':'error');
  clearCache(); navigate('requests');
}

async function submitTripCSV() {

function downloadVehicleTemplate() {
  const headers = [
    'plate_number','make','model','fuel_type','vehicle_group','vehicle_category',
    'tonnage_category','fuel_consumption_rate','depot',
    'company_name',
    'insurance_expiry','road_worthiness_expiry',
    'year','notes'
  ];
  const sample = [
    'LAG-234-AB','TATA','LPT 1618','Diesel','haulage','15-Ton Haulage',
    '15t','0.27','Lagos',
    'NIGERIAN BOTTLING COMPANY (NBC)',
    '2027-06-30','2027-03-31',
    '2022','Primary NBC truck'
  ];
  const notes = [
    ['// VMO Vehicle Bulk Upload Template'],
    ['// fuel_type: Diesel | Petrol | CNG | LNG | Electric'],
    ['// vehicle_group: pool_car | haulage | suv | staff_bus | brt'],
    ['// tonnage_category: 10t | 15t | 20t | 30t | 40t (for haulage only)'],
    ['// fuel_consumption_rate: litres per km e.g. 0.27'],
    ['// company_name: must match exactly a company already in VMO'],
    ['// expiry dates format: YYYY-MM-DD'],
    ['// DELETE all rows starting with // before uploading'],
  ];
  const rows = [...notes, headers, sample];
  const csv = rows.map(r => r.map(c => String(c||'')).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'VMO_Vehicle_Template_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();

}

function previewVehicleCSV() {
  const file = el('veh-csv')?.files?.[0];
  if (!file) { showToast('Select a file first', 'info'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => !l.startsWith('//') && l.trim());
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(l => l.split(',').map(v => v.trim())).filter(r => r.some(v => v));
    window._vehHeaders = headers;
    window._vehRows = rows;
    const prev = el('veh-preview');
    prev.style.display = '';
    prev.innerHTML = `<div style="font-size:11px;color:var(--green)"><i class="ti ti-check"></i> ${rows.length} vehicle(s) ready to import</div>`;
  };
  reader.readAsText(file);
}

async function submitVehicleCSV() {
  const headers = window._vehHeaders;
  const rows = window._vehRows;
  if (!rows?.length) { showToast('Preview the file first', 'info'); return; }
  const idx = k => headers.findIndex(h => h.toLowerCase()===k.toLowerCase());
  let ok = 0, fail = 0;
  const companies = await api('GET','/api/companies').catch(()=>[]);
  for (const row of rows) {
    const g = k => (row[idx(k)]||'').trim();
    const coName = g('company_name');
    const company = companies.find(c => c.name.toLowerCase()===coName.toLowerCase());
    const payload = {
      plate_number: g('plate_number'),
      make: g('make'),
      model: g('model'),
      fuel_type: g('fuel_type')||'Diesel',
      vehicle_type: g('vehicle_group')||'pool_car',
      vehicle_category: g('vehicle_category'),
      tonnage_category: g('tonnage_category'),
      fuel_consumption_rate: g('fuel_consumption_rate')||null,
      depot: g('depot')||'Lagos',
      company_id: company?.id||null,
      insurance_expiry: g('insurance_expiry')||null,
      road_worthiness_expiry: g('road_worthiness_expiry')||null,
      year: g('year')||null,
      notes: g('notes'),
    };
    if (!payload.plate_number) { fail++; continue; }
    try { await api('POST','/api/vehicles', payload); ok++; }
    catch(e) { fail++; }
  }
  closeModal();
  showToast(`${ok} vehicle(s) imported${fail?', '+fail+' skipped':''}`, ok?'success':'error');
  clearCache(); navigate('vehicles');
}

function filterFeedback(rating) {
  if (rating) {
    document.querySelectorAll('[data-fb]').forEach(b =>
      b.classList.toggle('active', b.dataset.fb === rating));
    window._fbFilter = rating;
  }
  const active = window._fbFilter || 'All';
  const search = (document.getElementById('fb-search')?.value || '').toLowerCase();
  document.querySelectorAll('.fb-row').forEach(row => {
    const rOk = active === 'All' || row.dataset.rating === active;
    const sOk = !search || (row.dataset.search || '').includes(search);
    row.style.display = rOk && sOk ? '' : 'none';
  });
}

function exportFeedbackCSV() {
  const feedbacks = window._feedbacks || [];
  if (!feedbacks.length) { showToast('No feedback to export', 'error'); return; }
  const headers = ['Date','Plate','Driver','Driver Phone','Rating','Cleanliness','Professionalism','Overall Service',
    'Comment','Suggestion','Passenger','Client','Client Phone','Company','Route','Waybill','Shipment','Trip Date'];
  const rows = feedbacks.map(f => [
    f.created_at ? new Date(f.created_at).toLocaleDateString('en-GB') : '',
    f.plate_number || f.vplate || '',
    f.driver_name || '',
    f.driver_phone || '',
    f.rating || '',
    f.service_rating || '',
    f.driving_rating || '',
    f.overall_service || '',
    f.comment || '',
    f.suggestion || '',
    f.passenger_name || 'Anonymous',
    f.trip_client_name || f.passenger_employee_name || '',
    f.trip_client_phone || '',
    f.company_name || '',
    (f.loading_site || f.pickup_location || '') + (f.offloading_site ? ' to ' + f.offloading_site : ''),
    f.waybill_number || '',
    f.shipment_number || '',
    f.trip_date ? new Date(f.trip_date).toLocaleDateString('en-GB') : ''
  ]);
  const csv = [headers, ...rows]
    .map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
    .join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'VMO_Feedback_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  showToast('Feedback exported', 'success');
}

    // Progress bar — fills as steps advance

                    border-radius:99px;transition:width .4s ease"></div>

    return `
      <div style="min-height:100vh;background:${BG};display:flex;align-items:center;
                  justify-content:center;padding:20px;
                  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
        <div style="background:${CARD};border:1px solid rgba(201,168,76,.2);border-radius:20px;
                    padding:28px 22px;max-width:400px;width:100%;text-align:center;

  // ── Step 1: Star rating ───────────────────────────────────────────────────
  function buildStep1() {
    return `
      <div style="color:${T1};font-size:18px;font-weight:700;line-height:1.4;margin-bottom:6px">

      </div>
      <div style="color:${T3};font-size:13px;margin-bottom:26px">

      </div>
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px">
        ${[1,2,3,4,5].map(i => `
          <span data-star="${i}" onclick="tapStar(${i})"
            style="font-size:44px;cursor:pointer;opacity:.2;display:inline-block;

      </div>

  // ── Step 2: Three specific tap questions ─────────────────────────────────
  // Each question has 4 emoji chips — one tap per question, no typing.
  // "Continue" unlocks only once all three are answered.
  function buildStep2() {
    const starLabels = ['','😔 Hmm','😐 Okay','🙂 Good','😄 Great','🤩 Excellent!'];

    // Renders a row of emoji chips for one question
    function chipRow(id, options) {
      return `<div id="chips-${id}" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
        ${options.map(([emoji, label, val]) => `
          <button data-group="${id}" data-val="${val}" onclick="tapChip(this,'${id}')"
            style="flex:1;min-width:64px;max-width:90px;padding:10px 6px;border-radius:12px;
                   border:1.5px solid rgba(201,168,76,.2);background:transparent;
                   color:${T1};cursor:pointer;transition:all .18s;
                   display:flex;flex-direction:column;align-items:center;gap:3px">
            <span style="font-size:22px">${emoji}</span>
            <span style="font-size:10px;color:${T3};line-height:1.2">${label}</span>
          </button>`).join('')}
      </div>`;
    }

    return `
      <div style="color:${T1};font-size:16px;font-weight:700;margin-bottom:4px">
        ${starLabels[rating]} — three quick taps
      </div>
      <div style="color:${T3};font-size:12px;margin-bottom:22px">No typing — just tap once per row</div>

      <!-- Question 1: Car cleanliness -->
      <div style="text-align:left;margin-bottom:18px">
        <div style="color:${T3};font-size:11px;text-transform:uppercase;
                    letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <span style="font-size:16px">🧹</span> Car Cleanliness
        </div>

          ['👌','Clean','Good'],
          ['😐','Okay','Fair'],
          ['😬','Dirty','Poor']
        ])}
      </div>

      <!-- Question 2: Driver professionalism -->
      <div style="text-align:left;margin-bottom:18px">
        <div style="color:${T3};font-size:11px;text-transform:uppercase;
                    letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <span style="font-size:16px">🧑‍✈️</span> Driver Professionalism
        </div>
        ${chipRow('prof', [
          ['🌟','Excellent','Excellent'],
          ['👍','Good','Good'],
          ['😐','Average','Fair'],
          ['👎','Poor','Poor']
        ])}
      </div>

      <!-- Question 3: Overall service quality -->
      <div style="text-align:left;margin-bottom:22px">
        <div style="color:${T3};font-size:11px;text-transform:uppercase;
                    letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px">
          <span style="font-size:16px">🚗</span> Overall Service
        </div>
        ${chipRow('service', [
          ['🏆','Top notch','Excellent'],
          ['😊','Satisfied','Good'],
          ['😑','Just okay','Fair'],
          ['😞','Disappointed','Poor']
        ])}
      </div>

      <button id="btn-continue" onclick="goStep3()" disabled
        style="width:100%;padding:14px;background:${GOLD};color:${BG};font-weight:800;
               font-size:15px;border:none;border-radius:12px;cursor:not-allowed;
               opacity:.35;transition:all .2s">
        Continue →
      </button>`;
  }

  // ── Step 3: Open text fields + submit ─────────────────────────────────────
  function buildStep3() {
    return `
      <div style="color:${T1};font-size:16px;font-weight:700;margin-bottom:4px">Almost done! 🙌</div>
      <div style="color:${T3};font-size:12px;margin-bottom:22px">
        Both fields are optional — share as much or as little as you like
      </div>

      <div style="text-align:left;margin-bottom:14px">
        <label style="color:${T3};font-size:11px;text-transform:uppercase;
                      letter-spacing:.8px;display:block;margin-bottom:8px">
          Your first name
        </label>
        <input id="fb-name" placeholder="e.g. Chioma"
          style="width:100%;padding:12px;background:${BG};
                 border:1.5px solid rgba(201,168,76,.2);border-radius:10px;
                 color:${T1};font-size:14px;box-sizing:border-box;outline:none;transition:border .2s"
          onfocus="this.style.borderColor='${GOLD}'"
          onblur="this.style.borderColor='rgba(201,168,76,.2)'">
      </div>

      <div style="text-align:left;margin-bottom:14px">
        <label style="color:${T3};font-size:11px;text-transform:uppercase;
                      letter-spacing:.8px;display:block;margin-bottom:8px">
          💬 Feedback or comments
        </label>
        <textarea id="fb-comment"
          placeholder="Anything that stood out — good or bad…"
          style="width:100%;padding:12px;background:${BG};
                 border:1.5px solid rgba(201,168,76,.2);border-radius:10px;
                 color:${T1};font-size:13px;min-height:74px;resize:none;
                 box-sizing:border-box;outline:none;line-height:1.5;transition:border .2s"
          onfocus="this.style.borderColor='${GOLD}'"
          onblur="this.style.borderColor='rgba(201,168,76,.2)'"></textarea>
      </div>

      <div style="text-align:left;margin-bottom:24px">
        <label style="color:${T3};font-size:11px;text-transform:uppercase;
                      letter-spacing:.8px;display:block;margin-bottom:8px">
          💡 Suggestions for improvement
        </label>
        <textarea id="fb-suggestion"
          placeholder="e.g. Earlier pickup, cooler AC, better music… anything helps!"
          style="width:100%;padding:12px;background:${BG};
                 border:1.5px solid rgba(201,168,76,.2);border-radius:10px;
                 color:${T1};font-size:13px;min-height:74px;resize:none;
                 box-sizing:border-box;outline:none;line-height:1.5;transition:border .2s"
          onfocus="this.style.borderColor='${GOLD}'"
          onblur="this.style.borderColor='rgba(201,168,76,.2)'"></textarea>
      </div>

      <button onclick="submitFeedback()"
        style="width:100%;padding:15px;
               background:linear-gradient(135deg,#e8c86a,#C9A84C,#a8782a);
               color:${BG};font-weight:800;font-size:15px;border:none;
               border-radius:12px;cursor:pointer;letter-spacing:.3px;
               box-shadow:0 4px 20px rgba(201,168,76,.35)">
        Send feedback 🚀
      </button>`;
  }

  // ── Wire up all event handlers after each render ──────────────────────────
  function wireStep() {

    window.tapStar = (n) => {
      rating = n;
      const labels = ['','Poor 😔','Not great 😐','Okay 🙂','Good 😄','Excellent 🤩'];
      document.querySelectorAll('[data-star]').forEach(s => {
        const v = +s.dataset.star;
        s.style.opacity   = v <= n ? '1'   : '.2';
        s.style.transform = v <= n ? 'scale(1.18)' : 'scale(1)';
        s.style.filter    = v <= n ? 'drop-shadow(0 0 8px gold)' : 'none';
      });
      const lbl = document.getElementById('star-label');
      if (lbl) lbl.textContent = labels[n] || '';
      // Tiny pause so the star animation is visible before advancing
      setTimeout(() => { step = 2; render(); }, 380);
    };

    window.tapChip = (el, group) => {
      // Clear all chips in this group, then highlight the tapped one
      document.querySelectorAll(`[data-group="${group}"]`).forEach(b => {
        b.style.background   = 'transparent';
        b.style.borderColor  = 'rgba(201,168,76,.2)';
        b.querySelector('span:last-child').style.color = T3;
      });
      el.style.background  = GOLD;
      el.style.borderColor = GOLD;
      el.querySelector('span:last-child').style.color = BG;

      if (group === 'clean')   cleanliness     = el.dataset.val;
      if (group === 'prof')    professionalism = el.dataset.val;
      if (group === 'service') serviceQuality  = el.dataset.val;

      // Unlock Continue once all three questions have an answer
      if (cleanliness && professionalism && serviceQuality) {
        const btn = document.getElementById('btn-continue');
        if (btn) {
          btn.disabled            = false;
          btn.style.opacity       = '1';
          btn.style.cursor        = 'pointer';
        }
      }
    };

    window.goStep3 = () => { step = 3; render(); };

    window.submitFeedback = async () => {
      const btn = document.querySelector('[onclick="submitFeedback()"]');
      if (btn) { btn.textContent = 'Sending…'; btn.disabled = true; btn.style.opacity = '.7'; }

      const payload = {
        plate_number:    plate,
        vehicle_id:      vehicleId || (vehicleInfo?.id || null),
        rating,
        // Map the three specific questions into the existing fields
        // cleanliness → stored as service_rating for now
        // professionalism → stored as driving_rating
        // service quality → stored as the overall qualifier in the comment prefix
        service_rating:  cleanliness,      // Car cleanliness
        driving_rating:  professionalism,  // Driver professionalism
        overall_service: serviceQuality,   // Overall service (new field)
        comment:         document.getElementById('fb-comment')?.value?.trim()     || '',
        suggestion:      document.getElementById('fb-suggestion')?.value?.trim()  || '',
        passenger_name:  document.getElementById('fb-name')?.value?.trim()        || 'Anonymous',
      };

      try {
        const res = await fetch('https://vmo-virtual-medessy-opps-backend-production.up.railway.app/api/feedback', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Server error');

        // ── Thank-you screen ────────────────────────────────────────────────
        document.body.innerHTML = `
          <div style="min-height:100vh;background:#0D1117;display:flex;align-items:center;
                      justify-content:center;padding:20px;
                      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
            <div style="text-align:center;max-width:340px">
              <div style="font-size:72px;margin-bottom:20px;
                          animation:pop .45s cubic-bezier(.175,.885,.32,1.275) both">🙏</div>
              <div style="color:#C9A84C;font-size:26px;font-weight:900;margin-bottom:10px">
                Thank you!
              </div>
              <div style="color:rgba(255,255,255,.65);font-size:15px;line-height:1.7;margin-bottom:28px">
                Your feedback helps us make every ride better.
                ${payload.suggestion
                  ? `<br><br><span style="color:rgba(201,168,76,.75);font-size:13px">
                       We've noted your suggestion — it goes straight to the team 💪</span>`
                  : ''}
              </div>
              <div style="color:#C9A84C;font-weight:700;font-size:13px;margin-bottom:4px">NG RIDE</div>
              <div style="color:rgba(255,255,255,.25);font-size:11px">Medessy Enterprises Limited</div>
            </div>
          </div>
          <style>
            @keyframes pop {
              0%   { transform:scale(0) rotate(-10deg); opacity:0 }
              70%  { transform:scale(1.15) rotate(4deg) }
              100% { transform:scale(1) rotate(0); opacity:1 }
            }
          </style>`;

      } catch(e) {
        if (btn) { btn.textContent = 'Send feedback 🚀'; btn.disabled = false; btn.style.opacity = '1'; }
        const err = document.createElement('div');
        err.textContent  = 'Network hiccup — please try again.';
        err.style.cssText = 'color:#ff6b6b;font-size:12px;text-align:center;margin-top:12px';
        btn?.parentNode?.appendChild(err);
      }
    };
  }

  // Render the form immediately; vehicle info loads in the background
  function render() {
    const inner = step === 1 ? buildStep1() : step === 2 ? buildStep2() : buildStep3();
    document.body.innerHTML = buildShell(inner);
    wireStep();
  }

  render();

  // Silently fetch vehicle + driver info — if it arrives before step 1 is done
  // we re-render the banner; otherwise the form just runs without it
  fetch('https://vmo-virtual-medessy-opps-backend-production.up.railway.app/api/public/vehicle/' + encodeURIComponent(plate))
    .then(r => r.ok ? r.json() : null)
    .then(info => {
      if (info?.id) {
        vehicleInfo = info;
        if (step === 1) render();
      }
    })
    .catch(() => {});
}

function toggleFuelDispatch() {

  const fs = el('nf-fuel-section');

function autoFillDriverDetails() {
  const sel = el('nf-driver');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return;
  if (el('nf-bank')) el('nf-bank').value = opt.dataset.bank||'';
  if (el('nf-acct')) el('nf-acct').value = opt.dataset.acct||'';
  if (el('nf-aname')) el('nf-aname').value = opt.dataset.aname||'';
  if (el('nf-dname') && opt.dataset.name) el('nf-dname').value = opt.dataset.name;
}

async function autoFillFuelFromVehicle() {
  const sel = el('nf-veh');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return;
  const ft = opt.dataset.ftype;
  const vtype = opt.dataset.vtype || '';
  const vehicleId = opt.value;

  // ── Enforce fuel type — petrol cars can only take petrol, diesel trucks diesel ──
  const warn = el('nf-vehicle-warning');
  const fuelTypeSelect = el('nf-type');
  if (ft && fuelTypeSelect) {
    // Lock the fuel type dropdown to the vehicle's fuel type
    const normalised = ft.toLowerCase();
    for (let i = 0; i < fuelTypeSelect.options.length; i++) {
      const optVal = fuelTypeSelect.options[i].value.toLowerCase();
      if (optVal === normalised || optVal.includes(normalised) || normalised.includes(optVal)) {
        fuelTypeSelect.selectedIndex = i;
        break;
      }
    }

    // Disable wrong-type options and show a clear notice
    let lockedMsg = '';
    for (let i = 0; i < fuelTypeSelect.options.length; i++) {
      const optVal = fuelTypeSelect.options[i].value.toLowerCase();
      const isMatch = optVal === normalised || optVal.includes(normalised) || normalised.includes(optVal);
      fuelTypeSelect.options[i].disabled = !isMatch;
    }

    // Show notice if vehicle fuel type is known
    if (ft) {
      const vehicleName = opt.text?.trim() || 'This vehicle';
      const fuelLabel = ft === 'Diesel' ? '🛢 Diesel only'
        : ft === 'Petrol' ? '⛽ Petrol only'
        : ft === 'CNG'    ? '🔵 CNG only'
        : ft === 'LNG'    ? '🟣 LNG only'
        : ft;
      if (warn) {
        // Show type lock notice (not an error, just informational)
        const existingBlock = warn.dataset.tripBlock === '1';
        if (!existingBlock) {
          warn.style.display = '';
          warn.style.background = 'rgba(79,142,247,.08)';
          warn.style.borderColor = 'rgba(79,142,247,.25)';
          warn.style.color = 'var(--accent)';
          warn.innerHTML = `<i class="ti ti-info-circle" style="margin-right:6px"></i>
            <strong>${sanitise(vehicleName)}</strong> runs on <strong>${sanitise(ft)}</strong>.
            Only ${fuelLabel} requests are allowed for this vehicle.`;
        }
      }
    }
  } else if (warn && !ft) {
    // No fuel type on vehicle — clear notice
    if (warn.dataset.tripBlock !== '1') warn.style.display = 'none';
  }

  // For haulage trucks: check for open unclosed trip (debit not declared)
  const isHaulage = ['haulage'].includes(vtype) || opt.dataset.cat?.toLowerCase().includes('haul') ||
    opt.dataset.cat?.toLowerCase().includes('ton') || ft==='Diesel' || ft==='CNG' || ft==='LNG';

  if (isHaulage && vehicleId) {
    const warn = el('nf-vehicle-warning');
    if (!warn) return;
    warn.style.display = 'none';
    try {
      const openTrips = await api('GET', `/api/trips?vehicle_id=${vehicleId}&open=1`).catch(()=>[]);
      const blocked = openTrips.find(t => {
        const notClosed = !['closed'].includes(t.trip_status||'');
        const debitPending = !t.no_debit && !t.outward_value && !t.return_value;
        return notClosed || debitPending;
      });
      if (blocked) {
        const vName = user?.full_name || user?.name || 'User';
        const plate = opt.text?.split(' ')[0] || 'this truck';
        warn.style.display = '';
        warn.dataset.tripBlock = '1';
        warn.style.background = '';
        warn.style.borderColor = '';
        warn.style.color = '';
        warn.innerHTML = `<i class="ti ti-alert-circle" style="margin-right:6px"></i>
          <strong>${vName}</strong>, please close out on the previous trip for <strong>${plate}</strong>
          (Waybill: ${sanitise(blocked.waybill_number||'#'+blocked.id)}) — 
          close the trip details and declare the debit record before you can request diesel for this truck.`;
        // Disable submit
        const submitBtn = document.querySelector('[onclick="submitFuelV2()"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.style.opacity = '0.4';
          submitBtn.title = 'Close the open trip first';
        }
      } else {
        // Re-enable submit — clear trip block flag
        if (warn) warn.dataset.tripBlock = '0';
        const submitBtn = document.querySelector('[onclick="submitFuelV2()"]');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.style.opacity = ''; submitBtn.title = ''; }
      }
    } catch(e) {}
  }
}

function autoFillStationPrice() {
  const sel = el('nf-stn');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const manual = el('nf-manual-station');
  if (opt?.value==='__manual') {
    if (manual) manual.style.display='';
    return;
  }
  if (manual) manual.style.display='none';
  const price = opt?.dataset.price;
  if (price && el('nf-price')) { el('nf-price').value = price; calcFuelAmt(); }
}

function calcFuelAmt() {
  const qty = parseFloat(el('nf-qty')?.value||0);
  const price = parseFloat(el('nf-price')?.value||0);
  if (el('nf-amt') && qty && price) el('nf-amt').value = (qty*price).toFixed(0);
}

function lookupDispatchRoute() {
  const from = el('nf-from')?.value?.trim().toLowerCase();
  const dest = el('nf-dest')?.value?.trim().toLowerCase();
  // Pre-set routes lookup (admin-configurable, hardcoded defaults here)
  const routes = window._dispatchRoutes || [];
  const match = routes.find(r =>
    (r.from.toLowerCase()===from && r.to.toLowerCase()===dest) ||
    (r.from.toLowerCase()===dest && r.to.toLowerCase()===from)
  );
  if (match) {
    if (el('nf-km')) el('nf-km').value = match.distance_km;
    if (el('nf-dispatch-amt')) el('nf-dispatch-amt').value = match.dispatch_amount||'';
    if (el('nf-entitled')) el('nf-entitled').value = match.fuel_litres ? match.fuel_litres+'L' : '';
  }
}

async function submitFuelV2() {
  const rtype = el('nf-rtype')?.value || 'fuel';
  const payload = {
    request_type: rtype,
    fuel_type: el('nf-type')?.value,
    shipment_number: el('nf-ship')?.value,
    vehicle_id: el('nf-veh')?.value,
    driver_id: el('nf-driver')?.value,
    driver_name_confirm: el('nf-dname')?.value,
    quantity: el('nf-qty')?.value,
    station_vendor_id: el('nf-stn')?.value && el('nf-stn').value!=='__manual' ? el('nf-stn').value : null,
    station_name_manual: el('nf-stn-manual')?.value,
    price_per_litre: el('nf-price')?.value,
    amount: el('nf-amt')?.value,
    from_location: el('nf-from')?.value,
    destination: el('nf-dest')?.value,
    distance_km: el('nf-km')?.value,
    dispatch_amount: el('nf-dispatch-amt')?.value,
    account_number: el('nf-acct')?.value,
    bank_name: el('nf-bank')?.value,
    account_name: el('nf-aname')?.value,
  };
  try {
    clearCache();
    await api('POST', '/api/fuel', payload);
    closeModal();
    showToast('Request submitted for approval','success');
    navigate('fuel');
  } catch(e) { showToast(e.message||'Submit failed', 'error'); }
}
async function submitNewTrip() {
  // ── Guard: loading waybill is required ──
  const wbFiles = _waybillFiles['nt-wb-files'] || [];
  if (wbFiles.length === 0) {
    showToast('Please attach at least one loading waybill before saving the trip', 'error');
    document.getElementById('nt-wb-dropzone')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // ── Guard: vehicle lock (open unclosed trip) ──
  const lockDiv = el('nt-vehicle-lock');
  if (lockDiv && lockDiv.style.display !== 'none') {
    showToast('Close out the previous trip for this truck before logging a new one', 'error');
    return;
  }

  // ── Convert loading waybill docs to base64 ──
  const loadingDocs = await getWaybillDocs('nt-wb-files');

  const isMulti = el('nt-multi-toggle')?.checked;
  const payload = {
    company_id:          el('nt-co')?.value,
    trip_date:           el('nt-date')?.value,
    waybill_number:      el('nt-waybill')?.value?.trim(),
    invoice_number:      el('nt-invoice')?.value?.trim(),
    vehicle_id:          (getSSValue('nt-veh') || el('nt-veh')?.value || ''),
    driver_id:           (getSSValue('nt-drv') || el('nt-drv')?.value || ''),
    loading_site:        el('nt-load')?.value?.trim(),
    offloading_site:     el('nt-offload')?.value?.trim(),
    to_km:               el('nt-km')?.value,
    standard_transit_hrs:el('nt-transit')?.value,
    shipment_number:     el('nt-ship')?.value?.trim(),
    load_description:    el('nt-load-desc')?.value?.trim(),
    plant_arrival:       el('nt-plant-arr')?.value || null,
    plant_departure:     el('nt-plant-dep')?.value || null,
    depot_arrival:       el('nt-depot-arr')?.value || null,
    depot_departure:     el('nt-depot-dep')?.value || null,
    return_plant_arrival:el('nt-return-arr')?.value || null,
    rate:                el('nt-rate')?.value,
    pallet_size:         el('nt-pallet')?.value,
    outward_value:       el('nt-outval')?.value,
    return_value:        el('nt-retval')?.value,
    total_diesel:        el('nt-diesel')?.value,
    bit_allowance:       el('nt-bit')?.value,
    area:                el('nt-area')?.value?.trim(),
    availability_code:   el('nt-avail')?.value,
    notes:               el('nt-notes')?.value?.trim(),
    loading_waybill_docs:JSON.stringify(loadingDocs),
    trip_status:         'loading',
    logged_by:           user?.full_name || user?.name || '',
  };

  // Multi-customer validation
  if (isMulti) {
    const { customers, valid } = collectMultiCustomers();
    if (!valid) { showToast('All delivery point fields (Name, Phone, Address, Load) are compulsory', 'error'); return; }
    payload.is_multi_customer = true;
    payload.multi_customers   = JSON.stringify(customers);
    payload.customer_name     = customers.map(c => c.name).join(', ');
    payload.customer_phone    = customers.map(c => c.phone).join(', ');
  } else {
    payload.customer_name  = el('nt-cust')?.value?.trim();
    payload.customer_phone = el('nt-phone')?.value?.trim();
    payload.delivery_address = el('nt-cust-addr')?.value?.trim();
  }

  // Required field checks
  if (!payload.waybill_number) { showToast('Waybill number is required', 'error'); el('nt-waybill')?.focus(); return; }
  if (!isMulti && !payload.customer_name) { showToast('Customer name is required', 'error'); el('nt-cust')?.focus(); return; }
  if (!payload.vehicle_id) { showToast('Please select a vehicle', 'error'); return; }

  const btn = el('nt-submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…'; }

  try {
    clearCache();
    await api('POST', '/api/trips', payload);
    closeModal();
    clearWaybillFiles('nt-wb-files');
    showToast('Trip logged — truck is now on the road 🚛', 'success');
    navigate('trips');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> Save Trip'; }
    showToast(e.message || 'Failed to save trip', 'error');
  }
}


function calcKmFuel() {
  const prev = parseFloat(el('nf-odo-prev')?.value || 0);
  const curr = parseFloat(el('nf-odo-curr')?.value || 0);
  const qty = parseFloat(el('nf-qty')?.value || 0);
  const calc = el('fuel-km-calc');
  if (!calc) return;
  if (curr > prev && prev > 0) {
    const km = curr - prev;
    calc.style.display = 'flex';
    const dist = el('fkm-dist');
    const eff = el('fkm-eff');
    if (dist) dist.textContent = km.toFixed(0);
    if (eff && qty > 0) {
      const e = (qty / km * 100).toFixed(2);
      if (eff) eff.textContent = e + ' L/100km';
    }
  } else {
    calc.style.display = 'none';
  }
}

function attachPaymentTemplate() { showUploadPaymentCSV(); }function attachPaymentTemplate() {
  const isAccounts = ['accounts','super_admin','real_admin','admin'].includes(user?.role);
  if (!isAccounts) { showToast('Only Accounts department can upload payment templates.', 'info'); return; }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim() && !l.trim().startsWith('//'));
    if (lines.length < 2) { showToast('No data rows found in template.', 'info'); return; }
    const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const rows = lines.slice(1).map(line => {
      const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || line.split(',');
      const obj = {};
      headers.forEach((h,i) => { obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''); });
      return obj;
    }).filter(r => r.description && r.amount_total);

    if (!rows.length) { showToast('No valid rows found. Check the template format.', 'warning'); return; }

    // Check for duplicates within upload vs existing
    const existing = window._lastRequests || [];
    const existingDescs = existing.map(r=>(r.description||'').toLowerCase());
    const dupes = rows.filter(r => existingDescs.includes((r.description||'').toLowerCase()));
    if (dupes.length) {
      // Show duplicate warning as toast, let user proceed
      showToast(`⚠ ${dupes.length} possible duplicate(s) detected — review before submitting`, 'warning');
      const ok = true;
      if (!ok) return;
    }

    showModal('Preview & Submit — ' + rows.length + ' Requests', `
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${rows.length} payment requests loaded from template. Review and confirm submission.</div>
      <div style="overflow-x:auto;max-height:50vh;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:var(--bg3)">
            ${['Description','Category','Amount','Payee','Bank','Acct No.','Priority'].map(h=>
              `<th style="padding:6px 8px;text-align:left;color:var(--text3);font-size:10px;border-bottom:1px solid var(--border)">${h}</th>`
            ).join('')}
          </tr></thead>
          <tbody>
            ${rows.map((r,i)=>`<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':''}">
              <td style="padding:5px 8px;font-size:11px">${sanitise(r.description||'—')}</td>
              <td style="padding:5px 8px;font-size:10px;color:var(--text3)">${sanitise(r.category||'—')}</td>
              <td style="padding:5px 8px;font-weight:700">${r.amount_to_pay?'₦'+Number(r.amount_to_pay).toLocaleString():'—'}</td>
              <td style="padding:5px 8px;font-size:11px">${sanitise(r.payee_name||'—')}</td>
              <td style="padding:5px 8px;font-size:10px">${sanitise(r.bank_name||'—')}</td>
              <td style="padding:5px 8px;font-family:monospace;font-size:10px">${sanitise(r.account_number||'—')}</td>
              <td style="padding:5px 8px"><span class="badge ${r.priority==='critical'?'badge-declined':r.priority==='urgent'?'badge-pending':'badge-approved'}" style="font-size:9px">${r.priority||'normal'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-block" onclick="submitTemplateRequests(window._templateRows)">Submit All ${rows.length} Requests</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    `, 'lg');
    window._templateRows = rows;
  };
  input.click();
}

async function submitTemplateRequests(rows) {
  if (!rows?.length) return;
  let submitted = 0, failed = 0;
  for (const r of rows) {
    try {
      await api('POST', '/api/requests', {
        description: r.description,
        category: r.category || 'OTHER OVH',
        amount: parseFloat(r.amount_total) || 0,
        amount_to_pay: parseFloat(r.amount_to_pay) || parseFloat(r.amount_total) || 0,
        payment_type: r.payment_type || 'cash',
        credit_terms: r.credit_terms || '',
        payee_name: r.payee_name || '',
        bank_name: r.bank_name || '',
        account_number: r.account_number || '',
        account_name: r.account_name || '',
        company_name: r.company_name || '',
        shipment_number: r.shipment_number || '',
        customer_name: r.customer_name || '',
        waybill_number: r.waybill_number || '',
        notes: r.notes || '',
        priority: r.priority || 'normal',
      });
      submitted++;
    } catch(e) { failed++; }
  }
  clearCache();
  closeModal();
  showToast(`${submitted} requests submitted${failed?', '+failed+' failed':''}`, submitted>0?'success':'error');
  navigate('requests');
}

function lockPaymentFields() {
  const isSuperAdmin = ['super_admin','real_admin','admin'].includes(user?.role);
  const badge = el('nr-acct-lock-badge');
  if (badge) badge.style.display = 'flex';

  ['nr-bank','nr-acct','nr-aname','nr-payee'].forEach(id => {
    const f = el(id);
    if (!f) return;
    if (isSuperAdmin) {
      // Super admin sees fields editable but visually marked
      f.style.background = 'rgba(201,168,76,.06)';
      f.style.borderColor = 'rgba(201,168,76,.3)';
      f.removeAttribute('readonly');
      f.title = 'Pre-filled from vendor — you can override as Super Admin';
    } else {
      // Everyone else: read-only
      f.setAttribute('readonly', 'readonly');
      f.style.background = 'var(--bg3)';
      f.style.opacity = '0.85';
      f.title = 'Auto-filled from registered vendor — contact Super Admin to change';
    }
  });
}

function unlockPaymentFields() {
  const badge = el('nr-acct-lock-badge');
  if (badge) badge.style.display = 'none';
  ['nr-bank','nr-acct','nr-aname','nr-payee'].forEach(id => {
    const f = el(id);
    if (!f) return;
    f.removeAttribute('readonly');
    f.style.background = '';
    f.style.borderColor = '';
    f.style.opacity = '';
    f.title = '';
  });
}
