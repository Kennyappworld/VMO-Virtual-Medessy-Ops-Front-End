          <div class="list-body">
            <div class="list-title" style="font-size:12.5px">${r.type==='receive'?'GRN — Received from':'SRN — Issued to'}: <strong>${sanitise(r.type==='receive'?(r.supplier_name||'—'):(r.driver_name||'Unknown'))}</strong></div>
            <div class="list-sub">Qty: <strong>${r.quantity} ${r.unit||''}</strong>${r.purpose?' · '+sanitise(r.purpose):''}${r.vehicle_plate?' · '+sanitise(r.vehicle_plate):''}</div>
            ${r.type==='receive'&&r.unit_cost?`<div class="list-sub">Unit Cost: ${fmt(r.unit_cost)} · Total: ${fmt((+r.quantity||0)*(+r.unit_cost||0))}</div>`:''}
            ${r.type==='receive'&&r.waybill_number?`<div class="list-sub">Waybill: ${sanitise(r.waybill_number)}${r.invoice_number?' · Invoice: '+sanitise(r.invoice_number):''}</div>`:''}
            ${r.notes?`<div class="list-sub" style="color:var(--t4)">${sanitise(r.notes)}</div>`:''}
            <div class="list-sub">${fmtDate(r.created_at)} ${fmtTime(r.created_at)} · ${sanitise(r.issued_by_name||'—')}</div>
          </div>
          <div class="list-meta" style="color:${r.type==='receive'?'var(--emerald)':'var(--amber)'}">
            ${r.type==='receive'?'+':'-'}${r.quantity}
          </div>
        </div>`).join('') : '<div class="empty-state" style="padding:30px"><div class="empty-icon"><i class="ti ti-history"></i></div><div class="empty-title">No transactions yet</div></div>'}
    `;
  } catch(e) {
    const m = document.querySelector('.modal');
    if (m) m.innerHTML += `<div class="alert alert-danger">${sanitise(e.message)}</div>`;
  }
}

// Super admin soft-delete — reversible via audit trail
async function softDeleteItem(id, name) {
  if (!['real_admin','super_admin'].includes(user.role)) { alert('Only Super Admin can delete store items'); return; }
  const reason = prompt(`Reason for deleting "${name}" from store? This action is audited and reversible.`);
  if (!reason) return;
  try {
    await api('DELETE', `/api/inventory/${id}`, { reason });
    showToast(`"${name}" removed from store. Audit record retained.`, 'success');
    navigate('inventory');
  } catch(e) { alert(e.message); }
}

async function toggleDeletedItems() {
  const panel = el('deleted-items-panel');
  const btn = el('show-deleted-btn');
  if (!panel) return;
  if (panel.style.display === 'none') {
    panel.style.display = '';
    btn.innerHTML = '<i class="ti ti-eye-off"></i> Hide Deleted Items';
    const list = el('deleted-items-list');
    try {
      const data = await api('GET', '/api/inventory/deleted');
      if (!list) return;
      list.innerHTML = data.length ? data.map(item => `
        <div class="list-item" style="border-left:3px solid var(--crimson);opacity:.85">
          <div class="list-dot red"><i class="ti ti-trash"></i></div>
          <div class="list-body">
            <div class="list-title" style="color:var(--t2)">${sanitise(item.name)} <span style="font-size:10px;color:var(--t4)">(${sanitise(item.depot||'')})</span></div>
            <div class="list-sub">Deleted by ${sanitise(item.deleted_by_name||'—')} on ${fmtDate(item.deleted_at)}</div>
            <div class="list-sub">Reason: ${sanitise(item.delete_reason||'Not specified')}</div>
          </div>
          <button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="restoreItem(${item.id},'${sanitise(item.name)}')">
            <i class="ti ti-arrow-back-up"></i> Restore
          </button>
        </div>`).join('') : '<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">No deleted items</div>';
    } catch(e) { if (list) list.innerHTML = `<div class="alert alert-danger">${sanitise(e.message)}</div>`; }
  } else {
    panel.style.display = 'none';
    btn.innerHTML = '<i class="ti ti-trash"></i> Show Deleted Items';
  }
}

async function restoreItem(id, name) {
  if (!confirm(`Restore "${name}" to active store?`)) return;
  try {
    await api('PATCH', `/api/inventory/${id}/restore`);
    showToast(`"${name}" restored to store`, 'success');
    navigate('inventory');
  } catch(e) { alert(e.message); }
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
let activeGroupId = null;
let activeGroupName = '';
let replyingTo = null;

async function pgChat() {
  html('page-content', `<div class="loading-state"><div class="spinner"></div><p style="color:var(--text3);font-size:13px">Loading chat...</p></div>`);

  const [groups, users] = await Promise.all([
    api('GET', '/api/chat/groups').catch(() => []),
    api('GET', '/api/users').catch(() => [])
  ]);

  window._chatUsers = users;
  window._chatGroups = groups;

  if (!activeGroupId && groups.length) activeGroupId = groups[0].id;

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      ${['super_admin','admin','real_admin'].includes(user.role) ? `<button class="btn btn-ghost btn-sm" onclick="showCreateGroup()" style="font-size:11px"><i class="ti ti-users-plus"></i> Group</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="showDMUser()" style="font-size:11px"><i class="ti ti-message-plus"></i> DM</button>
    </div>`);

  if (!groups.length) {
    html('page-content', `<div class="empty-state">
      <div class="empty-icon"><i class="ti ti-message-off"></i></div>
      <div class="empty-title">No chat groups yet</div>
      <div class="empty-sub">Create a group using the Group button above</div>
    </div>`);
    return;
  }

  html('page-content', `<div style="margin:-16px;margin-bottom:-80px" id="chat-shell">
    <div id="chat-group-tabs" style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2)">
      ${groups.map(g => `<div class="group-chip ${activeGroupId===g.id?'active':''}" onclick="openChatGroup(${g.id},'${(g.name||'').replace(/'/g,"\'")}')">
        ${g.is_dm?'💬':g.closed?'🔒':''} ${g.name}
      </div>`).join('')}
    </div>
    <div id="chat-body" style="display:flex;flex-direction:column;height:calc(100dvh - 56px - 60px - 56px)">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>`);
}

function renderChatShell(groups, users) {

  // Filter groups based on role - drivers only see groups they're members of
  const visibleGroups = user.role === 'driver'
    ? groups.filter(g => g.is_member || g.name.toLowerCase().includes('fuel'))
    : groups;

  if (!activeGroupId && visibleGroups.length) activeGroupId = visibleGroups[0].id;

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      ${['real_admin','super_admin','admin'].includes(user.role) ? `<button class="btn btn-ghost btn-sm" onclick="showCreateGroup()" style="font-size:11px"><i class="ti ti-users-plus"></i> Group</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="showDMUser()" style="font-size:11px"><i class="ti ti-message-plus"></i> DM</button>
    </div>`);

  html('page-content', `
    <div style="margin:-16px;margin-bottom:-80px">
      <!-- Group chips -->
      <div style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2)">
        ${visibleGroups.map(g => `
          <div class="group-chip ${activeGroupId===g.id?'active':''}" onclick="openChatGroup(${g.id},'${g.name.replace(/'/g,"\'")}')">
            ${g.closed?'🔒 ':''}${g.name}
          </div>`).join('')}
      </div>

      <!-- Chat area -->
      <div id="chat-body" style="display:flex;flex-direction:column;height:calc(100dvh - 56px - 60px - 56px)">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>`);

  if (activeGroupId) loadChatGroup(activeGroupId);
}

async function openChatGroup(id, name) {
  subscribeChatChannel(id);
  activeGroupId = id;
  activeGroupName = name;
  replyingTo = null;
  document.querySelectorAll('.group-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim().replace('🔒 ','') === name || c.onclick?.toString().includes(`(${id},`));
  });
  await loadChatGroup(id);
}

async function loadChatGroup(id) {
  const msgs = await api('GET', `/api/chat/groups/${id}/messages`);
  // Mark as read
  delete cache[`GET/api/chat/groups/${id}/messages`];

  const chatBody = el('chat-body');
  if (!chatBody) return;

  chatBody.innerHTML = `
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px">
      ${msgs.length ? msgs.map(m => renderMsg(m)).join('') :
        '<div style="text-align:center;color:var(--text3);font-size:13px;padding:40px 20px">No messages yet. Start the conversation! 👋</div>'}
    </div>
    <!-- Reply preview -->
    <div id="reply-preview" style="display:none;background:var(--bg3);padding:8px 16px;border-top:1px solid var(--border);border-left:3px solid var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;color:var(--accent);font-weight:700">Replying to <span id="reply-name"></span></div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px" id="reply-text"></div>
        </div>
        <button onclick="cancelReply()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px">✕</button>
      </div>
    </div>
    <!-- Input bar -->
    <div style="padding:10px 12px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:center;padding-bottom:max(10px,env(safe-area-inset-bottom))">
      <div style="flex:1;position:relative">
        <input id="chat-input" class="chat-input" placeholder="Message ${activeGroupName}…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}" style="padding-right:40px">
        <button onclick="showMentionPicker()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px">@</button>
      </div>
      <button onclick="triggerFileUpload()" style="width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center">
        <i class="ti ti-paperclip" style="font-size:16px"></i>
      </button>
      <button onclick="sendChatMsg()" style="width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center">
        <i class="ti ti-send" style="font-size:18px"></i>
      </button>
    </div>`;

  const msgs2 = el('chat-msgs');
  if (msgs2) msgs2.scrollTop = msgs2.scrollHeight;
}

function renderMsg(m) {
  const isMe = m.user_id === user.id;
  const time = fmtTime(m.created_at);
  const date = fmtDate(m.created_at);
  let tagged = [];
  try { tagged = Array.isArray(m.tagged_users) ? m.tagged_users : JSON.parse(m.tagged_users||'[]'); } catch {}
  const mentionedMe = tagged.some(t => t.id === user.id);
  if (!window._msgStore) window._msgStore = {};
  window._msgStore[m.id] = m;

  const parts = [];
  parts.push(`<div id="msg-${m.id}" style="display:flex;flex-direction:column;${isMe?'align-items:flex-end':'align-items:flex-start'}">`);
  if (!isMe) parts.push(`<div style="font-size:10px;color:var(--text3);margin-bottom:3px;padding:0 4px">${m.user_name||'Unknown'} · ${date}</div>`);
  if (m.reply_to_id) {
    parts.push(`<div style="background:var(--bg4);border-left:2px solid var(--accent);border-radius:6px;padding:4px 8px;margin-bottom:3px;font-size:11px;color:var(--text3);max-width:240px;cursor:pointer" onclick="scrollToMsg(${m.reply_to_id})"><span style="color:var(--accent);font-weight:700">${m.reply_to_name||'Message'}</span><br>${(m.reply_to_text||'').slice(0,60)}</div>`);
  }
  parts.push(`<div style="position:relative;max-width:75%;cursor:pointer" onclick="onMsgClick(${m.id})">`);
  if (mentionedMe && !isMe) parts.push('<div style="font-size:10px;color:var(--amber);margin-bottom:2px;font-weight:700">@ You were mentioned</div>');
  const bubbleStyle = `padding:10px 14px;border-radius:${isMe?'16px 16px 4px 16px':'16px 16px 16px 4px'};font-size:13px;line-height:1.5;word-break:break-word;background:${isMe?'var(--accent)':'var(--bg3)'};color:${isMe?'#fff':'var(--text)'}${mentionedMe&&!isMe?';border:1px solid var(--amber)':''}`;
  parts.push(`<div style="${bubbleStyle}">`);
  if (m.image_url) parts.push(`<img src="${m.image_url}" style="max-width:200px;border-radius:8px;display:block;margin-bottom:6px;cursor:zoom-in" onclick="event.stopPropagation();window.open(this.src,'_blank')">`);
  parts.push(m.message||'');
  if (tagged.length) parts.push(`<div style="font-size:11px;opacity:.7;margin-top:4px">${tagged.map(t=>'@'+t.name).join(' ')}</div>`);
  parts.push('</div></div>');
  parts.push(`<div style="display:flex;align-items:center;gap:4px;padding:2px 4px"><span style="font-size:10px;color:var(--text3)">${time}</span>`);
  if (isMe) parts.push(`<span style="font-size:14px;color:${(m.read_count||0)>0?'var(--accent)':'var(--text3)'}" title="${m.read_count||0} read">${(m.read_count||0)>0?'✓✓':'✓'}</span>`);
  parts.push('</div></div>');
  return parts.join('');
}

function onMsgClick(id) {
  const m = (window._msgStore||{})[id];
  if (!m) return;
  showMsgActions(id, m.message||'', m.user_name||'Unknown');
}


function showMsgActions(id, text, senderName) {
  showModal('Message Options', `
    <div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--text2)">
      <strong style="color:var(--text3);font-size:11px">${senderName}</strong><br>${text.slice(0,100)}${text.length>100?'…':''}
    </div>
    <button class="btn btn-ghost btn-block" style="margin-bottom:6px" onclick="setReply(${id},'${senderName}','${text.slice(0,60).replace(/'/g,"\'")}');closeModal()">
      <i class="ti ti-arrow-back-up"></i> Reply to this message
    </button>
    <button class="btn btn-ghost btn-block" onclick="navigator.clipboard?.writeText('${text.replace(/'/g,"\'")}');closeModal()">
      <i class="ti ti-copy"></i> Copy text
    </button>
    <button class="btn btn-ghost btn-block" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);
}

function setReply(id, name, text) {
  replyingTo = {id, name, text};
  const rp = el('reply-preview');
  if (rp) {
    rp.style.display = 'block';
    const rn = el('reply-name'); if (rn) rn.textContent = name;
    const rt = el('reply-text'); if (rt) rt.textContent = text;
  }
  el('chat-input')?.focus();
}

function cancelReply() {
  replyingTo = null;
  const rp = el('reply-preview');
  if (rp) rp.style.display = 'none';
}

function scrollToMsg(id) {
  const el2 = el('msg-'+id);
  if (el2) { el2.scrollIntoView({behavior:'smooth', block:'center'}); el2.style.background='rgba(79,142,247,.2)'; setTimeout(()=>el2.style.background='',1500); }
}

async function sendChatMsg() {
  const input = el('chat-input');
  const message = input?.value.trim();
  if (!message || !activeGroupId) return;
  input.value = '';
  const tagged = window._pendingMentions || [];
  window._pendingMentions = [];
  try {
    delete cache[`GET/api/chat/groups/${activeGroupId}/messages`];
    await api('POST', `/api/chat/groups/${activeGroupId}/messages`, {
      message,
      tagged_users: tagged,
      reply_to_id: replyingTo?.id || null
    });
    cancelReply();
    await loadChatGroup(activeGroupId);
  } catch(e) { alert(e.message); }
}

function triggerFileUpload() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert('Image must be under 5MB'); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      try {
        delete cache[`GET/api/chat/groups/${activeGroupId}/messages`];
        await api('POST', `/api/chat/groups/${activeGroupId}/messages`, {
          message: el('chat-input').value.trim() || '📎 Image',
          image_url: dataUrl,
          tagged_users: [],
          reply_to_id: replyingTo?.id || null
        });
        el('chat-input').value = '';
        cancelReply();
        await loadChatGroup(activeGroupId);
      } catch(err) { alert(err.message); }
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function showMentionPicker() {
  const users = window._chatUsers || [];
  const depts = [...new Set(users.map(u => u.department).filter(Boolean))];
  showModal('Mention someone', `
    <div class="form-group"><label class="form-label">Search by name or department</label>
      <input class="form-input" id="mention-search" placeholder="Type name…" oninput="filterMentions()"></div>
    <div id="mention-list" style="max-height:280px;overflow-y:auto">
      ${depts.map(d => `
        <div class="list-item" style="padding:10px;margin-bottom:4px;cursor:pointer" onclick="addMention('${d}','${d}');closeModal()">
          <div class="list-dot blue"><i class="ti ti-users"></i></div>
          <div class="list-body"><div class="list-title" style="font-size:13px">@${d} (department)</div></div>
        </div>`).join('')}
      ${users.map(u => `
        <div class="list-item mention-item" style="padding:10px;margin-bottom:4px;cursor:pointer" data-name="${(u.name||'').toLowerCase()}" data-dept="${(u.department||'').toLowerCase()}" onclick="addMention(${u.id},'${u.name}');closeModal()">
          <div class="list-dot" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:11px">${avatar(u.name)}</div>
          <div class="list-body">
            <div class="list-title" style="font-size:13px">@${u.name}</div>
            <div class="list-sub">${u.role||''} · ${u.department||''}</div>
          </div>
        </div>`).join('')}
    </div>`);
}

function filterMentions() {
  const q = el('mention-search')?.value.toLowerCase() || '';
  document.querySelectorAll('.mention-item').forEach(item => {
    item.style.display = (!q || item.dataset.name.includes(q) || item.dataset.dept.includes(q)) ? '' : 'none';
  });
}

function addMention(id, name) {
  if (!window._pendingMentions) window._pendingMentions = [];
  if (!window._pendingMentions.find(m => m.id === id)) {
    window._pendingMentions.push({id, name});
  }
  const input = el('chat-input');
  if (input) { input.value += ` @${name} `; input.focus(); }
}

function showCreateGroup() {
  const users = window._chatUsers || [];
  showModal('Create Group Chat', `
    <div class="form-group"><label class="form-label">Group Name</label>
      <input class="form-input" id="cg-name" placeholder="e.g. Lagos Fleet Team"></div>
    <div class="form-group"><label class="form-label">Add Members (select all that apply)</label>
      <div id="cg-members" style="max-height:250px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:8px">
        ${users.filter(u=>u.id!==user.id).map(u=>`
          <label style="display:flex;align-items:center;gap:10px;padding:8px;cursor:pointer;border-radius:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''">
            <input type="checkbox" value="${u.id}" data-name="${u.name}" style="width:16px;height:16px;cursor:pointer">
            <div class="list-dot" style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center">${avatar(u.name)}</div>
            <div>
              <div style="font-size:13px;font-weight:600">${u.name}</div>
              <div style="font-size:11px;color:var(--text3)">${u.role||''} · ${u.department||''}</div>
            </div>
          </label>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary btn-block" onclick="submitCreateGroup()">Create Group</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function submitCreateGroup() {
  const name = el('cg-name')?.value.trim();
  if (!name) { alert('Enter a group name'); return; }
  const checked = document.querySelectorAll('#cg-members input[type=checkbox]:checked');
  const members = Array.from(checked).map(cb => ({id: parseInt(cb.value), name: cb.dataset.name}));
  if (!members.length) { alert('Select at least one member'); return; }
  try {
    clearCache();
    await api('POST', '/api/chat/groups', { name, members });
    closeModal();
    navigate('chat');
  } catch(e) { alert(e.message); }
}

function showDMUser() {
  const users = (window._chatUsers || []).filter(u => u.id !== user.id);
  showModal('Direct Message', `
    <div class="form-group"><label class="form-label">Select person to message</label></div>
    <div style="max-height:350px;overflow-y:auto">
      ${users.map(u => `
        <div class="list-item" style="padding:10px;margin-bottom:4px;cursor:pointer" onclick="startDM(${u.id},'${u.name.replace(/'/g,"\'")}')">
          <div class="list-dot" style="background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;font-size:11px">${avatar(u.name)}</div>
          <div class="list-body">
            <div class="list-title" style="font-size:13px">${u.name}</div>
            <div class="list-sub">${u.role||''} · ${u.department||''}</div>
          </div>
          <div class="list-meta"><i class="ti ti-message" style="color:var(--accent)"></i></div>
        </div>`).join('')}
    </div>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">Cancel</button>`);
}

async function startDM(toUserId, toUserName) {
  closeModal();
  // Create or find existing DM group
  const dmName = `DM: ${user.full_name||user.name} ↔ ${toUserName}`;
  const existing = (window._chatGroups||[]).find(g => g.name === dmName || g.name === `DM: ${toUserName} ↔ ${user.full_name||user.name}`);
  if (existing) {
    activeGroupId = existing.id;
    activeGroupName = existing.name;
    navigate('chat');
    return;
  }
  try {
    clearCache();
    const g = await api('POST', '/api/chat/groups', { name: dmName, members: [{id: toUserId, name: toUserName}], is_dm: true });
    activeGroupId = g.id;
    activeGroupName = g.name;
    navigate('chat');
  } catch(e) { alert(e.message); }
}

// ── HISTORY & EXPORT ─────────────────────────────────────────────────────────
async function pgHistory() {
  html('topbar-btn', '');
  html('page-content', `<div class="loading-state"><div class="spinner"></div><p>Loading history...</p></div>`);

  // Load all data in parallel
  const [requests, fuel, drivers, vehicles, receivables, inventory, issuances, audit] = await Promise.all([
    api('GET', '/api/requests').catch(()=>[]),
    api('GET', '/api/fuel').catch(()=>[]),
    api('GET', '/api/drivers').catch(()=>[]),
    api('GET', '/api/vehicles').catch(()=>[]),
    api('GET', '/api/receivables').catch(()=>[]),
    api('GET', '/api/inventory').catch(()=>[]),
    api('GET', '/api/inventory/all-issuances').catch(()=>[]),
    api('GET', '/api/audit').catch(()=>[]),
  ]);

  window._historyData = { requests, fuel, drivers, vehicles, receivables, inventory, issuances, audit };
  renderHistory('requests');
}

function filterHistoryTable() {
  const q = (el('hist-search')?.value || '').toLowerCase();
  const from = el('hist-from')?.value;
  const to = el('hist-to')?.value;
  let shown = 0, hidden = 0;

  document.querySelectorAll('.hist-row').forEach(row => {
    const matchText = !q || (row.dataset.search || '').includes(q);
    const rowDate = row.dataset.date?.slice(0,10) || '';
    const matchFrom = !from || rowDate >= from;
    const matchTo = !to || rowDate <= to;
    const show = matchText && matchFrom && matchTo;
    row.style.display = show ? '' : 'none';
    show ? shown++ : hidden++;
  });
}

function exportExcel(tab) {
  const d = window._historyData || {};
  const from = el('hist-from')?.value;
  const to = el('hist-to')?.value;
  const q = (el('hist-search')?.value || '').toLowerCase();

  let rows = [], headers = [], title = '';

  const isVisible = (row) => {
    const matchText = !q || [Object.values(row)].join(' ').toLowerCase().includes(q);
    const rowDate = (row.created_at||row.date||'').slice(0,10);
    const matchFrom = !from || rowDate >= from;
    const matchTo = !to || rowDate <= to;
    return matchText && matchFrom && matchTo;
  };

  if (tab === 'requests') {
    title = 'Payment Requests';
    headers = ['Ref','Description','Category','Amount','Pay Type','Credit Terms','Payee','Bank','Account','Plate','Requester','Status','Date'];
    rows = (d.requests||[]).filter(isVisible).map(r => [r.ref_number,r.description,r.category,r.amount_to_pay||r.amount,r.payment_type,r.credit_terms||'',r.payee_name,r.bank_name,r.account_number,r.plate_number,r.requester_name,r.status,fmtDate(r.created_at)]);
  } else if (tab === 'fuel') {
    title = 'Fuel Requests';
    headers = ['Ref','Vehicle','Driver','Fuel Type','Qty (L)','Station','Amount','Status','Date'];
    rows = (d.fuel||[]).filter(isVisible).map(r => [r.ref_number,r.plate_number,r.driver_name,r.fuel_type,r.quantity,r.station_name,r.amount,r.status,fmtDate(r.created_at)]);
  } else if (tab === 'inventory') {
    title = 'Inventory Transactions';
    headers = ['Type','Item','Qty','Unit','Driver/Supplier','Phone','Vehicle','Purpose','Waybill','Received By','Issued By','Date','Time'];
    rows = (d.issuances||[]).filter(isVisible).map(r => [r.type==='receive'?'Received':'Issued',r.item_name,r.quantity,r.unit,r.type==='receive'?r.supplier_name:r.driver_name,r.supplier_phone||'',r.vehicle_plate||'',r.purpose||'',r.waybill_number||'',r.received_by||'',r.issued_by_name||'',fmtDate(r.created_at),fmtTime(r.created_at)]);
  } else if (tab === 'receivables') {
    title = 'Receivables';
    headers = ['Invoice','Client','Description','Amount','Due Date','Status','Paid Date'];
    rows = (d.receivables||[]).filter(isVisible).map(r => [r.invoice_number,r.client_name,r.description,r.amount,fmtDate(r.due_date),r.paid?'Received':'Pending',r.paid_date?fmtDate(r.paid_date):'']);
  } else if (tab === 'drivers') {
    title = 'Drivers';
    headers = ['Name','Phone','License No.','License Expiry','Bank','Account','Account Name','Depot','Status'];
    rows = (d.drivers||[]).filter(isVisible).map(r => [r.full_name||r.name,r.phone,r.license_number,fmtDate(r.license_expiry),r.bank_name,r.account_number,r.account_name,r.depot,r.active?'Active':'Inactive']);
  } else if (tab === 'vehicles') {
    title = 'Vehicles';
    headers = ['Plate','Make','Model','Year','Fuel Type','Depot','Driver','Insurance Expiry','Road Worthy','V. License','Tracker','Status'];
    rows = (d.vehicles||[]).filter(isVisible).map(r => [r.plate_number,r.make,r.model,r.year,r.fuel_type,r.depot,r.driver_name,fmtDate(r.insurance_expiry),fmtDate(r.road_worthiness_expiry),fmtDate(r.vehicle_license_expiry),fmtDate(r.tracker_expiry),r.status]);
  } else if (tab === 'audit') {
    title = 'Audit Log';
    headers = ['Date','Time','User','Action','Entity','Entity ID'];
    rows = (d.audit||[]).filter(isVisible).map(r => [fmtDate(r.created_at),fmtTime(r.created_at),r.actor_name||'System',r.action,r.entity||'',r.entity_id||'']);
  }

  if (!rows.length) { alert('No data to export (check filters)'); return; }

  // Build CSV (opens in Excel)
  const csvRows = [
    [`VMO — ${title} Export`],
    [`Generated: ${new Date().toLocaleString()} by ${user.full_name||user.name}`],
    from||to ? [`Date filter: ${from||'start'} to ${to||'end'}`] : [],
    [],
    headers,
    ...rows
  ].filter(r => r.length);

  const csv = csvRows.map(row => row.map(cell => '"' + String(cell||'').replace(/"/g, '""') + '"').join(',')).join('\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `VMO_${title.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function filterInvoice(status) {
  if (status) {
    document.querySelectorAll('[data-if]').forEach(b => b.classList.toggle('active', b.dataset.if === status));
    window._invFilter = status;
  }
  const s = window._invFilter || 'All';
  const q = (el('inv-search')?.value || '').toLowerCase();
  const m = el('inv-month')?.value || '';
  document.querySelectorAll('.inv-row').forEach(row => {
    const matchStatus = s === 'All' || row.dataset.istatus === s;
    const matchSearch = !q || (row.dataset.search || '').includes(q);
    const matchMonth = !m || (row.dataset.month || '').startsWith(m);
    row.style.display = matchStatus && matchSearch && matchMonth ? '' : 'none';
  });
}

async function submitInvoice() {
  const num = el('ni-num')?.value?.trim();
  const amt = el('ni-amt')?.value;
  const client = el('ni-client')?.value?.trim();
  if (!num) { alert('Enter invoice number'); return; }
  if (!client) { alert('Enter client name'); return; }
  if (!amt || parseFloat(amt) <= 0) { alert('Enter amount'); return; }
  try {
    await api('POST', '/api/invoices', {
      invoice_number: num,
      for_month: el('ni-month')?.value,
      client_name: client,
      description: el('ni-desc')?.value,
      amount: parseFloat(amt) + parseFloat(el('ni-vat')?.value || 0),
      vat_amount: parseFloat(el('ni-vat')?.value || 0),
      invoice_date: el('ni-idate')?.value,
      expected_date: el('ni-edate')?.value,
      notes: el('ni-notes')?.value,
    });
    delete cache['GET/api/invoices'];
    closeModal();
    await pgInvoices();
  } catch(e) { alert(e.message); }
}

async function markInvoiceReceived(id) {
  if (!confirm('Mark this invoice as received/paid?')) return;
  try {
    await api('PATCH', `/api/invoices/${id}/receive`);
    delete cache['GET/api/invoices'];
    await pgInvoices();
  } catch(e) { alert(e.message); }
}

  const isAdmin = canSeeAll;
  const totalBudgeted = budgets.reduce((s, b) => s + (+b.total_budgeted || 0), 0);

  html('page-content', `

        </div>
        <div style="background:var(--bg3);border-radius:8px;padding:10px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Expense Advisory</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.6">
            ${totalBudgeted>0&&totalSpent/totalBudgeted>0.9?'<span style="color:var(--red);font-weight:700">⚠️ Over budget threshold.</span> Review spending immediately.':totalBudgeted>0&&totalSpent/totalBudgeted>0.7?'<span style="color:var(--amber);font-weight:700">⚡ 70%+ utilised.</span> Monitor closely.':'<span style="color:var(--green);font-weight:700">✅ On track.</span> Spending within limits.'}
          </div>
        </div>
      </div>
    </div>` : ''}

    <!-- Budget list -->
    ${budgets.length ? budgets.map(b => {
      const pct = b.total_budgeted > 0 ? Math.min(b.total_spent / b.total_budgeted * 100, 100) : 0;
      const color = pct > 90 ? 'var(--red)' : pct > 70 ? 'var(--amber)' : 'var(--green)';
      return `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">

          </div>
          <div style="text-align:right">
            <div style="font-weight:800;font-size:15px;color:${color}">${fmt(b.total_spent||0)}</div>
            <div style="font-size:11px;color:var(--text3)">of ${fmt(b.total_budgeted)}</div>
          </div>
        </div>
        <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
          <div style="height:8px;border-radius:4px;width:${pct}%;background:${color};transition:.4s"></div>

        ${b.line_items ? `
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
          ${JSON.parse(b.line_items).map(li => `
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)">

async function submitBudget() {
  const title = el('nb-title')?.value?.trim();
  const start = el('nb-start')?.value;
  const end = el('nb-end')?.value;
  if (!title) { alert('Enter a budget title'); return; }
  if (!start || !end) { alert('Select start and end dates'); return; }

  const lineItems = Array.from(document.querySelectorAll('.budget-line'))
    .filter(i => +i.value > 0)
    .map(i => ({ category: i.dataset.cat, amount: +i.value }));

  if (!lineItems.length) { alert('Enter at least one budget amount'); return; }

  const total = lineItems.reduce((s, li) => s + li.amount, 0);

  try {
    await api('POST', '/api/budgets', {
      title,
      start_date: start,
      end_date: end,
      total_budgeted: total,
      line_items: JSON.stringify(lineItems),
    });
    delete cache['GET/api/budgets/my'];
    delete cache['GET/api/budgets/all'];
    closeModal();
    await pgBudget();
  } catch(e) { alert(e.message); }
}

function exportTrips() {
  const trips = window._currentTrips || [];
  if (!trips.length) { alert('No trips to export'); return; }
  const headers = ['Date','Company','Plate No.','Driver','Customer Name','Phone','Area','Shipment No','Waybill No','Loading Site','Offloading Site','To KM','Return KM','Rate','Pallets','Outward Value','Return Value','BIT','Diesel (L)','Diesel Cost','Net Revenue','Availability','Reason','Notes','Logged By','Logged At'];
  const rows = trips.map(t => [
    fmtDate(t.trip_date),t.company_name,t.plate_number,t.driver_name,t.customer_name,
    t.customer_phone,t.area,t.shipment_number,t.waybill_number,t.loading_site,t.offloading_site,
    t.to_km,t.from_km,t.rate,t.pallet_size,t.outward_value,t.return_value,t.bit_allowance,
    t.total_diesel,t.diesel_amount,(+t.outward_value||0)+(+t.return_value||0)-(+t.diesel_amount||0),
    t.availability_code,t.reason_code,t.notes,t.created_by_name,
    t.created_at?new Date(t.created_at).toLocaleString():''
  ]);
  const nl='\n';
  const csv=['VMO — Trip Log Export',`Generated: ${new Date().toLocaleString()} — IMMUTABLE AUDIT RECORD`,[],headers,...rows]
    .map(row=>Array.isArray(row)?row.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(','):'"'+(row||'')+'"'  ).join(nl);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`VMO_TripLog_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

async function loadCompanyAssets() {
  const sel = el('nt-co');
  const compId = sel?.value;
  const opt = sel?.options[sel.selectedIndex];
  const dieselPrice = opt?.dataset?.diesel || 990;
  const dpEl = el('nt-dprice');
  if (dpEl) dpEl.value = dieselPrice;

  if (!compId) return;
  const [vehs, drvs] = await Promise.all([
    api('GET',`/api/companies/${compId}/vehicles`).catch(()=>[]),
    api('GET',`/api/companies/${compId}/drivers`).catch(()=>[]),
  ]);
  const vSel = el('nt-veh');
  const dSel = el('nt-drv');
  if (vSel) vSel.innerHTML = vehs.map(v=>`<option value="${v.id}">${v.plate_number}</option>`).join('');
  if (dSel) dSel.innerHTML = drvs.map(d=>`<option value="${d.id}">${d.full_name||d.name}</option>`).join('');
}

function calcTripValues() {
  const toKm = parseFloat(el('nt-tokm')?.value||0);
  const fromKm = parseFloat(el('nt-fromkm')?.value||0);
  const rate = parseFloat(el('nt-rate')?.value||0);
  const diesel = parseFloat(el('nt-diesel')?.value||0);
  const addDiesel = parseFloat(el('nt-adddiesel')?.value||0);
  const dPrice = parseFloat(el('nt-dprice')?.value||990);

  const outVal = toKm * rate;
  const retVal = fromKm * rate;
  const totalDiesel = diesel + addDiesel;
  const dieselCost = totalDiesel * dPrice;
  const net = outVal + retVal - dieselCost;

  const calc = el('trip-calc');
  if (calc && (toKm || rate)) {
    calc.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Outward Value:</span><strong style="color:var(--green)">${fmt(outVal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Return Value:</span><strong style="color:var(--green)">${fmt(retVal)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span>Diesel Cost (${totalDiesel}L × ₦${dPrice}):</span><strong style="color:var(--red)">-${fmt(dieselCost)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:6px;margin-top:6px">
        <span style="font-weight:700">Net Revenue:</span><strong style="color:${net>=0?'var(--green)':'var(--red)'}">${fmt(net)}</strong>
      </div>`;
  }
}

function showModal(title, body) {
  const existing = el('modal-overlay');
  if (existing) existing.remove();
  const d = document.createElement('div');
  d.id = 'modal-overlay';
  d.className = 'modal-overlay';
  d.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">${title}<button class="modal-close" onclick="closeModal()">✕</button></div>
    ${body}
  </div>`;
  d.addEventListener('click', e => { if(e.target===d) closeModal(); });
  document.body.appendChild(d);
}
function closeModal() {
  const d = el('modal-overlay');
  if (d) d.remove();
}

  await Promise.allSettled([
    allowed.includes('dashboard') ? api('GET', '/api/analytics/dashboard').catch(() => ({})) : null,
  ].filter(Boolean));

  loadPage(page);

  // Everything else loads silently in the background
  // Note: compliance/alerts is intentionally excluded here — it runs separately
  // when the dashboard widget requests it, avoiding a slow startup penalty
  setTimeout(() => {
    Promise.allSettled([
      allowed.includes('requests')    && api('GET', '/api/requests').catch(() => []),
      allowed.includes('fuel')        && api('GET', '/api/fuel').catch(() => []),
      allowed.includes('vehicles')    && api('GET', '/api/vehicles').catch(() => []),
      allowed.includes('drivers')     && api('GET', '/api/drivers').catch(() => []),
      allowed.includes('clients')     && api('GET', '/api/clients').catch(() => []),
      allowed.includes('receivables') && api('GET', '/api/receivables').catch(() => []),
      allowed.includes('imprest')     && api('GET', '/api/imprest').catch(() => []),
      allowed.includes('chat')        && api('GET', '/api/chat/groups').catch(() => []),
    ].filter(Boolean));
  }, 2000); // 2s delay so login feels snappy
}

// ── VISITOR ACCESS LOG ───────────────────────────────────────────────────────
async function checkVisitorAccess() {
  // Check if this visitor has already registered this session
  const registered = sessionStorage.getItem('vmo_visitor_registered');
  if (registered || user) return; // already registered or logged in

  // Check if they've registered before on this device
  const prevReg = localStorage.getItem('vmo_visitor_info');
  if (prevReg) {
    // Re-log the visit silently (returning visitor)
    try {
      const info = JSON.parse(prevReg);
      await fetch(API + '/api/access/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...info, visit_type: 'returning' })
      });
    } catch {}
    sessionStorage.setItem('vmo_visitor_registered', '1');
    return;
  }

  // New visitor — show registration prompt
  showVisitorPrompt();
}

async function submitVisitor() {
  const name = document.getElementById('v-name')?.value.trim();
  const phone = document.getElementById('v-phone')?.value.trim();
  const purpose = document.getElementById('v-purpose')?.value;
  const btn = document.getElementById('v-btn');

  if (!name || name.length < 2) {
    const f = document.getElementById('v-name');
    f.style.borderColor = '#ef4444'; f.focus();
    f.placeholder = '⚠️ Full name is required';
    return;
  }
  if (!phone || phone.length < 7) {
    const f = document.getElementById('v-phone');
    f.style.borderColor = '#ef4444'; f.focus();
    f.placeholder = '⚠️ Valid phone number required';
    return;
  }
  if (!purpose) {
    const f = document.getElementById('v-purpose');
    f.style.borderColor = '#ef4444'; f.focus();
    return;
  }

  if (btn) { btn.textContent = '⏳ Submitting request...'; btn.disabled = true; btn.style.opacity = '.7'; }

  const visitorInfo = {
    full_name: name,
    phone: phone,
    purpose: purpose,
    user_agent: navigator.userAgent,
    screen: window.screen.width + 'x' + window.screen.height,
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    language: navigator.language,
    visit_type: 'new',
    visited_at: new Date().toISOString()
  };

  try {
    await fetch(API + '/api/access/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(visitorInfo)
    });
  } catch {}

  // Save to localStorage
  localStorage.setItem('vmo_visitor_info', JSON.stringify({ full_name: name, phone: phone, purpose: purpose, user_agent: navigator.userAgent }));
  sessionStorage.setItem('vmo_visitor_registered', '1');

  // Show confirmation message BEFORE removing the overlay
  const overlay = document.getElementById('visitor-prompt');
  if (overlay) {
    overlay.querySelector('div').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:64px;margin-bottom:16px">✅</div>
        <div style="font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:12px">Request Received!</div>
        <div style="font-size:14px;color:#94a3b8;line-height:1.8;margin-bottom:24px">
          Thank you, <strong style="color:#f1f5f9">${name}</strong>.<br><br>
          Your access request has been submitted and sent to the system administrator for review.
          <br><br>
          <span style="color:#60a5fa;font-weight:600">📱 You will be contacted on ${phone} within 48 hours</span> with a decision on your access request.
          <br><br>
          If you are an existing staff member, please proceed to log in below.
        </div>
        <button onclick="document.getElementById('visitor-prompt')?.remove()"
          style="padding:14px 32px;background:linear-gradient(135deg,#4f8ef7,#7c3aed);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">
          Continue to Login
        </button>
        <div style="margin-top:16px;font-size:11px;color:#475569">
          Medessy Enterprises Limited — VMO Security System
        </div>
      </div>`;
  }
}

async function pgBalanceSheet() {
  const canView = ['real_admin','super_admin','admin','accounts'].includes(user.role);
  if (!canView) { html('page-content','<div class="empty-state"><div class="empty-icon"><i class="ti ti-lock"></i></div><div class="empty-title">Restricted</div><div class="empty-sub">Balance sheet is visible to Accounts and Admin only</div></div>'); return; }

  html('topbar-btn', `
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="exportBalanceSheet()" style="font-size:11px"><i class="ti ti-file-spreadsheet"></i> Export</button>
      <select class="form-input" id="bs-month" style="width:140px;padding:6px 10px;font-size:12px" onchange="loadBalanceSheet()">
        ${Array.from({length:12},(_,i)=>{
          const d = new Date(); d.setMonth(d.getMonth()-i);

          return `<option value="${v}">${d.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`;

async function loadBalanceSheet() {
  const month = el('bs-month')?.value || new Date().toISOString().slice(0,7);

  const [requests, receivables, imprest, fuel, trips, invoices] = await Promise.all([
    api('GET', '/api/requests').catch(()=>[]),
    api('GET', '/api/receivables').catch(()=>[]),
    api('GET', '/api/imprest').catch(()=>[]),
    api('GET', '/api/fuel').catch(()=>[]),
    api('GET', `/api/trips?from=${month}-01&to=${month}-31`).catch(()=>[]),
    api('GET', '/api/invoices').catch(()=>[]),
  ]);

  // Filter to current month
  const inMonth = (d) => d && d.slice(0,7) === month;

  const paidReqs = requests.filter(r => r.status==='paid' && inMonth(r.paid_at||r.created_at));
  const pendingReqs = requests.filter(r => r.status==='pending');
  const totalPaid = paidReqs.reduce((s,r) => s+(+r.amount_to_pay||0), 0);
  const totalPending = pendingReqs.reduce((s,r) => s+(+r.amount_to_pay||0), 0);

  const fuelCost = fuel.filter(r => r.status==='approved' && inMonth(r.created_at)).reduce((s,r) => s+(+r.amount||0), 0);

  const totalRevenue = trips.reduce((s,t) => s+((+t.outward_value||0)+(+t.return_value||0)), 0);
  const totalDiesel  = trips.reduce((s,t) => s+(+t.diesel_amount||0), 0);

  const receivablesTotal = receivables.filter(r => r.status!=='confirmed').reduce((s,r) => s+(+r.amount||0), 0);
  const confirmedReceiv  = receivables.filter(r => r.status==='confirmed').reduce((s,r) => s+(+r.amount||0), 0);

  const imprestTotal = imprest.reduce((s,i) => s+(+i.balance||0), 0);

  // Payments due (invoices expected this & next month)
  const dueInvoices = invoices.filter(inv => {
    if (inv.status === 'received') return false;
    const due = inv.expected_date?.slice(0,7);
    const mDate = new Date(month+'-01');
    const invDate = new Date((inv.expected_date||inv.invoice_date||'') + 'T00:00:00');
    return invDate >= mDate;
  }).sort((a,b) => new Date(a.expected_date||a.invoice_date) - new Date(b.expected_date||b.invoice_date));

  const totalExpected = dueInvoices.reduce((s,i) => s+(+i.amount||0), 0);
  const overdueDue = dueInvoices.filter(i => i.expected_date && new Date(i.expected_date) < new Date());

  const grossProfit = totalRevenue - totalDiesel;
  const netPosition = totalRevenue - totalDiesel - totalPaid - fuelCost;

  html('page-content', `
    <!-- Month heading -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--t1)">Balance Sheet</div>
        <div style="font-size:12px;color:var(--t3)">${new Date(month+'-15').toLocaleDateString('en-GB',{month:'long',year:'numeric'})} · Auto-generated from live data</div>
      </div>
      <div style="font-size:10px;color:var(--t4);font-family:'DM Mono',monospace">Last updated: ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>

    <!-- Top KPIs -->
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-card stat-green">
        <div class="stat-label">Gross Revenue</div>
        <div class="stat-value">${fmt(totalRevenue)}</div>
        <div class="stat-sub">From ${trips.length} trips</div>
      </div>
      <div class="stat-card stat-red">
        <div class="stat-label">Total Expenditure</div>
        <div class="stat-value">${fmt(totalPaid + fuelCost + totalDiesel)}</div>
        <div class="stat-sub">Paid this period</div>
      </div>
      <div class="stat-card ${netPosition>=0?'stat-gold':'stat-red'}">
        <div class="stat-label">Net Position</div>
        <div class="stat-value">${fmt(Math.abs(netPosition))}</div>
        <div class="stat-sub">${netPosition>=0?'Surplus':'Deficit'}</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">Pending Payments</div>
        <div class="stat-value">${fmt(totalPending)}</div>
        <div class="stat-sub">${pendingReqs.length} requests</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <!-- INCOME -->
      <div style="background:var(--ink2);border:1px solid var(--b2);border-radius:var(--r-md);overflow:hidden">
        <div style="background:rgba(15,165,114,.08);border-bottom:1px solid rgba(15,165,114,.15);padding:12px 16px;display:flex;align-items:center;gap:8px">

function getMaintStatus(v) {
  const daysSince = Math.floor((new Date() - new Date(v.lastService)) / 86400000);
  const kmSince = v.currentOdo - v.lastOdo;

}

function genAvailData(y,m) {
  const days=new Date(y,m,0).getDate(); const result={};
  AVAIL_TRUCKS.forEach(t=>{result[t]=[];for(let d=1;d<=days;d++){const dow=new Date(y,m-1,d).getDay();if(dow===0){result[t].push('od');continue;}const r=Math.random();if(t==='GGE 550 XA'&&d>=8&&d<=14){result[t].push('mt');continue;}if(t==='GGE 553 XA'&&d>=3&&d<=7){result[t].push('mt');continue;}if(t==='EPE 243 XA'&&d>=15&&d<=18){result[t].push('na');continue;}result[t].push(r<.75?'av':r<.85?'na':r<.93?'mt':'od');}});
  return result;
}

function setAvail(vehicleId, isAvailable) {
  const btnY = el(`btn_y_${vehicleId}`);

  if (btnY) { btnY.style.borderColor=isAvailable?'var(--green)':'var(--border)'; btnY.style.background=isAvailable?'rgba(16,185,129,.15)':'transparent'; btnY.style.color=isAvailable?'var(--green)':'var(--text3)'; }
  if (btnN) { btnN.style.borderColor=!isAvailable?'var(--red)':'var(--border)'; btnN.style.background=!isAvailable?'rgba(239,68,68,.15)':'transparent'; btnN.style.color=!isAvailable?'var(--red)':'var(--text3)'; }
  if (row)  { row.dataset.avail = isAvailable?'1':'0'; row.style.background=!isAvailable?'rgba(239,68,68,.03)':''; }

  // Find contract type from unit
  const allVehicles = (availData?.units||[]).flatMap(u=>(u.vehicles||[]).map(v=>({...v,contract_type:u.contract_type||'ib'})));
  const veh = allVehicles.find(v=>v.id===vehicleId);
  if (cell) {
    cell.innerHTML = isAvailable
      ? `<span style="font-size:11px;color:var(--text3)">—</span>`
      : renderTruckReasonCell(vehicleId, veh?.contract_type||'ib', null, null);
  }
}

function updateMaintPreview(vehicleId, closingKm) {
  const allVehicles = (availData?.units||[]).flatMap(u=>u.vehicles||[]);
  const v = allVehicles.find(v=>v.id===vehicleId);
  if (!v || !closingKm) return;
  const km = parseFloat(closingKm);
  const nextServiceKm = (v.last_service_km||0) + MAINT_INTERVAL_KM;
  const remaining = nextServiceKm - km;
  const prev = el(`maint_preview_${vehicleId}`);
  if (!prev) return;
  if (remaining <= 0) prev.innerHTML = `<span style="color:var(--red)">⚠ Service overdue</span>`;
  else if (remaining <= MAINT_WARN_KM) prev.innerHTML = `<span style="color:var(--amber)">🔧 ${Math.round(remaining)}km to service</span>`;
  else prev.innerHTML = '';
}

function updateTripDist(vehicleId) {
  const destEl = el(`dest_${vehicleId}`);
  const distEl = el(`tripdist_${vehicleId}`);
  if (!destEl || !distEl) return;
  const dist = CONTRACT_TYPES.chivita.trip_distances[destEl.value];
  distEl.textContent = dist ? `${dist}km standard` : '';
}

function getVehicleMaintStatus(v) {
  if (!v.last_service_km && !v.last_service_date) return { alert: false };
  const kmToService = v.last_service_km
    ? (v.last_service_km + MAINT_INTERVAL_KM) - (v.last_odometer||0)
    : null;
  const lastSvcDate = v.last_service_date ? new Date(v.last_service_date) : null;
  const daysToService = lastSvcDate
    ? MAINT_INTERVAL_DAYS - Math.floor((Date.now()-lastSvcDate.getTime())/86400000)
    : null;

  const kmAlert  = kmToService  !== null && kmToService  <= MAINT_WARN_KM;
  const dayAlert = daysToService !== null && daysToService <= MAINT_WARN_DAYS;
  const kmOver   = kmToService  !== null && kmToService  <= 0;
  const dayOver  = daysToService !== null && daysToService <= 0;

  return {
    alert:   kmAlert || dayAlert,
    overdue: kmOver  || dayOver,
    kmToService, daysToService
  };
}

async function submitDailyAvailability() {
  const statusEl = el('avail-submit-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Submitting…';

  const allVehicles = (availData?.units||[]).flatMap(u=>(u.vehicles||[]).map(v=>({...v,unit_id:u.id,contract_type:u.contract_type||'ib'})));
  const entries = allVehicles.map(v => {
    const row      = el(`row_${v.id}`);
    const isAvail  = row?.dataset.avail !== undefined ? row.dataset.avail==='1' : true;
    const isChivita = v.contract_type === 'chivita';
    return {
      vehicle_id:            v.id,
      unit_id:               v.unit_id,
      contract_type:         v.contract_type,
      available:             isAvail,
      driver_name:           el(`driver_${v.id}`)?.value||null,
      driver_phone:          el(`driverphone_${v.id}`)?.value||null,
      opening_odometer:      parseFloat(el(`odo_open_${v.id}`)?.value)||null,
      closing_odometer:      parseFloat(el(`odo_close_${v.id}`)?.value)||null,
      diesel_litres:         parseFloat(el(`diesel_${v.id}`)?.value)||null,
      unavailability_reason: !isAvail ? (el(`reason_${v.id}`)?.value||'other') : null,
      unavailability_notes:  !isAvail ? (el(`reason_notes_${v.id}`)?.value||'') : null,
      notes:                 el(`notes_main_${v.id}`)?.value||null,
      // CHIVITA extra fields
      waybill_number:        isChivita ? el(`waybill_${v.id}`)?.value||null : null,
      order_no:              isChivita ? el(`order_${v.id}`)?.value||null   : null,
      loading_site:          isChivita ? el(`loading_${v.id}`)?.value||null : null,
      destination:           isChivita ? el(`dest_${v.id}`)?.value||null    : null,
      plant_arrival_time:    isChivita ? el(`plant_arrive_${v.id}`)?.value||null : null,
      plant_departure_time:  isChivita ? el(`plant_depart_${v.id}`)?.value||null : null,
    };
  });

  try {
    const res = await api('POST', '/api/availability/submit-daily', {
      entry_date: availData.entry_date, entries
    });
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--green)"><i class="ti ti-circle-check"></i> ${res.count} entries saved</span>`;
    if (typeof showToast === 'function') showToast(`✅ Availability submitted — ${res.count} vehicles`, 'success');
    setTimeout(() => renderDailyEntry(), 1400);
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)"><i class="ti ti-alert-triangle"></i> ${e.message}</span>`;
  }
}

function setBusAvail(busId, isAvail) {
  const y = el(`bus_y_${busId}`); const n = el(`bus_n_${busId}`);
  const det = el(`bus_details_${busId}`);
  if (y) { y.style.borderColor=isAvail?'var(--green)':'var(--border)'; y.style.background=isAvail?'rgba(16,185,129,.15)':'transparent'; y.style.color=isAvail?'var(--green)':'var(--text3)'; }
  if (n) { n.style.borderColor=!isAvail?'var(--red)':'var(--border)'; n.style.background=!isAvail?'rgba(239,68,68,.15)':'transparent'; n.style.color=!isAvail?'var(--red)':'var(--text3)'; }
  if (det) det.style.opacity = isAvail ? '1' : '.5';
  if (el(`bus_y_${busId}`)) el(`bus_y_${busId}`).closest('.ui-buscard')?.setAttribute('data-avail', isAvail?'1':'0');
}

function updateBusMaintPreview(busId, closingKm) {
  const buses = window._staffBuses || [];
  const b = buses.find(b=>b.id===busId);
  if (!b || !closingKm) return;
  const km = parseFloat(closingKm);
  const remaining = (b.last_service_km||0) + MAINT_INTERVAL_KM - km;
  const prev = el(`bus_maint_${busId}`);
  if (!prev) return;
  if (remaining <= 0) prev.innerHTML = `<span style="color:var(--red);font-weight:600">⚠ Service overdue!</span>`;
  else if (remaining <= MAINT_WARN_KM) prev.innerHTML = `<span style="color:var(--amber)">🔧 ${Math.round(remaining)}km to service</span>`;
}

async function submitStaffBus() {
  const statusEl = el('bus-submit-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Submitting…';
  const buses = window._staffBuses || [];
  // Collect entries from DOM - would POST to /api/availability/staff-buses/submit
  if (typeof showToast === 'function') showToast('🚌 Staff bus log submitted', 'success');
  if (statusEl) setTimeout(()=>statusEl.innerHTML='',3000);
}

async function fetchAvailReview() {
  const start    = el('rev-start')?.value;
  const end      = el('rev-end')?.value;
  const contract = el('rev-contract')?.value;
  if (!start || !end) { alert('Select both dates'); return; }

  html('avail-review-results', `<div style="text-align:center;padding:40px;color:var(--text3)">
    <i class="ti ti-loader" style="font-size:28px;animation:spin .8s linear infinite"></i>
  </div>`);

  try {
    const qs = `start=${start}&end=${end}${contract?'&contract_type='+contract:''}`;
    reviewData = await api('GET', `/api/availability/range?${qs}`);
  } catch(e) {
    html('avail-review-results', `<div style="color:var(--red);text-align:center;padding:24px">${e.message}</div>`);
    return;
  }

  const fleet = reviewData.fleet_summary;
  const pct   = fleet.avg_availability;
  const pCol  = pct>=90?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
  const days  = Math.round((new Date(end)-new Date(start))/86400000)+1;

  const rows = (reviewData.vehicles||[]).map((v,i) => {
    const cfg  = CONTRACT_TYPES[v.contract_type] || CONTRACT_TYPES.ib;
    const col  = v.availability_pct>=90?'var(--green)':v.availability_pct>=70?'var(--amber)':v.availability_pct!==null?'var(--red)':'var(--text3)';
    return `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
      <td style="padding:9px 12px;font-weight:700">${v.plate}</td>
      <td style="padding:9px 12px;font-size:12px;color:var(--text2)">${v.driver||'—'}</td>
      <td style="padding:9px 12px">
        <span style="font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;
          background:${cfg.color}22;color:${cfg.color}">${cfg.label.split('/')[0].trim()}</span>
      </td>
      <td style="padding:9px 12px;text-align:center;font-weight:700;color:${col}">
        ${v.availability_pct!==null?v.availability_pct+'%':'—'}
        <div style="height:3px;background:var(--bg3);border-radius:2px;margin-top:3px;min-width:60px">
          <div style="height:3px;width:${v.availability_pct||0}%;background:${col};border-radius:2px"></div>
        </div>
      </td>
      <td style="padding:9px 12px;text-align:center;color:var(--green)">${v.available_days}</td>
      <td style="padding:9px 12px;text-align:center;color:var(--red)">${v.unavailable_days}</td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${Math.round(v.total_km||0).toLocaleString()}</td>
      <td style="padding:9px 12px;text-align:center">${v.total_trips||0}</td>
      <td style="padding:9px 12px;font-size:11px;color:var(--text3)">${v.total_diesel?Math.round(v.total_diesel)+' L':'—'}</td>
    </tr>`;
  }).join('');

  html('avail-review-results', `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
      ${[
        [pct!==null?pct+'%':'—', 'Fleet Availability', pCol],
        [fleet.total_vehicles, 'Vehicles', 'var(--text)'],
        [Math.round(fleet.total_km||0).toLocaleString(), 'Total KM', 'var(--accent)'],
        [fleet.total_trips||0, 'Trips', 'var(--text2)'],
        [days, 'Days', 'var(--text3)'],
        [fleet.total_diesel?Math.round(fleet.total_diesel)+' L':'—', 'Fuel Used', '#f59e0b'],
      ].map(([v,l,c])=>`
        <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:${c}">${v}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:640px">
        <thead><tr style="background:var(--bg3)">
          ${['Plate','Driver','Contract','Availability','Avail Days','N/A Days','Total KM','Trips','Fuel']
            .map(h=>`<th style="padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;white-space:nowrap">${h}</th>`).join('')}
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">No data for this period</td></tr>'}</tbody>
      </table>
    </div>
  `);
}

function exportAvailCSV() {
  if (!reviewData?.vehicles?.length) { alert('Load a report first'); return; }
  const rows = [
    ['Plate','Driver','Contract','Availability %','Available Days','Unavailable Days','Total KM','Trips','Fuel (L)'],
    ...reviewData.vehicles.map(v=>[v.plate,v.driver||'',v.contract_type||'',v.availability_pct||'',v.available_days,v.unavailable_days,Math.round(v.total_km||0),v.total_trips||0,v.total_diesel?Math.round(v.total_diesel):''])
  ];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `availability_${reviewData.start}_${reviewData.end}.csv`;
  a.click();
}

// TAB 5: MAINTENANCE DASHBOARD
// All vehicles, service status, 700km / 30-day warnings, downloadable
// ════════════════════════════════════════════════════════════════════════════
async function renderMaintenanceDash() {
  html('avail-body', `<div style="text-align:center;padding:40px;color:var(--text3)">
    <i class="ti ti-loader" style="font-size:28px;animation:spin .8s linear infinite"></i>
  </div>`);

  let vehicles = [];
  try {
    const res = await api('GET', '/api/vehicles?include_maintenance=true&limit=500');
    vehicles = res.data || res || [];
  } catch(e) { vehicles = []; }

  const now = Date.now();
  const enriched = vehicles.map(v => {
    const lastSvcKm   = v.last_service_km   || 0;
    const lastSvcDate = v.last_service_date  ? new Date(v.last_service_date) : null;
    const curKm       = v.last_odometer      || 0;
    const kmToSvc     = lastSvcKm ? (lastSvcKm + MAINT_INTERVAL_KM) - curKm : null;
    const daysElapsed = lastSvcDate ? Math.floor((now - lastSvcDate.getTime()) / 86400000) : null;
    const daysToSvc   = daysElapsed !== null ? MAINT_INTERVAL_DAYS - daysElapsed : null;

    let status = 'ok';
    if ((kmToSvc !== null && kmToSvc <= 0) || (daysToSvc !== null && daysToSvc <= 0))
      status = 'overdue';
    else if ((kmToSvc !== null && kmToSvc <= MAINT_WARN_KM) || (daysToSvc !== null && daysToSvc <= MAINT_WARN_DAYS))
      status = 'prepare';

    return { ...v, kmToSvc, daysToSvc, status, daysElapsed };
  });

  const overdue  = enriched.filter(v=>v.status==='overdue');
  const prepare  = enriched.filter(v=>v.status==='prepare');
  const ok       = enriched.filter(v=>v.status==='ok');

  const statusStyle = { overdue:'color:var(--red);background:rgba(239,68,68,.12)', prepare:'color:var(--amber);background:rgba(245,158,11,.12)', ok:'color:var(--green);background:rgba(16,185,129,.12)' };
  const statusLabel = { overdue:'⚠ Overdue', prepare:'🔧 Prepare', ok:'✓ OK' };

  const tableRows = enriched.map((v,i) => {
    const sStyle = statusStyle[v.status];
    const kmBar  = v.kmToSvc !== null ? Math.max(0, Math.min(100, (v.kmToSvc / MAINT_INTERVAL_KM) * 100)) : null;
    return `<tr style="border-bottom:1px solid var(--border);background:${i%2?'var(--bg3)':'transparent'}">
      <td style="padding:9px 12px">
        <div style="font-weight:700;font-size:13px;color:var(--text)">${v.plate_number||v.plate||'—'}</div>
        <div style="font-size:10px;color:var(--text3)">${v.make||''} ${v.model||''}</div>
      </td>
      <td style="padding:9px 12px;font-size:12px;color:var(--text2)">${v.driver_name||'—'}</td>
      <td style="padding:9px 12px">
        <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;${sStyle}">${statusLabel[v.status]}</span>
      </td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${Math.round(v.last_odometer||0).toLocaleString()}</td>
      <td style="padding:9px 12px;text-align:right;font-family:monospace;font-size:12px">${v.last_service_km?Math.round(v.last_service_km).toLocaleString():'—'}</td>
      <td style="padding:9px 12px">
        ${v.kmToSvc !== null ? `
          <div style="font-size:11px;font-weight:600;color:${v.kmToSvc<=0?'var(--red)':v.kmToSvc<=MAINT_WARN_KM?'var(--amber)':'var(--text2)'}">
            ${v.kmToSvc<=0?'OVERDUE':Math.round(v.kmToSvc)+' km'}
          </div>
          <div style="height:4px;background:var(--bg3);border-radius:2px;margin-top:4px;min-width:80px">
            <div style="height:4px;width:${kmBar}%;border-radius:2px;background:${v.status==='overdue'?'var(--red)':v.status==='prepare'?'var(--amber)':'var(--green)'}"></div>
          </div>` : '—'}
      </td>
      <td style="padding:9px 12px;font-size:11px;color:var(--text3)">${v.last_service_date?new Date(v.last_service_date).toLocaleDateString('en-GB'):'—'}</td>
      <td style="padding:9px 12px">
        ${v.daysToSvc !== null ? `<span style="font-size:11px;color:${v.daysToSvc<=0?'var(--red)':v.daysToSvc<=MAINT_WARN_DAYS?'var(--amber)':'var(--text3)'}">${v.daysToSvc<=0?'OVERDUE':v.daysToSvc+' days'}</span>` : '—'}
      </td>
      <td style="padding:9px 12px">
        <button onclick="showUpdateServiceModal('${v.id||v.plate_number}','${v.plate_number||v.plate}')"
          style="padding:5px 10px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);
            color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap">
          <i class="ti ti-tool"></i> Update
        </button>
      </td>
    </tr>`;
  }).join('');

  html('avail-body', `
    <!-- Alert summary -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px">
      <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:800;color:var(--red)">${overdue.length}</div>
        <div style="font-size:11px;color:var(--red);margin-top:2px;font-weight:600">⚠ Service Overdue</div>
      </div>
      <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:800;color:var(--amber)">${prepare.length}</div>
        <div style="font-size:11px;color:var(--amber);margin-top:2px;font-weight:600">🔧 Prepare for Service</div>
      </div>
      <div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:800;color:var(--green)">${ok.length}</div>
        <div style="font-size:11px;color:var(--green);margin-top:2px;font-weight:600">✓ In Good Standing</div>
      </div>
      <div style="background:var(--bg3);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:800;color:var(--text)">${enriched.length}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Total Vehicles</div>
      </div>
    </div>

    <!-- Thresholds info bar -->
    <div style="background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.12);border-radius:8px;
      padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--text3);display:flex;gap:16px;flex-wrap:wrap">
      <span><i class="ti ti-info-circle" style="color:var(--accent)"></i> 
        <strong>Prepare for service:</strong> ≤${MAINT_WARN_KM}km or ≤${MAINT_WARN_DAYS} days to next service</span>
      <span><strong>Service interval:</strong> Every ${MAINT_INTERVAL_KM.toLocaleString()}km or ${MAINT_INTERVAL_DAYS} days</span>
    </div>

    <!-- Action bar -->
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <input type="text" placeholder="Search plate or driver…" oninput="filterMaintTable(this.value)"
        style="flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
          padding:8px 12px;color:var(--text);font-size:13px">
      <select id="maint-filter" onchange="filterMaintTable(el('maint-search')?.value||'')"
        style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px">
        <option value="">All statuses</option>
        <option value="overdue">Overdue only</option>
        <option value="prepare">Prepare only</option>
        <option value="ok">OK only</option>
      </select>
      <button onclick="exportMaintCSV()"
        style="padding:8px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
          color:var(--text2);font-size:12px;cursor:pointer">
        <i class="ti ti-download"></i> Export
      </button>
      <button onclick="showAddVehicleServiceModal()"
        style="padding:8px 16px;border-radius:8px;background:var(--accent);border:none;
          color:#fff;font-size:12px;font-weight:600;cursor:pointer">
        <i class="ti ti-plus"></i> Add Vehicle
      </button>
    </div>

    <!-- Table -->
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">
      <table id="maint-table" style="width:100%;border-collapse:collapse;min-width:780px">
        <thead><tr style="background:var(--bg3)">
          ${['Plate','Driver','Status','Current KM','Last Svc KM','KM to Service','Last Svc Date','Days to Service','Action']
            .map(h=>`<th style="padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;white-space:nowrap">${h}</th>`).join('')}
        </tr></thead>
        <tbody id="maint-tbody">${tableRows||'<tr><td colspan="9" style="padding:40px;text-align:center;color:var(--text3)">No vehicles registered yet</td></tr>'}</tbody>
      </table>
    </div>
  `);

  window._maintVehicles = enriched;
}

function filterMaintTable(searchVal) {
  const statusFilter = el('maint-filter')?.value || '';
  const rows = document.querySelectorAll('#maint-tbody tr');
  rows.forEach(row => {
    const text   = row.textContent.toLowerCase();
    const status = row.dataset.status || '';
    const matchSearch = !searchVal || text.includes(searchVal.toLowerCase());
    const matchStatus = !statusFilter || status === statusFilter;
    row.style.display = matchSearch && matchStatus ? '' : 'none';
  });
}

function exportMaintCSV() {
  const vehicles = window._maintVehicles || [];
  if (!vehicles.length) { alert('No data to export'); return; }
  const rows = [
    ['Plate','Driver','Status','Current KM','Last Service KM','KM to Service','Last Service Date','Days to Service'],
    ...vehicles.map(v=>[
      v.plate_number||v.plate||'',v.driver_name||'',v.status,
      Math.round(v.last_odometer||0),v.last_service_km?Math.round(v.last_service_km):'',
      v.kmToSvc!==null?Math.round(v.kmToSvc):'',
      v.last_service_date?new Date(v.last_service_date).toLocaleDateString('en-GB'):'',
      v.daysToSvc!==null?v.daysToSvc:''
    ])
  ];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `maintenance_status_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

async function saveServiceUpdate(vehicleId) {
  try {
    await api('PATCH', `/api/vehicles/${vehicleId}/service`, {
      last_service_date: el('svc-date')?.value,
      last_service_km:   parseFloat(el('svc-km')?.value)||null,
      service_type:      el('svc-type')?.value,
      notes:             el('svc-notes')?.value
    });
    if (typeof closeModal === 'function') closeModal();
    if (typeof showToast === 'function') showToast('🔧 Service record updated', 'success');
    renderMaintenanceDash();
  } catch(e) { alert(e.message); }
}

  if (typeof showModal === 'function') showModal('Add Vehicle to Maintenance Tracker', `

}

async function saveNewVehicleMaint() {
  try {
    await api('POST', '/api/vehicles', {
      plate_number: el('av-plate')?.value, make: el('av-make')?.value,
      contract_type: el('av-contract')?.value, driver_name: el('av-driver')?.value,
      last_odometer: parseFloat(el('av-odo')?.value)||0,
      last_service_km: parseFloat(el('av-svckm')?.value)||null,
      last_service_date: el('av-svcdt')?.value
    });
    if (typeof closeModal === 'function') closeModal();
    if (typeof showToast === 'function') showToast('Vehicle added to maintenance tracker', 'success');
    renderMaintenanceDash();
  } catch(e) { alert(e.message); }
}

async function addSubscription() {
  const email = el('sub-email')?.value?.trim();
  const name  = el('sub-name')?.value?.trim();
  const type  = el('sub-type')?.value;
  if (!email) { alert('Email is required'); return; }
  try {
    await api('POST', '/api/availability/report-subscriptions', { email, name, report_type: type });
    renderSubscriptions();
  } catch(e) { alert(e.message); }
}

          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600">MINUTE</div>
            <select id="weekly-minute" style="width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px">
              ${[0,15,30,45].map(v=>`<option value="${v}" ${(w.minute||0)===v?'selected':''}>${String(v).padStart(2,'0')}</option>`).join('')}

        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text3);background:var(--bg4);padding:8px 10px;border-radius:6px">

        </div>
        <button onclick="testRunReport('weekly')" style="margin-top:10px;padding:7px 14px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:11px;cursor:pointer"><i class="ti ti-player-play"></i> Test Run Now</button>

            </select>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600">MINUTE</div>
            <select id="daily-minute" style="width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px">
              ${[0,15,30,45].map(v=>`<option value="${v}" ${(d.minute||0)===v?'selected':''}>${String(v).padStart(2,'0')}</option>`).join('')}

    el(id)?.addEventListener('change', updateCronPreviews);
  });
}

function updateCronPreviews() {
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const wDay  = parseInt(el('weekly-day')?.value  || 1);
  const wHour = parseInt(el('weekly-hour')?.value || 8);
  const wMin  = parseInt(el('weekly-minute')?.value || 0);
  const mDom  = parseInt(el('monthly-dom')?.value  || 1);
  const mHour = parseInt(el('monthly-hour')?.value || 10);
  const mMin  = parseInt(el('monthly-minute')?.value || 0);
  const ords  = {1:'st',2:'nd',3:'rd'};
  const wp = el('weekly-preview');  if (wp) wp.textContent = `Every ${dayNames[wDay]} at ${String(wHour).padStart(2,'0')}:${String(wMin).padStart(2,'0')}`;
  const mp = el('monthly-preview'); if (mp) mp.textContent = `${mDom}${ords[mDom]||'th'} of every month at ${String(mHour).padStart(2,'0')}:${String(mMin).padStart(2,'0')}`;
}

async function saveCronSchedule() {
  const statusEl = el('cron-save-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Saving…';
  try {
    await api('POST', '/api/cron-settings', {
      weekly_report:  { enabled: el('weekly-enabled')?.checked,  day_of_week: parseInt(el('weekly-day')?.value),  hour: parseInt(el('weekly-hour')?.value),  minute: parseInt(el('weekly-minute')?.value) },
      monthly_report: { enabled: el('monthly-enabled')?.checked, day_of_month: parseInt(el('monthly-dom')?.value), hour: parseInt(el('monthly-hour')?.value), minute: parseInt(el('monthly-minute')?.value) },
      daily_reminder: { enabled: el('daily-enabled')?.checked,   hour: parseInt(el('daily-hour')?.value), minute: parseInt(el('daily-minute')?.value) }
    });
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)"><i class="ti ti-circle-check"></i> Saved</span>';
    if (typeof showToast === 'function') showToast('⚙️ Schedule saved and applied', 'success');
    setTimeout(() => { if (statusEl) statusEl.innerHTML = ''; }, 4000);
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
  }
}

async function testRunReport(type) {
  if (!confirm(`Trigger ${type} report NOW? This will send emails to all subscribers.`)) return;
  try {
    await api('POST', '/api/cron-settings/test-run', { type });
    if (typeof showToast === 'function') showToast(`✅ ${type} report triggered`, 'success');
  } catch(e) { if (typeof showToast === 'function') showToast(`Failed: ${e.message}`, 'error'); }
}

// Spin keyframe (safe to declare again)
if (!document.getElementById('spin-style')) {
  const s = document.createElement('style');
  s.id = 'spin-style';
  s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(s);
}

// Wake up Railway backend immediately on page load
(async () => {
  try {
    await fetch('https://vmo-virtual-medessy-opps-backend-production.up.railway.app/health', {
      cache: 'no-store',
      signal: AbortSignal.timeout(10000)
    });
  } catch {}
})();

render();
</script>
