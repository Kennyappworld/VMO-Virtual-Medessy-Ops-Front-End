function filterMaintTable(searchVal) {
  const statusFilter = el('maint-filter')?.value || '';
  const rows = document.querySelectorAll('#maint-tbody tr');
  rows.forEach(row => {
    const text   = row.textContent.toLowerCase();
    const status = row.dataset.status || '';
    const matchSearch = !searchVal || text.includes(searchVal.toLowerCase());
    const matchStatus = !statusFilter || status === statusFilter;
    row.style.display = matchSearch && matchStatus ? '' : 'none';
  });
}

function exportMaintCSV() {
  const vehicles = window._maintVehicles || [];
  if (!vehicles.length) { showToast('No data to export', 'info'); return; }
  const rows = [
    ['Plate','Driver','Status','Current KM','Last Service KM','KM to Service','Last Service Date','Days to Service'],
    ...vehicles.map(v=>[
      v.plate_number||v.plate||'',v.driver_name||'',v.status,
      Math.round(v.last_odometer||0),v.last_service_km?Math.round(v.last_service_km):'',
      v.kmToSvc!==null?Math.round(v.kmToSvc):'',
      v.last_service_date?new Date(v.last_service_date).toLocaleDateString('en-GB'):'',
      v.daysToSvc!==null?v.daysToSvc:''
    ])
  ];
  const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `maintenance_status_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

            <div style="font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600">REMINDER HOUR</div>
            <select id="daily-hour" style="width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px">
              ${Array.from({length:24},(_,i)=>`<option value="${i}" ${(d.hour||9)===i?'selected':''}>${String(i).padStart(2,'0')}:00</option>`).join('')}
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600">MINUTE</div>
            <select id="daily-minute" style="width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:13px">
              ${[0,15,30,45].map(v=>`<option value="${v}" ${(d.minute||0)===v?'selected':''}>${String(v).padStart(2,'0')}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;align-items:center">
        <button onclick="saveCronSchedule()"
          style="flex:1;padding:13px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer">
          <i class="ti ti-device-floppy"></i> Save & Apply Schedule
        </button>
        <div id="cron-save-status" style="font-size:12px;color:var(--text3)"></div>
      </div>
    </div>
  `);
  updateCronPreviews();
  ['weekly-day','weekly-hour','weekly-minute','monthly-dom','monthly-hour','monthly-minute'].forEach(id => {
    el(id)?.addEventListener('change', updateCronPreviews);
  });
}

function updateCronPreviews() {
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const wDay  = parseInt(el('weekly-day')?.value  || 1);
  const wHour = parseInt(el('weekly-hour')?.value || 8);
  const wMin  = parseInt(el('weekly-minute')?.value || 0);
  const mDom  = parseInt(el('monthly-dom')?.value  || 1);
  const mHour = parseInt(el('monthly-hour')?.value || 10);
  const mMin  = parseInt(el('monthly-minute')?.value || 0);
  const ords  = {1:'st',2:'nd',3:'rd'};
  const wp = el('weekly-preview');  if (wp) wp.textContent = `Every ${dayNames[wDay]} at ${String(wHour).padStart(2,'0')}:${String(wMin).padStart(2,'0')}`;
  const mp = el('monthly-preview'); if (mp) mp.textContent = `${mDom}${ords[mDom]||'th'} of every month at ${String(mHour).padStart(2,'0')}:${String(mMin).padStart(2,'0')}`;
}

async function saveCronSchedule() {
  const statusEl = el('cron-save-status');
  if (statusEl) statusEl.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Saving…';
  try {
    await api('POST', '/api/cron-settings', {
      weekly_report:  { enabled: el('weekly-enabled')?.checked,  day_of_week: parseInt(el('weekly-day')?.value),  hour: parseInt(el('weekly-hour')?.value),  minute: parseInt(el('weekly-minute')?.value) },
      monthly_report: { enabled: el('monthly-enabled')?.checked, day_of_month: parseInt(el('monthly-dom')?.value), hour: parseInt(el('monthly-hour')?.value), minute: parseInt(el('monthly-minute')?.value) },
      daily_reminder: { enabled: el('daily-enabled')?.checked,   hour: parseInt(el('daily-hour')?.value), minute: parseInt(el('daily-minute')?.value) }
    });
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)"><i class="ti ti-circle-check"></i> Saved</span>';
    if (typeof showToast === 'function') showToast('⚙️ Schedule saved and applied', 'success');
    setTimeout(() => { if (statusEl) statusEl.innerHTML = ''; }, 4000);
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red)">${e.message}</span>`;
  }
}

async function testRunReport(type) {
  showConfirmModal('Trigger Report', `Trigger <strong>${type}</strong> report NOW? This will send emails to all subscribers.`, async () => {
  try {
    await api('POST', '/api/cron-settings/test-run', { type });
    if (typeof showToast === 'function') showToast(`✅ ${type} report triggered`, 'success');
  } catch(e) { if (typeof showToast === 'function') showToast(`Failed: ${e.message}`, 'error'); }
  });
}

// Spin keyframe (safe to declare again)
if (!document.getElementById('spin-style')) {
  const s = document.createElement('style');
  s.id = 'spin-style';
  s.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(s);
}

// Wake up Railway backend immediately on page load
(async () => {
  try {
    await fetch('https://vmo-virtual-medessy-opps-backend-production.up.railway.app/health', {
      cache: 'no-store',
      signal: AbortSignal.timeout(10000)
    });
  } catch {}
})();

// Check for signup page hash
if (window.location.hash === '#signup') {
  renderSignupPage();
} else {
  render();
  // Refresh issues badge every 2 minutes
  if (user) {
    setTimeout(refreshIssuesBadge, 3000);
    setInterval(refreshIssuesBadge, 120000);
  }
}
</script>
</body>
</html>
